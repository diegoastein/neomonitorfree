        body { background-color: #000000; color: white; margin: 0; touch-action: manipulation; overflow: hidden; font-family: sans-serif; }
        
        .soft-key {

            border: 1px solid #475569; color: #cbd5e1; font-family: monospace;
            font-size: 0.8rem; display: flex; align-items: center; justify-content: center;

        input[type=range] { accent-color: #42B334; }
        input[type=range].time-slider { accent-color: #f59e0b; }
        
        .sponsor-container {
            background: transparent;
            border: 1px solid rgba(71, 85, 105, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
            border-radius: 4px;
        }
        .sponsor-container:hover { background: rgba(255,255,255,0.05); border-color: #475569; }

        .hardware-accelerated { transform: translateZ(0); will-change: transform, opacity; }
        
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .animate-zoom { animation: zoomIn 0.3s ease-out forwards; }

        @keyframes deviceFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .float-anim { animation: deviceFloat 3s ease-in-out infinite; }
        
        @keyframes scanLine { 0% { top: 0; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .scan-line { position: absolute; width: 100%; height: 2px; background: #3b82f6; animation: scanLine 2s linear infinite; }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.25); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
            100% { transform: scale(1); }
        }

        .heart-portrait { display: none; }

        @media (max-width: 600px) and (orientation: portrait) {
            .monitor-screen { border-width: 4px !important; }
            .waveform-col { display: none !important; }
            .monitor-screen .main-row { grid-template-columns: 1fr !important; }
            .monitor-screen .number-container { align-items: center !important; padding-right: 0 !important; justify-content: center !important; }
            .monitor-screen .number-label { font-size: 1.2rem !important; margin-bottom: 0px !important; }
            .monitor-screen .number-display { font-size: 22vw !important; }
            .monitor-screen .extra-info-row { grid-template-columns: 1fr 1fr !important; }
            .monitor-screen .sponsor-col { display: none !important; }
            .monitor-screen .qr-button span { display: inline !important; font-size: 0.7rem !important; }
            .heart-portrait { display: block !important; }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .monitor-screen { border-width: 4px !important; }
            .monitor-screen .top-bar, .monitor-screen .bottom-bar { padding: 0.2rem 0.5rem !important; font-size: 0.7rem !important; height: 32px !important; }
            .monitor-screen .main-row { grid-template-columns: 1fr 160px !important; }
            .monitor-screen .number-display { font-size: 15vh !important; }
        }

        .qr-button { background: linear-gradient(180deg, #166534 0%, #14532d 100%); border-color: #22c55e; color: #bbf7d0; }
        #reader { width: 100% !important; border: none !important; }
        #reader video { border-radius: 12px !important; object-fit: cover !important; }
