        input[type=range].time-slider { accent-color: #f59e0b; }

            transition: all 0.3s;
            cursor: pointer;

        .hardware-accelerated { transform: translateZ(0); will-change: transform, opacity; }
        
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .animate-zoom { animation: zoomIn 0.3s ease-out forwards; }

        @keyframes deviceFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .float-anim { animation: deviceFloat 3s ease-in-out infinite; }
        
        @keyframes scanLine { 0% { top: 0; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .scan-line { position: absolute; width: 100%; height: 2px; background: #3b82f6; animation: scanLine 2s linear infinite; }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.25); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
            100% { transform: scale(1); }
        }

        .heart-portrait { display: none; }

        @media (max-width: 600px) and (orientation: portrait) {
            .monitor-screen { border-width: 4px !important; }
            .waveform-col { display: none !important; }

        }

        let audioCtx;
        const initAudio = () => {
            if (!audioCtx) { const AudioContext = window.AudioContext || window.webkitAudioContext; audioCtx = new AudioContext(); }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        };

        const playBeep = (pitch = 800) => {
            if (!audioCtx || audioCtx.state !== 'running') return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine'; oscillator.frequency.value = pitch;
            const now = audioCtx.currentTime;
            gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
            oscillator.start(now); oscillator.stop(now + 0.15);
        };

        const playAlarmSequence = (type) => {
             if (!audioCtx || audioCtx.state !== 'running') return;
             const now = audioCtx.currentTime;
             const createTone = (freq, start, duration) => {
                 const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                 osc.connect(gain); gain.connect(audioCtx.destination);
                 osc.type = 'square'; osc.frequency.value = freq;
                 gain.gain.setValueAtTime(0.08, start); gain.gain.setValueAtTime(0, start + duration);
                 osc.start(start); osc.stop(start + duration);
             };
             if (type === 'critical') { createTone(880, now, 0.1); createTone(880, now + 0.2, 0.1); createTone(880, now + 0.4, 0.1); }
             else if (type === 'warning') { createTone(600, now, 0.2); createTone(600, now + 0.4, 0.2); }
        };

        const WaveformCanvas = ({ color, speed, type, flatline, onBeat }) => {
            const canvasRef = useRef(null);
            const dataRef = useRef([]);
            const phaseRef = useRef(0);
            const lastTimeRef = useRef(performance.now());
            
            // Variabilidad morfológica: factores aleatorios por latido
            const pulseVariability = useRef({ amplitude: 1, width: 1 });

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let frameId;
                const draw = (time) => {
                    const deltaTime = (time - lastTimeRef.current) / 1000;
                    lastTimeRef.current = time;
                    if (deltaTime > 0.1) { frameId = requestAnimationFrame(draw); return; }
                    if (canvas.width !== canvas.offsetWidth) {
                        canvas.width = canvas.offsetWidth;
                        canvas.height = canvas.offsetHeight;
                        dataRef.current = new Array(canvas.width).fill(canvas.height / 2);
                    }
                    let newValue = canvas.height / 2;
                    const baseAmplitude = canvas.height / 3;

                    if (!flatline && speed > 0) {
                        const beatsPerSecond = speed / 60;
                        const prevPhase = phaseRef.current;
                        phaseRef.current += (beatsPerSecond * 2 * Math.PI) * deltaTime;
                        if (phaseRef.current >= 2 * Math.PI) {
                            phaseRef.current -= 2 * Math.PI;
                            // Al inicio de cada ciclo, generamos nueva variabilidad morfológica
                            pulseVariability.current = {
                                amplitude: 0.85 + Math.random() * 0.3, // ±15% de altura
                                width: 0.95 + Math.random() * 0.1      // ±5% de ancho (anestesia sutil)
                            };
                        }
                        const p = phaseRef.current;
                        const { amplitude, width } = pulseVariability.current;

                        if (type === 'ecg' && onBeat) {
                             const threshold = Math.PI;
                             if (prevPhase < threshold && p >= threshold) onBeat();
                        }

                        if (type === 'ecg') {
                            const scaledPhase = (p - Math.PI) / width + Math.PI;
                            if (scaledPhase > 3.0 && scaledPhase < 3.28) {
                                newValue = (canvas.height / 2) - (baseAmplitude * 2.5 * amplitude * Math.exp(-Math.pow(scaledPhase - Math.PI, 2) * 50));
                            } else if (scaledPhase > 3.5 && scaledPhase < 4.5) {
                                newValue = (canvas.height / 2) - (baseAmplitude * 0.3 * amplitude * Math.sin(scaledPhase - 3.5));
                            } else {
                                newValue = (canvas.height / 2) + (Math.random() * 1.5 - 0.75);
                            }
                        } else {
                            // Onda Pleth / Sat: sinusoidal modificada
                            newValue = (canvas.height / 2) - (Math.sin(p) * baseAmplitude * 0.6 * amplitude);
                        }
                    } else { newValue = (canvas.height / 2) + (Math.random() * 2 - 1); }
                    
                    dataRef.current.push(newValue);
                    dataRef.current.shift();
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.lineWidth = 2.5; ctx.strokeStyle = color; ctx.beginPath();
                    for (let i = 0; i < dataRef.current.length; i++) {
                        if (i === 0) ctx.moveTo(i, dataRef.current[i]); else ctx.lineTo(i, dataRef.current[i]);
                    }
                    ctx.stroke();
                    frameId = requestAnimationFrame(draw);
                };
                frameId = requestAnimationFrame(draw);
                return () => cancelAnimationFrame(frameId);
            }, [color, speed, type, flatline, onBeat]);

            return <canvas ref={canvasRef} className="w-full h-full block" />;
        };

        const useInterpolatedVitals = (target) => {
            const [vitals, setVitals] = useState(target);
            useEffect(() => {
                if (!target.transition) { setVitals(target); return; }
                let frame;
                const animate = () => {
                    const elapsed = Date.now() - target.transition.startTime;
                    const p = Math.min(1, elapsed / target.transition.duration);
                    if (p < 1) {
                        setVitals({
                            ...target,
                            hr: Math.round(target.transition.startHr + (target.transition.targetHr - target.transition.startHr) * p),
                            spo2: Math.round(target.transition.startSpo2 + (target.transition.targetSpo2 - target.transition.startSpo2) * p),
                        });
                        frame = requestAnimationFrame(animate);
                    } else { setVitals(target); }
                };
                frame = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(frame);
            }, [target]);
            return vitals;
        };

        const MonitorScreen = ({ sessionId, vitals: targetVitals, t }) => {
            const vitals = useInterpolatedVitals(targetVitals);
            const [audioEnabled, setAudioEnabled] = useState(false);
            const [time, setTime] = useState(new Date());
            const [alarmState, setAlarmState] = useState('none');
            const [flash, setFlash] = useState(false);
            const [qrExpanded, setQrExpanded] = useState(false);
            
            // Variabilidad numérica (Jitter) para la FC en pantalla
            const [hrDrift, setHrDrift] = useState(0);

            useEffect(() => {
                const t = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(t);
            }, []);

            // Efecto de Jitter fisiológico aleatorio cada 3-5 segundos
            useEffect(() => {
                if (!vitals.simRunning) { setHrDrift(0); return; }
                const driftInterval = setInterval(() => {
                    const possibleDrifts = [-2, -1, 0, 1, 2];
                    setHrDrift(possibleDrifts[Math.floor(Math.random() * possibleDrifts.length)]);
                }, 3000 + Math.random() * 2000);
                return () => clearInterval(driftInterval);
            }, [vitals.simRunning]);

            useEffect(() => {
                if (!vitals.simRunning) { setAlarmState('none'); return; }
                let level = 'none';
                if (vitals.hr < 60 || vitals.hr === 0 || vitals.spo2 < 80) level = 'critical';
                else if (vitals.hr < 100 || vitals.hr > 180 || vitals.spo2 < 89) level = 'warning';
                setAlarmState(level);
                const interval = setInterval(() => setFlash(p => !p), level === 'critical' ? 300 : 800);
                return () => clearInterval(interval);
            }, [vitals.hr, vitals.spo2, vitals.simRunning]);

            useEffect(() => {
                let interval;
                if (audioEnabled && !vitals.alarmMuted && alarmState !== 'none' && vitals.simRunning) {
                    playAlarmSequence(alarmState);
                    interval = setInterval(() => playAlarmSequence(alarmState), alarmState === 'critical' ? 2500 : 4000);
                }
                return () => clearInterval(interval);
            }, [alarmState, audioEnabled, vitals.alarmMuted, vitals.simRunning]);

            const handleBeat = () => {
                if (!audioEnabled || vitals.alarmMuted || !vitals.simRunning) return;
                playBeep(vitals.spo2 < 89 ? 400 : 800);
            };

            const start = () => { 
                if (document.documentElement.requestFullscreen) { document.documentElement.requestFullscreen().catch(() => {}); }
                initAudio(); setAudioEnabled(true); 
                trackNeoEvent('monitor_active', 'Audio enabled on monitor', { session_id: sessionId });
            };

            const displayHr = vitals.simRunning && vitals.hr > 0 ? (vitals.hr + hrDrift) : (vitals.simRunning ? vitals.hr : '--');

            return (
                <div className={`w-full h-screen bg-black flex flex-col border-[12px] transition-colors duration-100 ${alarmState === 'none' || vitals.alarmMuted || !vitals.simRunning ? 'border-slate-900' : (alarmState === 'critical' ? (flash ? 'border-red-600 bg-red-900/10' : 'border-red-900') : (flash ? 'border-yellow-500 bg-yellow-900/10' : 'border-yellow-900'))} hardware-accelerated monitor-screen`}>
                    {!audioEnabled && (
                        <div className="absolute inset-0 bg-black/90 z-50 flex items-center justify-center text-center px-4">
                            <button onClick={start} className="bg-green-600 px-8 py-4 rounded-xl font-bold text-xl animate-pulse">{t.startMonitorBtn}</button>
                        </div>

                    {audioEnabled && !vitals.simRunning && (

                            <div className="bg-white p-3 rounded-lg shadow-lg mb-4">
                                <img src={`https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(window.location.origin + window.location.pathname + '?mode=control&session=' + sessionId)}`} alt="Sync" className="w-[180px] h-[180px]" />
                            </div>

                                <img src={`https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(window.location.origin + window.location.pathname + '?mode=control&session=' + sessionId)}`} alt="QR" className="w-full h-full" />
                            </div>
                            <p className="mt-6 text-white font-bold text-center px-4">{t.scanPhonePrompt}</p>
                        </div>
                    )}

                    <div className="flex-none flex justify-between px-4 py-2 bg-slate-900/50 text-slate-400 text-sm font-mono border-b border-slate-800 top-bar">
                        <div className="flex gap-4"><span>NEONATAL</span><span>{t.bed}: 01</span></div>
                        <div className="flex gap-4 items-center">{vitals.alarmMuted && <Icons.VolumeX className="text-orange-500 w-4 h-4" />}<span>{t.id}: {sessionId}</span></div>
                    </div>

                    <div className="flex-1 flex flex-col divide-y divide-slate-800 min-h-0">
                        <div className="flex-[1.5] grid grid-cols-[1fr_280px] h-full main-row">
                            <div className="relative border-r border-slate-800 bg-black waveform-col">{vitals.simRunning && <WaveformCanvas color="#42B334" speed={displayHr !== '--' ? displayHr : 0} type="ecg" flatline={vitals.hr === 0} onBeat={handleBeat}/>}</div>
                            <div className="flex flex-col items-center px-4 justify-center number-container">
                                <div className="flex items-center gap-3">
                                    <span className="text-[#42B334] font-bold text-lg number-label">{t.hr}</span>
                                    {vitals.simRunning && vitals.hr > 0 && <Icons.Heart className="heart-portrait text-red-600 fill-red-600 w-6 h-6" style={{ animation: `heartbeat ${60/displayHr}s infinite cubic-bezier(0.4, 0, 0.2, 1)` }}/>}
                                </div>
                                <span className={`font-mono font-bold leading-none number-display ${alarmState !== 'none' && !vitals.alarmMuted && flash ? 'text-white' : 'text-[#42B334]'}`} style={{fontSize: '18vh'}}>{displayHr}</span>
                            </div>
                        </div>
                        <div className="flex-[1.5] grid grid-cols-[1fr_280px] h-full main-row">
                            <div className="relative border-r border-slate-800 bg-black waveform-col">{vitals.simRunning && <WaveformCanvas color="#facc15" speed={displayHr !== '--' ? displayHr : 0} type="pleth" flatline={vitals.spo2 === 0}/>}</div>
                            <div className="flex flex-col items-center px-4 justify-center number-container">
                                <span className="text-yellow-400 font-bold text-lg number-label">SpO2</span>
                                <span className={`font-mono font-bold leading-none number-display ${alarmState !== 'none' && !vitals.alarmMuted && flash ? 'text-white' : 'text-yellow-400'}`} style={{fontSize: '18vh'}}>{vitals.simRunning ? (vitals.spo2 || '--') : '--'}</span>
                            </div>
                        </div>
                        <div className="flex-1 grid grid-cols-[1fr_1fr_280px] h-full divide-x divide-slate-800 extra-info-row">

                    </div>

        const ControllerScreen = ({ sessionId, vitals: currentVitals, onUpdate, t }) => {
            const [transitionDuration, setTransitionDuration] = useState(5);

            const [eventLog, setEventLog] = useState([]);

            const [simStartTime, setSimStartTime] = useState(null);

            useEffect(() => { setLocalTargets({ hr: currentVitals.hr, spo2: currentVitals.spo2 }); }, [currentVitals.hr, currentVitals.spo2]);

            useEffect(() => {
                let interval;
                if (currentVitals.simRunning) {
                    if (!simStartTime) setSimStartTime(Date.now());
                    interval = setInterval(() => {
                        const start = simStartTime || Date.now();
                        const elapsed = Math.floor((Date.now() - start) / 1000);

                    }, 1000);
                } else { setSimStartTime(null); setDisplayTime("00:00"); }
                return () => clearInterval(interval);
            }, [currentVitals.simRunning, simStartTime]);

            const logAction = (message, force = false) => { 
                if (!currentVitals.simRunning && !force) return;
                const baseTime = (force && !currentVitals.simRunning) ? Date.now() : simStartTime;
                const elapsedTotalSeconds = baseTime ? Math.floor((Date.now() - baseTime) / 1000) : 0;
                const timestamp = `${Math.floor(elapsedTotalSeconds / 60).toString().padStart(2, '0')}:${(elapsedTotalSeconds % 60).toString().padStart(2, '0')}`;
                setEventLog(prev => [...prev, {time: timestamp, msg: message}]);
            };

            const toggleSimulation = () => {
                const isNowRunning = !currentVitals.simRunning;
                if (isNowRunning) { logAction("Simulation Started", true); onUpdate({ ...currentVitals, simRunning: true, transition: null }); trackNeoEvent('sim_start', 'Manual simulation start', { session_id: sessionId }); }
                else { logAction("Simulation Stopped", true); onUpdate({ ...currentVitals, simRunning: false }); trackNeoEvent('sim_stop', 'Manual simulation stop', { session_id: sessionId }); }
            };

            const handleCommitChange = (field, value) => {
                const now = Date.now();
                logAction(`Changed ${field.toUpperCase()}: ${value}`);
                trackNeoEvent('vital_change', `Manual ${field} update`, { field, value, transition: transitionDuration });
                onUpdate({ ...currentVitals, [field]: value, transition: (transitionDuration > 0 && currentVitals.simRunning) ? { startTime: now, duration: transitionDuration * 1000, startHr: currentVitals.hr, targetHr: field === 'hr' ? value : currentVitals.hr, startSpo2: currentVitals.spo2, targetSpo2: field === 'spo2' ? value : currentVitals.spo2 } : null });
            };

            const applyPreset = (type, name) => {
                let p = {};
                switch(type) {
                    case 'normal': p = { hr: 142, spo2: 94 }; break;
                    case 'brady': p = { hr: 68, spo2: 75 }; break;
                    case 'desat': p = { hr: 110, spo2: 84 }; break;
                    case 'vpp': p = { hr: 88, spo2: 84 }; break;
                    case 'vpp_ct': p = { hr: 56, spo2: 65 }; break;
                }
                const now = Date.now();
                onUpdate({ ...currentVitals, ...p, transition: currentVitals.simRunning ? { startTime: now, duration: transitionDuration * 1000, startHr: currentVitals.hr, targetHr: p.hr, startSpo2: currentVitals.spo2, targetSpo2: p.spo2 } : null });
                logAction(`Scenario: ${name}`);
                trackNeoEvent('scenario_preset', `Preset: ${name}`, { preset_type: type });
            };

            return (
                <div className="h-screen overflow-y-auto bg-slate-900 text-white flex flex-col">
                    <header className="flex-none flex justify-between items-center p-4 bg-slate-800">
                        <div className="flex items-center gap-2">
                            <h2 className="font-bold text-blue-400 flex items-center gap-2"><Icons.Smartphone className="w-4 h-4"/> {t.control}</h2>
                            {currentVitals.simRunning && <span className="ml-2 px-2 py-0.5 bg-red-900/50 text-red-400 text-xs rounded border border-red-500 font-mono animate-pulse">{displayTime}</span>}
                            <button onClick={() => setShowDebrief(true)} className="ml-4 bg-slate-700 text-xs px-2 py-1 rounded flex items-center gap-1"><Icons.List className="w-3 h-3"/> {t.debriefing}</button>
                        </div>
                        <span className="text-sm font-mono border border-slate-600 px-2 py-0.5 rounded">ID: {sessionId}</span>
                    </header>

                    {showDebrief && (
                        <div className="fixed inset-0 bg-black/90 z-50 p-4 flex flex-col" onClick={() => setShowDebrief(false)}>
                            <div className="bg-slate-800 rounded-xl flex-1 flex flex-col overflow-hidden max-w-md mx-auto w-full" onClick={e => e.stopPropagation()}>
                                <div className="p-4 border-b border-slate-700 flex justify-between items-center"><h3 className="font-bold">{t.debriefing} (Min:Sec)</h3><button onClick={() => setShowDebrief(false)}><Icons.X className="w-6 h-6"/></button></div>
                                <div className="flex-1 overflow-y-auto p-4 space-y-2 bg-black/20">
                                    {eventLog.length === 0 ? <p className="text-slate-500 italic text-center mt-10">No events recorded</p> : eventLog.map((l, i) => (
                                        <div key={i} className="flex gap-3 text-sm border-b border-slate-700/30 pb-2"><span className="text-slate-400 font-mono w-14 flex-none">[{l.time}]</span><span>{l.msg}</span></div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="flex-1 p-4 space-y-6">
                        <button onClick={toggleSimulation} className={`w-full p-6 rounded-xl font-bold text-xl flex items-center justify-center gap-4 shadow-lg border-2 transition-all active:scale-95 ${currentVitals.simRunning ? "bg-red-600 border-red-400" : "bg-blue-600 border-blue-400"}`}>
                            {currentVitals.simRunning ? <Icons.X className="w-8 h-8"/> : <Icons.Play className="w-8 h-8 fill-white"/>}
                            {currentVitals.simRunning ? t.endSim : t.startSim}
                        </button>
                        <div className="bg-slate-800 p-4 rounded-xl">
                            <div className="flex justify-between mb-2 text-amber-400 font-bold"><label className="flex gap-2 text-sm"><Icons.Clock className="w-4 h-4"/> {t.transition}</label><span>{transitionDuration}s</span></div>
                            <input type="range" min="0" max="60" step="5" value={transitionDuration} onChange={e => setTransitionDuration(parseInt(e.target.value))} className="w-full h-8 time-slider"/>
                        </div>
                        <div className="bg-slate-800 p-6 rounded-xl">
                            <div className="flex justify-between mb-2 font-bold text-[#42B334]"><span>{t.hr}: {localTargets.hr}</span><span className="text-xs opacity-50">{t.act}: {currentVitals.hr}</span></div>
                            <input type="range" min="0" max="220" value={localTargets.hr} onChange={e => setLocalTargets({ ...localTargets, hr: parseInt(e.target.value) })} onTouchEnd={() => handleCommitChange('hr', localTargets.hr)} onMouseUp={() => handleCommitChange('hr', localTargets.hr)} className="w-full h-12"/>
                        </div>
                        <div className="bg-slate-800 p-6 rounded-xl">
                            <div className="flex justify-between mb-2 font-bold text-yellow-400"><span>SpO2: {localTargets.spo2}%</span><span className="text-xs opacity-50">{t.act}: {currentVitals.spo2}%</span></div>
                            <input type="range" min="0" max="100" value={localTargets.spo2} onChange={e => setLocalTargets({ ...localTargets, spo2: parseInt(e.target.value) })} onTouchEnd={() => handleCommitChange('spo2', localTargets.spo2)} onMouseUp={() => handleCommitChange('spo2', localTargets.spo2)} className="w-full h-12 accent-yellow-400"/>
                        </div>
                        <div className="grid grid-cols-2 gap-3">
                            <button onClick={() => applyPreset('normal', t.presets.normal)} className="p-4 bg-emerald-900/40 border border-emerald-500/50 rounded-lg text-emerald-400 font-bold">{t.presets.normal}</button>
                            <button onClick={() => applyPreset('brady', t.presets.brady)} className="p-4 bg-yellow-900/40 border border-yellow-500/50 rounded-lg text-yellow-400 font-bold">{t.presets.brady}</button>
                            <button onClick={() => applyPreset('desat', t.presets.desat)} className="p-4 bg-blue-900/40 border border-blue-500/50 rounded-lg text-blue-400 font-bold text-sm">{t.presets.desat}</button>
                            <button onClick={() => onUpdate({ ...currentVitals, soundType: 'grunt', soundTimestamp: Date.now() })} className="p-4 bg-orange-900/40 border border-orange-500/50 rounded-lg text-orange-400 font-bold">{t.presets.grunt}</button>
                            <button onClick={() => applyPreset('vpp', t.presets.vpp)} className="p-4 bg-indigo-900/40 border border-indigo-500/50 rounded-lg text-indigo-400 font-bold">{t.presets.vpp}</button>
                            <button onClick={() => applyPreset('vpp_ct', t.presets.vpp_ct)} className="p-4 bg-red-900/40 border border-red-500/50 rounded-lg text-red-500 font-bold">{t.presets.vpp_ct}</button>
                        </div>
                    </div>
                    <div className="flex-none bg-slate-900 p-2 flex flex-col items-center">
                        <div className="w-full opacity-30 font-mono text-[10px] tracking-widest border border-slate-700 rounded py-1 bg-black/20 text-center mb-1">SPONSOR AREA</div>

                    </div>
                </div>
            );
        };

        const QRScannerView = ({ onScan, onCancel, t }) => {
            const [sid, setSid] = useState('');
            useEffect(() => {
                const html5QrCode = new Html5Qrcode("reader");
                html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
                    try {
                        const url = new URL(decodedText); const session = url.searchParams.get('session');
                        if (session) { html5QrCode.stop().then(() => onScan(session)); }
                    } catch(e) { html5QrCode.stop().then(() => onScan(decodedText)); }
                }).catch(() => {});
                return () => { if (html5QrCode.isScanning) { html5QrCode.stop().catch(() => {}); } };
            }, []);
            return (
                <div className="fixed inset-0 bg-slate-900 z-[60] flex flex-col p-6 animate-zoom">

                            <button onClick={() => sid && onScan(sid)} className="bg-blue-600 p-4 rounded-xl px-6 font-bold"><Icons.ArrowRight/></button>
                        </div>
                    </div>
                </div>
            );
        };

        const AnimatedGuide = ({ onClose, t }) => (
            <div className="fixed inset-0 bg-slate-950/95 z-[70] flex flex-col p-6 animate-zoom overflow-y-auto">
                <div className="flex justify-between items-center mb-8"><h2 className="text-2xl font-black text-white">{t.guideTitle}</h2><button onClick={onClose} className="p-2 bg-slate-800 rounded-full"><Icons.X /></button></div>
                <div className="flex-1 flex flex-col items-center justify-center space-y-12 max-w-lg mx-auto w-full">
                    <div className="relative w-full flex flex-col items-center">
                        <div className="w-48 h-32 bg-slate-800 border-4 border-slate-700 rounded-lg flex items-center justify-center relative float-anim shadow-2xl"><Icons.Monitor className="w-10 h-10 text-green-500/50" /><div className="absolute inset-4 bg-white/10 rounded flex items-center justify-center"><Icons.QrCode className="w-8 h-8 text-white opacity-80" /></div><div className="absolute -top-4 -right-4 bg-green-600 text-[10px] font-bold px-2 py-1 rounded-full text-white shadow-lg">DEVICE A</div></div>
                        <p className="mt-4 text-center text-sm"><span className="text-green-400 font-bold uppercase block text-xs mb-1">{t.step1}</span>{t.guideStep1}</p>

                        <p className="mt-4 text-center text-sm"><span className="text-blue-400 font-bold uppercase block text-xs mb-1">{t.step2}</span>{t.guideStep2}</p>

                <button onClick={onClose} className="mt-8 bg-white text-black font-black py-4 rounded-2xl uppercase tracking-widest text-sm shadow-xl hover:bg-slate-200 transition-colors">{t.guideBtn}</button>

        const LanguageSelector = ({ currentLang, onSelect }) => {
            const [isOpen, setIsOpen] = useState(false); const menuRef = useRef(null);
            useEffect(() => {
                const handleClickOutside = (e) => { if (menuRef.current && !menuRef.current.contains(e.target)) setIsOpen(false); };

            const langs = [{ id: 'es', label: 'Español' }, { id: 'en', label: 'English' }, { id: 'pt', label: 'Português' }];
            return (
                <div className="absolute top-6 right-6 z-[80]" ref={menuRef}>
                    <button onClick={() => setIsOpen(!isOpen)} className="bg-slate-900 border border-slate-700 px-4 py-2 rounded-xl flex items-center gap-2 hover:bg-slate-800 transition-all shadow-lg min-w-[80px] justify-between"><span className="text-xs font-bold text-white uppercase">{currentLang}</span><Icons.ChevronDown className={`w-3 h-3 text-slate-500 transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`} /></button>
                    {isOpen && (<div className="absolute top-full right-0 mt-2 bg-slate-900 border border-slate-700 rounded-xl overflow-hidden shadow-2xl animate-zoom origin-top-right min-w-[120px]">{langs.map(l => (<button key={l.id} onClick={() => { onSelect(l.id); setIsOpen(false); }} className={`w-full text-left px-4 py-3 text-xs font-medium border-b border-slate-800 last:border-0 hover:bg-slate-800 transition-colors ${currentLang === l.id ? 'bg-slate-800 text-blue-400' : 'text-slate-400'}`}>{l.label}</button>))}</div>)}
                </div>
            );
        };

        const App = () => {
            const [mode, setMode] = useState('select');
            const [lang, setLang] = useState(navigator.language.startsWith('es') ? 'es' : (navigator.language.startsWith('pt') ? 'pt' : 'en'));
            const [user, setUser] = useState(null);
            const [sessionId, setSessionId] = useState('');
            const [vitals, setVitals] = useState(DEFAULT_VITALS);
            const [showScanner, setShowScanner] = useState(false);
            const [showGuide, setShowGuide] = useState(false);
            const [sid] = useState(Math.floor(1000 + Math.random() * 9000).toString());

            const t = TRANSLATIONS[lang];

            useEffect(() => {
                auth.signInAnonymously().then(cred => setUser(cred.user)).catch(() => setUser({ uid: 'guest' }));
                const p = new URLSearchParams(window.location.search);
                if (p.get('mode') && p.get('session')) { setMode(p.get('mode')); setSessionId(p.get('session')); }
            }, []);

            useEffect(() => {
                if (!sessionId || !db) return;
                const unsub = db.collection("sessions").doc(sessionId).onSnapshot(doc => { if (doc.exists) setVitals(doc.data()); });
                return () => unsub();
            }, [sessionId]);

            if (!user) return <div className="h-screen bg-black flex flex-col items-center justify-center text-green-500"><div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-green-500 mb-4"></div><span className="font-mono text-sm tracking-widest uppercase">{t.connecting}</span></div>;

            if (mode === 'select') {
                return (
                    <div className="h-screen bg-slate-950 flex flex-col items-center justify-center p-6 text-center overflow-y-auto">
                        {showGuide && <AnimatedGuide onClose={() => setShowGuide(false)} t={t} />}
                        {showScanner && <QRScannerView onScan={(s) => { setMode('control'); setSessionId(s); }} onCancel={() => setShowScanner(false)} t={t} />}
                        <LanguageSelector currentLang={lang} onSelect={setLang} />
                        <header className="mb-10">
                            <Icons.Activity className="w-16 h-16 text-green-500 mx-auto mb-4 animate-pulse"/><h1 className="text-4xl font-black mb-2 tracking-tight text-white">NeoMonitor</h1><p className="text-slate-400 text-lg font-medium">{t.mainPrompt}</p>
                            <button onClick={() => setShowGuide(true)} className="mt-4 text-blue-400 flex items-center gap-2 mx-auto text-sm font-bold border border-blue-400/30 px-4 py-2 rounded-full hover:bg-blue-400/10 transition-colors"><Icons.Help className="w-4 h-4"/>{t.howToConnect}</button>
                        </header>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl">
                            <button onClick={() => { setMode('monitor'); setSessionId(sid); }} className="bg-slate-900 border border-slate-800 hover:border-green-500/50 p-8 rounded-3xl flex flex-col items-center gap-6 group transition-all active:scale-95 shadow-2xl"><div className="bg-green-500/10 p-5 rounded-2xl group-hover:bg-green-500/20 transition-colors"><Icons.Monitor className="w-12 h-12 text-green-400"/></div><span className="text-xl font-bold text-white leading-tight">{t.useAsMonitor}</span></button>
                            <button onClick={() => setShowScanner(true)} className="bg-slate-900 border border-slate-800 hover:border-blue-500/50 p-8 rounded-3xl flex flex-col items-center gap-6 group transition-all active:scale-95 shadow-2xl"><div className="bg-blue-500/10 p-5 rounded-2xl group-hover:bg-blue-500/20 transition-colors"><Icons.Smartphone className="w-12 h-12 text-blue-400"/></div><span className="text-xl font-bold text-white leading-tight">{t.useAsControl}</span></button>
                        </div>
                        <div className="mt-12 w-full max-w-md"><SponsorSpace className="h-20 rounded-2xl bg-slate-900/50" source="Menu_Initial" t={t} /><p className="text-[10px] text-slate-600 mt-6 uppercase tracking-widest font-bold">NeoMonitor Simulator</p></div>
                    </div>
                );
            }

            return (
                <div className="font-sans antialiased">
                    {mode === 'monitor' && <MonitorScreen sessionId={sessionId} vitals={vitals} t={t} />}
                    {mode === 'control' && <ControllerScreen sessionId={sessionId} vitals={vitals} onUpdate={(v) => { if (db && sessionId) db.collection("sessions").doc(sessionId).set(v, { merge: true }); }} t={t} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
