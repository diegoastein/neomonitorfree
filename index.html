        // --- 3. FUNCIONES DE APOYO Y SONIDO ---
        let audioContext;
        const playAlarmSequence = (type) => {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!audioContext) audioContext = new AudioContext();
            const now = audioContext.currentTime;
            const createTone = (f, s, d) => { 
                const o = audioContext.createOscillator(); 
                const g = audioContext.createGain(); 
                o.connect(g); g.connect(audioContext.destination); 
                o.type = 'square'; o.frequency.value = f; 
                g.gain.setValueAtTime(0.08, s); g.gain.setValueAtTime(0, s+d); 
                o.start(s); o.stop(s+d); 
            };
            if (type === 'critical') { createTone(880, now, 0.1); createTone(880, now + 0.2, 0.1); createTone(880, now + 0.4, 0.1); }
            else if (type === 'warning') { createTone(600, now, 0.2); createTone(600, now + 0.4, 0.2); }
        };

        const playBeep = (pitch = 800) => {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!audioContext) audioContext = new AudioContext();
            const osc = audioContext.createOscillator(); 
            const gn = audioContext.createGain();
            osc.connect(gn); gn.connect(audioContext.destination);
            osc.type = 'sine'; osc.frequency.value = pitch;
            const now = audioContext.currentTime;
            gn.gain.setValueAtTime(0.1, now); 
            gn.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
            osc.start(now); osc.stop(now + 0.15);
        };

        // --- 4. HOOKS PERSONALIZADOS ---
        function useInterpolatedVitals(target) {
            const [vitals, setVitals] = useState(target);
            useEffect(() => {
                if (!target || !target.transition) { setVitals(target); return; }
                let frame;
                const animate = () => {
                    const elapsed = Date.now() - target.transition.startTime;
                    const p = Math.min(1, elapsed / target.transition.duration);
                    if (p < 1) {
                        setVitals({ 
                            ...target, 
                            hr: Math.round(target.transition.startHr + (target.transition.targetHr - target.transition.startHr) * p), 
                            spo2: Math.round(target.transition.startSpo2 + (target.transition.targetSpo2 - target.transition.startSpo2) * p) 
                        });
                        frame = requestAnimationFrame(animate);
                    } else setVitals(target);
                };
                frame = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(frame);
            }, [target]);
            return vitals;
        }

        // --- 5. COMPONENTES DE APOYO (Definidos antes de App) ---

        const WaveformCanvas = ({ color, speed, type, flatline, onBeat }) => {
            const canvasRef = useRef(null);
            const dataRef = useRef([]);
            const phaseRef = useRef(0);
            const lastTimeRef = useRef(performance.now());
            const variability = useRef({ amplitude: 1, width: 1 });

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let frameId;
                const draw = (time) => {
                    const deltaTime = (time - lastTimeRef.current) / 1000;
                    lastTimeRef.current = time;
                    if (deltaTime > 0.1) { frameId = requestAnimationFrame(draw); return; }
                    if (canvas.width !== canvas.offsetWidth) {
                        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
                        dataRef.current = new Array(canvas.width).fill(canvas.height / 2);
                    }
                    let newValue = canvas.height / 2;
                    const baseAmplitude = canvas.height / 3;

                    if (!flatline && speed > 0) {
                        const beatsPerSecond = speed / 60;
                        const prevPhase = phaseRef.current;
                        phaseRef.current += (beatsPerSecond * 2 * Math.PI) * deltaTime;
                        if (phaseRef.current >= 2 * Math.PI) {
                            phaseRef.current -= 2 * Math.PI;
                            variability.current = { amplitude: 0.85 + Math.random() * 0.3, width: 0.95 + Math.random() * 0.1 };
                            if (type === 'ecg' && onBeat) onBeat();
                        }
                        const p = phaseRef.current;
                        const { amplitude, width } = variability.current;

                        if (type === 'ecg') {
                            const scaledPhase = (p - Math.PI) / width + Math.PI;
                            if (scaledPhase > 3.0 && scaledPhase < 3.28) newValue = (canvas.height / 2) - (baseAmplitude * 2.5 * amplitude * Math.exp(-Math.pow(scaledPhase - Math.PI, 2) * 50));
                            else if (scaledPhase > 3.5 && scaledPhase < 4.5) newValue = (canvas.height / 2) - (baseAmplitude * 0.3 * amplitude * Math.sin(scaledPhase - 3.5));
                            else newValue = (canvas.height / 2) + (Math.random() * 1.5 - 0.75);
                        } else newValue = (canvas.height / 2) - (Math.sin(p) * baseAmplitude * 0.6 * amplitude);
                    } else newValue = (canvas.height / 2) + (Math.random() * 2 - 1);
                    
                    dataRef.current.push(newValue); dataRef.current.shift();
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.lineWidth = 2.5; ctx.strokeStyle = color; ctx.beginPath();
                    for (let i = 0; i < dataRef.current.length; i++) { if (i === 0) ctx.moveTo(i, dataRef.current[i]); else ctx.lineTo(i, dataRef.current[i]); }
                    ctx.stroke(); frameId = requestAnimationFrame(draw);
                };
                frameId = requestAnimationFrame(draw);
                return () => cancelAnimationFrame(frameId);
            }, [color, speed, type, flatline, onBeat]);

            return <canvas ref={canvasRef} className="w-full h-full block" />;

                    <div className="relative w-full flex flex-col items-center">

                            <div className="absolute inset-4 bg-white/10 rounded flex items-center justify-center"><Icons.QrCode className="w-8 h-8 text-white opacity-80" /></div>
                        </div>
                        <p className="mt-4 text-center text-sm"><span className="text-green-400 font-bold uppercase block text-xs mb-1">{t.step1}</span>{t.guideStep1}</p>
                    </div>
                    <div className="relative w-full flex flex-col items-center">
                        <div className="w-20 h-40 bg-slate-800 border-4 border-slate-700 rounded-2xl flex items-center justify-center relative float-anim shadow-2xl" style={{animationDelay:'1.5s'}}>
                            <div className="absolute inset-2 bg-black rounded-lg overflow-hidden flex flex-col items-center justify-center">
                                <div className="w-full h-1/2 bg-blue-500/10 flex items-center justify-center relative overflow-hidden"><div className="scan-line"></div><Icons.Camera className="w-6 h-6 text-blue-400 opacity-50" /></div>
                            </div>
                        </div>
                        <p className="mt-4 text-center text-sm"><span className="text-blue-400 font-bold uppercase block text-xs mb-1">{t.step2}</span>{t.guideStep2}</p>
                    </div>
                </div>
                <button onClick={onClose} className="mt-8 bg-white text-black font-black py-4 rounded-2xl uppercase tracking-widest text-sm shadow-xl hover:bg-slate-200 transition-colors">{t.guideBtn}</button>
            </div>
        );

        const QRScannerView = ({ onScan, onCancel, t }) => {
            const [sid, setSid] = useState('');
            useEffect(() => {
                const html5QrCode = new Html5Qrcode("reader");
                html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
                    try {
                        const url = new URL(decodedText); const session = url.searchParams.get('session');
                        if (session) { html5QrCode.stop().then(() => onScan(session)); }
                    } catch(e) { html5QrCode.stop().then(() => onScan(decodedText)); }
                }).catch(() => {});
                return () => { if (html5QrCode.isScanning) { html5QrCode.stop().catch(() => {}); } };
            }, []);
            return (
                <div className="fixed inset-0 bg-slate-950 z-[100] flex flex-col p-6 animate-zoom">
                    <div className="flex justify-between mb-8"><h2 className="text-xl font-bold uppercase tracking-widest">{t.scanCamera}</h2><button onClick={onCancel} className="p-2 bg-slate-800 rounded-full"><Icons.X/></button></div>
                    <div className="bg-black rounded-3xl overflow-hidden mb-8 border-2 border-slate-800"><div id="reader"></div></div>
                    <div className="mt-auto space-y-4">
                        <p className="text-slate-500 text-xs text-center uppercase tracking-widest font-bold">{t.scanManual}</p>
                        <div className="flex gap-2 max-w-sm mx-auto">
                            <input id="manual-id" type="number" className="flex-1 bg-slate-800 p-4 rounded-xl text-center text-2xl font-mono" placeholder="0000" onChange={e => setSid(e.target.value)} value={sid}/>
                            <button onClick={() => sid && onScan(sid)} className="bg-blue-600 px-8 rounded-xl shadow-lg"><Icons.ArrowRight/></button>
                        </div>
                    </div>
                </div>
            );
        };

        const MonitorScreen = ({ sessionId, vitals: targetVitals, t }) => {
            const vitals = useInterpolatedVitals(targetVitals);
            const profile = PATIENT_PROFILES[vitals?.patientType || 'neonatal'];
            const [audioEnabled, setAudioEnabled] = useState(false);
            const [time, setTime] = useState(new Date());
            const [alarmState, setAlarmState] = useState('none');
            const [flash, setFlash] = useState(false);
            const [qrExpanded, setQrExpanded] = useState(false);
            const [hrDrift, setHrDrift] = useState(0);

            useEffect(() => { const i = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(i); }, []);
            useEffect(() => { if (!vitals?.simRunning) { setHrDrift(0); return; } const d = setInterval(() => { setHrDrift([-2, -1, 0, 1, 2][Math.floor(Math.random() * 5)]); }, 4000); return () => clearInterval(d); }, [vitals?.simRunning]);

            useEffect(() => {
                if (!vitals?.simRunning) { setAlarmState('none'); return; }
                let level = 'none';
                if (vitals.hr < profile.crit || vitals.hr === 0 || vitals.spo2 < 80) level = 'critical';
                else if (vitals.hr < profile.brady || vitals.hr > profile.tachy || vitals.spo2 < 89) level = 'warning';
                setAlarmState(level);
                const i = setInterval(() => setFlash(p => !p), level === 'critical' ? 300 : 800);
                return () => clearInterval(i);
            }, [vitals?.hr, vitals?.spo2, vitals?.simRunning, profile]);

            useEffect(() => {
                let i; if (audioEnabled && !vitals?.alarmMuted && alarmState !== 'none' && vitals?.simRunning) {
                    playAlarmSequence(alarmState); i = setInterval(() => playAlarmSequence(alarmState), alarmState === 'critical' ? 2500 : 4000);
                } return () => clearInterval(i);
            }, [alarmState, audioEnabled, vitals?.alarmMuted, vitals?.simRunning]);

            const displayHr = vitals?.simRunning && vitals.hr > 0 ? (vitals.hr + hrDrift) : (vitals?.simRunning ? vitals.hr : '--');

            return (
                <div className={`w-full h-screen bg-black flex flex-col border-[12px] transition-colors duration-100 ${alarmState === 'none' || vitals?.alarmMuted || !vitals?.simRunning ? 'border-slate-900' : (alarmState === 'critical' ? (flash ? 'border-red-600 bg-red-900/10' : 'border-red-900') : (flash ? 'border-yellow-500 bg-yellow-900/10' : 'border-yellow-900'))} monitor-screen`}>
                    {!audioEnabled && (
                        <div className="absolute inset-0 bg-black/90 z-50 flex items-center justify-center p-6 text-center"><button onClick={() => setAudioEnabled(true)} className="bg-green-600 px-10 py-5 rounded-2xl font-black text-xl animate-pulse uppercase tracking-widest">{t.startMonitorBtn}</button></div>
                    )}
                    {qrExpanded && (
                        <div className="fixed inset-0 bg-black/95 z-[100] flex flex-col items-center justify-center p-6" onClick={() => setQrExpanded(false)}>
                            <div className="bg-white p-4 rounded-3xl relative animate-zoom max-w-xs w-full" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setQrExpanded(false)} className="absolute -top-12 right-0 text-white"><Icons.X className="w-8 h-8"/></button>
                                <img src={`https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(window.location.origin + window.location.pathname + '?mode=control&session=' + sessionId)}`} className="w-full h-full"/>
                            </div>
                            <p className="mt-8 text-white font-bold text-center">{t.scanPhonePrompt}</p>
                        </div>
                    )}
                    <div className="flex-none flex justify-between px-4 py-2 bg-slate-900/50 text-slate-400 text-sm font-mono border-b border-slate-800">
                        <div className="flex gap-4"><span>{profile.tag}</span><span>{t.bed}: 01</span></div>
                        <div className="flex gap-4 items-center">{vitals?.alarmMuted && <Icons.VolumeX className="text-orange-500 w-4 h-4" />}<span>ID: {sessionId}</span></div>
                    </div>
                    <div className="flex-1 flex flex-col divide-y divide-slate-800 min-h-0">
                        <div className="flex-[1.5] grid grid-cols-[1fr_280px] main-row">
                            <div className="relative border-r border-slate-800 bg-black waveform-col">
                                {vitals?.simRunning && <WaveformCanvas color="#42B334" speed={displayHr !== '--' ? displayHr : 0} type="ecg" flatline={vitals.hr === 0} onBeat={() => { if (audioEnabled && !vitals.alarmMuted) playBeep(vitals.spo2 < 89 ? 400 : 800); }}/>}
                            </div>
                            <div className="flex flex-col items-center justify-center">
                                <div className="flex items-center gap-3">
                                    <span className="text-[#42B334] font-bold text-lg uppercase">{t.hr}</span>
                                    {vitals?.simRunning && vitals.hr > 0 && <Icons.Heart className="heart-portrait text-red-600 fill-red-600 w-6 h-6" style={{ animation: `heartbeat ${60/displayHr}s infinite cubic-bezier(0.4, 0, 0.2, 1)` }}/>}
                                </div>
                                <span className={`font-mono font-bold leading-none ${alarmState !== 'none' && !vitals?.alarmMuted && flash ? 'text-white' : 'text-[#42B334]'}`} style={{fontSize: '18vh'}}>{displayHr}</span>
                            </div>
                        </div>
                        <div className="flex-[1.5] grid grid-cols-[1fr_280px] main-row">
                            <div className="relative border-r border-slate-800 bg-black waveform-col">
                                {vitals?.simRunning && <WaveformCanvas color="#facc15" speed={displayHr !== '--' ? displayHr : 0} type="pleth" flatline={vitals.spo2 === 0}/>}
                            </div>
                            <div className="flex flex-col items-center justify-center">
                                <span className="text-yellow-400 font-bold text-lg uppercase">SpO2</span>
                                <span className={`font-mono font-bold leading-none ${alarmState !== 'none' && !vitals?.alarmMuted && flash ? 'text-white' : 'text-yellow-400'}`} style={{fontSize: '18vh'}}>{vitals?.simRunning ? (vitals.spo2 || '--') : '--'}</span>
                            </div>
                        </div>
                    </div>
                    <div className="flex-none bg-slate-900 p-2 flex justify-between items-center text-xs text-slate-500">
                        <div className="flex gap-2">
                            <div className="soft-key px-4 py-2 uppercase font-bold">{t.mute}</div>
                            <div className="soft-key qr-button px-4 py-2 flex items-center gap-1 font-bold" onClick={() => setQrExpanded(true)}><Icons.QrCode className="w-4 h-4" /><span>{t.link}</span></div>
                        </div>
                        <div className="flex gap-4 items-center font-mono text-slate-500"><span>{time.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span><Icons.Wifi className="w-5 h-5 text-green-500"/><Icons.Battery className="w-5 h-5 text-green-500"/></div>
                    </div>
                </div>
            );
        };

        const ControllerScreen = ({ sessionId, vitals: currentVitals, onUpdate, t }) => {
            const profile = PATIENT_PROFILES[currentVitals?.patientType || 'neonatal'];
            const [transition, setTransition] = useState(5);
            const [localTargets, setLocalTargets] = useState({ hr: currentVitals?.hr || 120, spo2: currentVitals?.spo2 || 95 });
            useEffect(() => { if (currentVitals) setLocalTargets({ hr: currentVitals.hr, spo2: currentVitals.spo2 }); }, [currentVitals?.hr, currentVitals?.spo2]);

            const applyPreset = (type) => {
                let p = { hr: profile.normalHr, spo2: 95 };
                if (type === 'brady') p = { hr: profile.brady - 20, spo2: 75 };
                if (type === 'desat') p = { hr: profile.normalHr - 30, spo2: 84 };
                if (type === 'vpp_ct') p = { hr: profile.crit - 20, spo2: 60 };
                onUpdate({ ...currentVitals, ...p, transition: currentVitals.simRunning ? { startTime: Date.now(), duration: transition*1000, startHr: currentVitals.hr, targetHr: p.hr, startSpo2: currentVitals.spo2, targetSpo2: p.spo2 } : null });
            };

            const commit = (f, v) => onUpdate({ ...currentVitals, [f]: v, transition: (currentVitals.simRunning && transition > 0) ? { startTime: Date.now(), duration: transition*1000, startHr: currentVitals.hr, targetHr: f==='hr'?v:currentVitals.hr, startSpo2: currentVitals.spo2, targetSpo2: f==='spo2'?v:currentVitals.spo2 } : null });

            return (
                <div className="h-screen overflow-y-auto bg-slate-900 text-white flex flex-col p-4 space-y-6">
                    <header className="flex justify-between items-center"><h2 className="font-bold text-blue-400 uppercase tracking-widest">{profile.label.es} Mode</h2></header>
                    <button onClick={() => onUpdate({ ...currentVitals, simRunning: !currentVitals.simRunning })} className={`w-full p-6 rounded-2xl font-black text-xl shadow-2xl border-2 transition-all active:scale-95 ${currentVitals.simRunning ? "bg-red-600 border-red-400 shadow-red-900/20" : "bg-blue-600 border-blue-400 shadow-blue-900/20"}`}>{currentVitals.simRunning ? t.endSim : t.startSim}</button>
                    <div className="bg-slate-800/50 p-4 rounded-2xl border border-slate-700">
                        <div className="flex justify-between mb-2 text-amber-500 text-[10px] font-black uppercase tracking-widest"><span>{t.transition}</span><span>{transition}s</span></div>
                        <input type="range" min="0" max="60" step="5" value={transition} onChange={e => setTransition(parseInt(e.target.value))} className="w-full h-8 time-slider"/>
                    </div>
                    <div className="bg-slate-800/50 p-6 rounded-2xl border border-slate-700">
                        <div className="flex justify-between mb-2 font-bold text-[#42B334]"><span>FC: {localTargets.hr}</span><span className="text-[10px] opacity-40">{t.act}: {currentVitals.hr}</span></div>
                        <input type="range" min="0" max={profile.maxHr} value={localTargets.hr} onChange={e => setLocalTargets({...localTargets, hr: parseInt(e.target.value)})} onTouchEnd={() => commit('hr', localTargets.hr)} className="w-full h-12"/>
                    </div>
                    <div className="bg-slate-800/50 p-6 rounded-2xl border border-slate-700">
                        <div className="flex justify-between mb-2 font-bold text-yellow-400"><span>SpO2: {localTargets.spo2}%</span><span className="text-[10px] opacity-40">{t.act}: {currentVitals.spo2}%</span></div>
                        <input type="range" min="0" max="100" value={localTargets.spo2} onChange={e => setLocalTargets({...localTargets, spo2: parseInt(e.target.value)})} onTouchEnd={() => commit('spo2', localTargets.spo2)} className="w-full h-12 accent-yellow-400"/>
                    </div>
                    <div className="grid grid-cols-2 gap-4">{['normal','brady','desat','vpp_ct'].map(p => <button key={p} onClick={() => applyPreset(p)} className="p-4 bg-slate-800 border border-slate-700 rounded-xl font-bold uppercase text-xs active:bg-slate-700">{t.presets[p]}</button>)}</div>
                </div>
            );
        };

        // --- 6. COMPONENTE PRINCIPAL ---

        const App = () => {
            const [mode, setMode] = useState('select');
            const [lang, setLang] = useState(navigator.language.startsWith('es') ? 'es' : (navigator.language.startsWith('pt') ? 'pt' : 'en'));
            const [patient, setPatient] = useState('neonatal');
            const [user, setUser] = useState(null);
            const [sessionId, setSessionId] = useState('');
            const [vitals, setVitals] = useState(DEFAULT_VITALS);
            const [showScanner, setShowScanner] = useState(false);
            const [showGuide, setShowGuide] = useState(false);
            const [sid] = useState(Math.floor(1000 + Math.random() * 9000).toString());

            const t = TRANSLATIONS[lang];

            useEffect(() => {
                auth.signInAnonymously().then(cred => setUser(cred.user));
                const p = new URLSearchParams(window.location.search);
                if (p.get('mode') && p.get('session')) { setMode(p.get('mode')); setSessionId(p.get('session')); }
            }, []);

            useEffect(() => {
                if (!sessionId) return;
                const unsub = db.collection("sessions").doc(sessionId).onSnapshot(doc => { if (doc.exists) setVitals(doc.data()); });
                return () => unsub();
            }, [sessionId]);

            if (!user) return <div className="h-screen bg-black flex items-center justify-center text-green-500 font-mono tracking-widest uppercase">CONECTANDO...</div>;

            if (mode === 'select') {
                return (
                    <div className="h-screen bg-slate-950 flex flex-col items-center justify-center p-6 text-center overflow-y-auto">
                        {showGuide && <AnimatedGuide onClose={() => setShowGuide(false)} t={t} />}
                        <LanguageSelector currentLang={lang} onSelect={setLang} />
                        <ProfileSelector currentProfile={patient} onSelect={setPatient} lang={lang} />
                        
                        <header className="mb-10">
                            <Icons.Activity className="w-16 h-16 text-green-500 mx-auto mb-4 animate-pulse"/><h1 className="text-4xl font-black mb-2 text-white">NeoMonitor</h1>
                            <p className="text-slate-400 text-lg font-medium">{t.mainPrompt}</p>
                            <button onClick={() => setShowGuide(true)} className="mt-4 text-blue-400 flex items-center gap-2 mx-auto text-sm font-bold border border-blue-400/30 px-4 py-2 rounded-full hover:bg-blue-400/10 transition-colors"><Icons.Help className="w-4 h-4"/>{t.howToConnect}</button>
                        </header>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl">
                            <button onClick={() => { setMode('monitor'); setSessionId(sid); db.collection("sessions").doc(sid).set({...DEFAULT_VITALS, patientType: patient}); }} className="bg-slate-900 border border-slate-800 p-8 rounded-3xl flex flex-col items-center gap-6 group transition-all shadow-2xl active:scale-95 shadow-lg"><div className="bg-green-500/10 p-5 rounded-2xl group-hover:bg-green-500/20 transition-colors"><Icons.Monitor className="w-12 h-12 text-green-400"/></div><span className="text-xl font-bold text-white">{t.useAsMonitor}</span></button>
                            <button onClick={() => setShowScanner(true)} className="bg-slate-900 border border-slate-800 p-8 rounded-3xl flex flex-col items-center gap-6 group transition-all shadow-2xl active:scale-95 shadow-lg"><div className="bg-blue-500/10 p-5 rounded-2xl group-hover:bg-blue-500/20 transition-colors"><Icons.Smartphone className="w-12 h-12 text-blue-400"/></div><span className="text-xl font-bold text-white">{t.useAsControl}</span></button>
                        </div>

                        {showScanner && <QRScannerView onScan={(s) => { setMode('control'); setSessionId(s); }} onCancel={() => setShowScanner(false)} t={t} />}
                        
                        <p className="mt-12 text-[10px] text-slate-700 font-bold uppercase tracking-widest">Free Education Edition • Dr. Diego Steinberg</p>
                    </div>
                );
            }

            return (
                <div className="font-sans antialiased">
                    {mode === 'monitor' && <MonitorScreen sessionId={sessionId} vitals={vitals} t={t} />}
                    {mode === 'control' && <ControllerScreen sessionId={sessionId} vitals={vitals} onUpdate={(v) => db.collection("sessions").doc(sessionId).set(v, { merge: true })} t={t} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
