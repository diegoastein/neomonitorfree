    <script>
        (function() {
            var host = window.location.hostname;
            var protocol = window.location.protocol;
            
            // Ignorar entorno local (pruebas)
            if (host.includes('localhost') || host.includes('127.0.0.1') || host.includes('.local')) {
                return;
            }

            var newHost = host;
            var newProtocol = protocol;
            var needsRedirect = false;

            // 1. Forzar HTTPS
            if (protocol !== 'https:') {
                newProtocol = 'https:';
                needsRedirect = true;
            }

            // 2. Quitar 'www.' si existe
            if (host.startsWith('www.')) {
                newHost = host.substring(4);
                needsRedirect = true;
            }

            if (needsRedirect) {
                window.location.replace(newProtocol + '//' + newHost + window.location.pathname + window.location.search + window.location.hash);
            }
        })();
    </script>

    <script>
        function showError(title, details) {
            if (details.includes('network') || details.includes('fetch') || details.includes('offline')) return;
            const log = document.getElementById('debug-log');
            log.style.display = 'block';
            log.innerHTML = `<strong>${title}</strong><br/>${details}`;
            setTimeout(() => { log.style.display = 'none'; }, 5000);
        }
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            if (msg.includes('ResizeObserver')) return false;
            if (msg === 'Script error.') return false; 
            showError('Aviso:', msg);
            return false;
        };
        window.onunhandledrejection = function(event) {
            let message = event.reason ? (event.reason.message || event.reason) : 'Error desconocido';
            if (message.toString().toLowerCase().includes('client is offline') || message.toString().includes('network')) return; 
            if(message.toString().includes('auth/unauthorized-domain')) {
                message = "BLOQUEADO: Dominio no autorizado en Firebase.";
                showError('Configuración:', message);
            }
        };
    </script>

        };

        const MonitorScreen = ({ sessionId, vitals: targetVitals, connectionStatus }) => {
            const vitals = useInterpolatedVitals(targetVitals);
            const [alarmState, setAlarmState] = useState('none');
            const [flash, setFlash] = useState(false);
            const [audioEnabled, setAudioEnabled] = useState(false);
            const [time, setTime] = useState(new Date());
            const [showQR, setShowQR] = useState(false);
            const [qrUrl, setQrUrl] = useState('');
            const [isSmallScreen, setIsSmallScreen] = useState(false);

            const videoRef = useRef(null);

            const isPreviewEnv = window.location.hostname.includes('usercontent.goog') || window.location.protocol === 'file:';

            useEffect(() => {
                const checkSize = () => { setIsSmallScreen(window.innerWidth < 900); };
                checkSize();
                window.addEventListener('resize', checkSize);
                return () => window.removeEventListener('resize', checkSize);
            }, []);

            useEffect(() => {
                const checkOrientation = () => setIsMobilePortrait(window.innerWidth < 600 && window.innerHeight > window.innerWidth);
                window.addEventListener('resize', checkOrientation);
                window.addEventListener('orientationchange', checkOrientation);
                return () => { window.removeEventListener('resize', checkOrientation); window.removeEventListener('orientationchange', checkOrientation); };
            }, []);

            const enableAudio = () => { 
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); 
                setAudioEnabled(true);
                const elem = document.documentElement;
                if (elem.requestFullscreen) elem.requestFullscreen().catch(() => {});
                else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
                if (videoRef.current) videoRef.current.play().catch(e => console.log("Video autoplay failed", e));
            };

            const handleBeat = () => {
                setBeatFlash(true);
                setTimeout(() => setBeatFlash(false), 200);
                if (!audioEnabled || vitals.alarmMuted) return;
                playBeep(vitals.spo2 < 89 ? 400 : 800);
            };

            useEffect(() => { const timer = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(timer); }, []);
            useEffect(() => { 
                try { 
                    if (vitals.soundTimestamp > 0 && vitals.soundType) {
                        playClinicalSound(vitals.soundType); 
                    }
                } catch (e) {} 
            }, [vitals.soundTimestamp, vitals.soundType]);
            
            useEffect(() => {
                let level = 'none';
                if (vitals.hr < 60 || vitals.hr === 0 || vitals.spo2 < 80) level = 'critical';
                else if (vitals.hr < 100 || vitals.hr > 180 || vitals.spo2 < 89 || vitals.spo2 > 95) level = 'warning';
                setAlarmState(level);
                const interval = setInterval(() => setFlash(p => !p), level === 'critical' ? 300 : 800);
                return () => clearInterval(interval);
            }, [vitals.hr, vitals.spo2]);

            useEffect(() => {
                let interval;
                if (audioEnabled && !vitals.alarmMuted && alarmState !== 'none') {
                    playAlarmSequence(alarmState);
                    interval = setInterval(() => playAlarmSequence(alarmState), alarmState === 'critical' ? 2500 : 4000);
                } return () => clearInterval(interval);
            }, [alarmState, audioEnabled, vitals.alarmMuted]);

            useEffect(() => {
                if (showQR || isSmallScreen || isMobilePortrait) {
                    let baseUrl = window.location.origin + window.location.pathname;
                    if (!baseUrl.endsWith('/') && !baseUrl.endsWith('.html')) baseUrl += '/';
                    setQrUrl(`${baseUrl}?mode=control&session=${sessionId}`);
                }
            }, [showQR, sessionId, isSmallScreen, isMobilePortrait]);

            const getBorderColor = () => {
                if (alarmState === 'none' || vitals.alarmMuted) return 'border-transparent';
                if (alarmState === 'critical') return flash ? 'border-red-600 bg-red-900/20' : 'border-red-900';
                return flash ? 'border-yellow-500 bg-yellow-900/20' : 'border-yellow-900';
            };
            const getTextColor = (base) => (alarmState !== 'none' && !vitals.alarmMuted && flash) ? 'text-white' : base;

            if (isMobilePortrait) {
                const alarmBorderColor = alarmState !== 'none' && !vitals.alarmMuted && flash
                    ? (alarmState === 'critical' ? '#ef4444' : '#eab308')

                    <div style={{width:'100%', height:'100vh', background:'#0a0a14', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:'16px'}}>

                                    <div className="absolute bottom-4 left-4 flex gap-0.5 h-12 items-end">
                                        {[1,2,3,4,5,6,7].map(i => (
                                            <div key={i} className={`w-2 rounded-sm ${i < (vitals.spo2 > 0 ? 6 : 1) ? 'bg-green-500' : 'bg-slate-700'}`} style={{height: `${i*14}%`}}></div>
                                        ))}
                                    </div>
                                </div>

                                <div className="flex flex-col relative h-full">
                                    <div className="flex-1 flex flex-col items-center justify-center p-2 relative border-b border-slate-800">
                                        <span className="text-green-500 font-bold text-lg absolute top-2 left-2">PR bpm</span>
                                        <span className={`font-mono font-bold leading-none ${getTextColor('text-green-500')}`} style={{fontSize: '20vh'}}>
                                            {vitals.hr || '--'}
                                        </span>
                                    </div>
                                    <div className="h-1/5 w-full bg-black relative">
                                        <WaveformCanvas color="#facc15" speed={vitals.hr} type="pleth" flatline={vitals.spo2 === 0} onBeat={handleBeat}/>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-slate-900 border-t border-slate-700 p-2 flex justify-between items-center">
                                <div className="flex items-center gap-2 text-slate-500 text-xs font-mono">
                                    <span>ID: <span className="text-white font-bold">{sessionId}</span></span>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => {
                                        if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
                                        else document.exitFullscreen().catch(() => {});
                                    }} className="p-2 bg-slate-800 rounded text-slate-400">
                                        <Icons.Maximize className="w-3 h-3" />
                                    </button>
                                    <button 
                                        onClick={() => setShowQR(!showQR)}
                                        className={`px-3 py-1 rounded text-xs font-bold flex items-center gap-1 ${showQR ? 'bg-white text-black' : 'bg-blue-900/50 text-blue-300 border border-blue-800'}`}
                                    >
                                        <Icons.QrCode className="w-3 h-3"/> {showQR ? 'Ocultar' : 'Conectar'}
                                    </button>
                                </div>
                            </div>

                             {!audioEnabled && !showQR && (
                                <div className="absolute inset-0 bg-black/90 z-40 flex items-center justify-center" onClick={enableAudio}>
                                    <div className="text-center animate-pulse">
                                        <Icons.Play className="w-12 h-12 text-white mx-auto mb-2" />
                                        <span className="text-white font-bold text-sm">TOCAR PARA INICIAR</span>
                                    </div>
                                </div>
                            )}

                             {showQR && (
                                <div className="absolute inset-0 bg-black/95 z-50 flex flex-col items-center justify-center p-4" onClick={() => setShowQR(false)}>
                                     <div className="bg-white p-4 rounded-lg flex flex-col items-center shadow-2xl">
                                        <h3 className="text-black font-bold mb-2 text-sm">Conexión Remota</h3>

                <div className={`w-full h-screen bg-black flex flex-col border-[12px] ${getBorderColor()} transition-colors duration-100 overflow-hidden relative hardware-accelerated`}>
                    <video ref={videoRef} loop muted playsInline src={noSleepVideo} style={{position: 'absolute', width: 1, height: 1, opacity: 0.01, pointerEvents: 'none'}} />

                    {!connectionStatus && <div className="absolute top-0 left-0 w-full bg-red-600 text-white text-center text-xs py-1 z-50">Reconectando...</div>}
                    {!audioEnabled && !showQR && (

                                <Icons.Play className="w-8 h-8 fill-current" /> Click para Iniciar Monitor y Sonido

                    )}
                    {showQR && (
                        <div className="absolute inset-0 bg-black/90 z-50 flex flex-col items-center justify-center p-8 text-center">

                        <div className="flex gap-2 h-full">
                            <div className="soft-key w-24">Menú<br/>Principal</div><div className="soft-key w-24">Silenciar<br/>Alarmas</div><div className="soft-key w-24">Tendencias</div>
                            <div onClick={() => setShowQR(true)} className="soft-key w-24 bg-blue-900/30 text-blue-200 border-blue-800 hover:bg-blue-800/50">C. Remoto<br/><Icons.QrCode className="inline w-3 h-3 ml-1"/></div>
                        </div>
                        <div className="flex gap-2 h-full"><div className="soft-key w-24 text-slate-500 border-slate-800 cursor-not-allowed">PNI<br/>Inicio/Parada</div><div className="soft-key w-24 text-slate-500 border-slate-800 cursor-not-allowed">Cero<br/>PNI</div></div>
                        <div className="flex items-center gap-4 px-4 text-slate-400 font-mono text-sm border-l border-slate-700 ml-4">
                            <div className="flex flex-col items-end"><span>{time.toLocaleTimeString()}</span><span className="text-xs">{time.toLocaleDateString()}</span></div>
                            <div className="flex gap-3">{connectionStatus ? <Icons.Wifi className="w-5 h-5 text-green-500" /> : <Icons.WifiOff className="w-5 h-5 text-red-500 animate-pulse" />}<Icons.Battery className="w-5 h-5 text-green-500" /></div>
                        </div>
                    </div>
                </div>
            );
        };

        const ControllerScreen = ({ sessionId, vitals: currentVitals, onUpdate }) => {
            const vitals = useInterpolatedVitals(currentVitals);
            const [transitionDuration, setTransitionDuration] = useState(5); 
            const [showDebrief, setShowDebrief] = useState(false);
            const [eventLog, setEventLog] = useState([]);
            const [tabMode, setTabMode] = useState('manual');
            
            const [activeScenario, setActiveScenario] = useState(null);
            const [currentNodeId, setCurrentNodeId] = useState(null);

            const [targets, setTargets] = useState(currentVitals);
            const targetsRef = useRef(currentVitals);
            const isDraggingRef = useRef(false);

            useEffect(() => {
                if (!isDraggingRef.current) {
                    const newTargets = { ...targets, hr: currentVitals.hr, spo2: currentVitals.spo2, resp: currentVitals.resp };
                    setTargets(newTargets);
                    targetsRef.current = newTargets;
                }
            }, [currentVitals.hr, currentVitals.spo2, currentVitals.resp]);

            const logAction = (message) => { const timestamp = new Date().toLocaleTimeString(); setEventLog(prev => [{time: timestamp, msg: message}, ...prev]); };

            const handleSliderChange = (field, value) => {
                const newTargets = { ...targets, [field]: value };
                setTargets(newTargets);
                targetsRef.current = newTargets;
            };

            const handleSliderStart = () => { isDraggingRef.current = true; };

            const handleCommitChange = (field) => {
                isDraggingRef.current = false;
                const now = Date.now();
                const durationMs = transitionDuration * 1000;
                const currentTargets = targetsRef.current;

                if (field === 'hr') logAction(`Cambio manual FC: ${currentTargets.hr} lpm`);
                if (field === 'spo2') logAction(`Cambio manual SpO2: ${currentTargets.spo2}%`);

                onUpdate({ 
                    ...currentTargets, 
                    transition: (durationMs > 0) ? { 
                        startTime: now, 
                        duration: durationMs, 
                        startHr: vitals.hr, 
                        targetHr: currentTargets.hr, 
                        startSpo2: vitals.spo2, 
                        targetSpo2: currentTargets.spo2, 
                        startResp: vitals.resp, 
                        targetResp: currentTargets.resp || 45 
                    } : null 
                });
            };

            const triggerSound = (type, name) => { onUpdate({ ...targets, soundType: type, soundTimestamp: Date.now() }); logAction(`Sonido: ${name}`); };

            const applyPreset = (type, name) => {
                let presetValues = {};
                switch(type) {
                    case 'normal': presetValues = { hr: 142, spo2: 94, resp: 45 }; break;
                    case 'brady': presetValues = { hr: 68, spo2: 75, resp: 20 }; break;
                    case 'desat': presetValues = { hr: 110, spo2: 84, resp: 60 }; break;
                    case 'vpp': presetValues = { hr: 88, spo2: 84, resp: 40 }; break;
                    case 'vpp_ct': presetValues = { hr: 56, spo2: 65, resp: 0 }; break;
                }
                const newTargets = { ...targets, ...presetValues };
                setTargets(newTargets);
                targetsRef.current = newTargets;

                const now = Date.now(); const durationMs = transitionDuration * 1000;
                onUpdate({ ...presetValues, transition: (durationMs > 0) ? { startTime: now, duration: durationMs, startHr: vitals.hr, targetHr: presetValues.hr, startSpo2: vitals.spo2, targetSpo2: presetValues.spo2, startResp: vitals.resp, targetResp: presetValues.resp } : null });
                logAction(`Escenario: ${name}`);
            };

            const startScenario = (key) => {
                const scenario = SCENARIOS_DATA[key];
                setActiveScenario(scenario);
                setCurrentNodeId(scenario.startNode);
                const startNode = scenario.nodes[scenario.startNode];
                const newTargets = { ...targets, ...startNode.vitals };
                setTargets(newTargets);
                targetsRef.current = newTargets;
                onUpdate({ ...startNode.vitals, transition: null });
                logAction(`Inicio Escenario: ${scenario.title}`);
            };

            const handleScenarioDecision = (option) => {
                const scenario = activeScenario;
                const nextNode = scenario.nodes[option.next];
                const now = Date.now();
                const durationMs = option.time * 1000;
                
                const newTargets = { ...targets, ...nextNode.vitals };
                setTargets(newTargets);
                targetsRef.current = newTargets;

                onUpdate({
                    ...nextNode.vitals,
                    transition: {
                        startTime: now,
                        duration: durationMs,
                        startHr: vitals.hr,
                        targetHr: nextNode.vitals.hr,
                        startSpo2: vitals.spo2,
                        targetSpo2: nextNode.vitals.spo2,
                        startResp: vitals.resp,
                        targetResp: nextNode.vitals.resp
                    }
                });

                setCurrentNodeId(option.next);
                logAction(`Decisión: ${option.label} -> (En ${option.time}s)`);
            };

            const exitScenario = () => {
                setActiveScenario(null);
                setCurrentNodeId(null);
                logAction("Fin de Escenario");
            };

            return (
                <div className="h-screen overflow-y-auto bg-slate-900 text-white pb-20 flex flex-col">
                    <div className="sticky top-0 z-20 bg-slate-900 p-4 border-b border-slate-700 shadow-xl">
                        <header className="flex justify-between items-center mb-4">
                            <div className="flex items-center gap-2">
                                <h2 className="font-bold text-blue-400 flex items-center gap-2"><Icons.Wifi className="w-4 h-4"/> Control</h2>
                                <button onClick={() => setShowDebrief(true)} className="ml-2 bg-slate-700 hover:bg-slate-600 text-xs px-2 py-1 rounded flex items-center gap-1"><Icons.List className="w-3 h-3"/> Log</button>
                            </div>
                            <div className="flex items-center gap-3">
                                <span className="text-sm text-slate-400 font-mono border border-slate-600 px-2 py-0.5 rounded">ID: {sessionId}</span>
                                <div className={`w-3 h-3 rounded-full ${vitals.connected ? 'bg-green-500' : 'bg-red-500'}`}></div>
                            </div>
                        </header>
                        
                        <div className="flex bg-slate-800 p-1 rounded-lg">
                            <button onClick={() => setTabMode('manual')} className={`flex-1 py-2 text-sm font-bold rounded-md transition-all ${tabMode === 'manual' ? 'bg-blue-600 text-white shadow' : 'text-slate-400 hover:text-white'}`}>Manual</button>
                            <button onClick={() => setTabMode('scenario')} className={`flex-1 py-2 text-sm font-bold rounded-md transition-all ${tabMode === 'scenario' ? 'bg-purple-600 text-white shadow' : 'text-slate-400 hover:text-white'}`}>Escenarios</button>
                        </div>
                    </div>

                    <div className="p-4 space-y-6 max-w-lg mx-auto w-full flex-1">
                        
                        {tabMode === 'manual' ? (
                            <>
                                <div className="bg-slate-800 p-4 rounded-xl border border-slate-700">
                                    <div className="flex justify-between mb-2"><label className="text-amber-400 font-bold flex gap-2"><Icons.Clock className="w-5 h-5"/> Transición</label><span className="text-white font-mono font-bold text-xl">{transitionDuration}s</span></div>
                                    <input type="range" min="0" max="90" step="10" value={transitionDuration} onChange={(e) => setTransitionDuration(parseInt(e.target.value))} className="w-full h-8 time-slider cursor-pointer touch-none" />
                                    <div className="flex justify-between text-xs text-slate-500 mt-1"><span>Ya</span><span>90s</span></div>
                                </div>
                                <button onClick={() => triggerSound('grunt', 'Quejido')} className="w-full p-4 bg-orange-900/40 border border-orange-500/50 rounded-lg text-orange-400 font-bold flex items-center justify-center gap-2 hover:bg-orange-900/60 transition-all"><Icons.Activity className="w-5 h-5"/> Reproducir Quejido</button>
                                
                                <div className="bg-slate-800 p-6 rounded-xl border border-slate-700">
                                    <div className="flex justify-between mb-2"><label className="text-[#42B334] font-bold flex gap-2"><Icons.Heart className="w-5 h-5"/> FC: {targets.hr}</label><span className="text-slate-400 text-xs mt-1">Actual: {vitals.hr}</span></div>
                                    <input type="range" min="0" max="200" value={targets.hr} onChange={(e) => handleSliderChange('hr', parseInt(e.target.value))} onMouseDown={handleSliderStart} onTouchStart={handleSliderStart} onMouseUp={() => handleCommitChange('hr')} onTouchEnd={() => handleCommitChange('hr')} onClick={() => handleCommitChange('hr')} className="w-full h-12 accent-[#42B334] cursor-pointer touch-none" />
                                </div>
                                
                                <div className="bg-slate-800 p-6 rounded-xl border border-slate-700">
                                    <div className="flex justify-between mb-2"><label className="text-yellow-400 font-bold flex gap-2"><Icons.Activity className="w-5 h-5"/> SpO2: {targets.spo2}%</label><span className="text-slate-400 text-xs mt-1">Actual: {vitals.spo2}%</span></div>
                                    <input type="range" min="0" max="100" value={targets.spo2} onChange={(e) => handleSliderChange('spo2', parseInt(e.target.value))} onMouseDown={handleSliderStart} onTouchStart={handleSliderStart} onMouseUp={() => handleCommitChange('spo2')} onTouchEnd={() => handleCommitChange('spo2')} onClick={() => handleCommitChange('spo2')} className="w-full h-12 accent-yellow-400 cursor-pointer touch-none" />
                                </div>

                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={() => applyPreset('normal', 'Normalidad')} className="p-4 bg-emerald-900/40 border border-emerald-500/50 rounded-lg text-emerald-400 font-bold">Normal</button>
                                    <button onClick={() => applyPreset('brady', 'Bradicardia')} className="p-4 bg-yellow-900/40 border border-yellow-500/50 rounded-lg text-yellow-400 font-bold">Bradicardia</button>
                                    <button onClick={() => applyPreset('desat', 'Desaturación')} className="p-4 bg-blue-900/40 border border-blue-500/50 rounded-lg text-blue-400 font-bold">Desaturación</button>
                                    <button onClick={() => applyPreset('vpp', 'VPP')} className="p-4 bg-indigo-900/40 border border-indigo-500/50 rounded-lg text-indigo-400 font-bold">VPP</button>
                                    <button onClick={() => applyPreset('vpp_ct', 'VPP + Masaje')} className="col-span-2 p-4 bg-red-900/40 border border-red-500/50 rounded-lg text-red-500 font-bold flex items-center justify-center gap-2"><Icons.AlertTriangle className="w-4 h-4"/> VPP + CT (Masaje)</button>
                                </div>
                                <button onClick={() => { onUpdate({ alarmMuted: !vitals.alarmMuted }); logAction('Silenciar/Activar Alarmas'); }} className={`w-full py-4 rounded-lg font-bold flex justify-center gap-2 ${vitals.alarmMuted ? 'bg-orange-600' : 'bg-slate-700'}`}>{vitals.alarmMuted ? 'Alarmas Silenciadas' : 'Silenciar Alarmas'}</button>
                            </>
                        ) : (
                            <div className="space-y-6">
                                {!activeScenario ? (
                                    <div className="grid gap-4">
                                        <h3 className="text-slate-400 uppercase text-xs font-bold tracking-wider">Seleccionar Guion</h3>
                                        {Object.keys(SCENARIOS_DATA).map(key => (
                                            <button key={key} onClick={() => startScenario(key)} className="bg-slate-800 border border-slate-700 p-4 rounded-xl text-left hover:bg-slate-700 hover:border-purple-500 transition-all group">
                                                <div className="flex justify-between items-center mb-1">
                                                    <span className="font-bold text-purple-400 group-hover:text-purple-300">{SCENARIOS_DATA[key].title}</span>
                                                    <Icons.Book className="w-4 h-4 text-slate-500"/>
                                                </div>
                                                <p className="text-xs text-slate-400">{SCENARIOS_DATA[key].description}</p>
                                            </button>
                                        ))}
                                        <div className="p-4 bg-blue-900/20 border border-blue-800 rounded-lg text-xs text-blue-300">
                                            Selecciona un caso clínico para comenzar la simulación guiada.
                                        </div>
                                    </div>
                                ) : (
                                    <div className="flex flex-col h-full">
                                        <div className="flex justify-between items-center mb-4">
                                            <h3 className="font-bold text-purple-400 text-lg line-clamp-1">{activeScenario.title}</h3>
                                            <button onClick={exitScenario} className="text-xs bg-red-900/50 text-red-300 px-2 py-1 rounded border border-red-800">Salir</button>
                                        </div>

                                        <div className="bg-slate-800 border-l-4 border-purple-500 p-6 rounded-r-xl shadow-lg mb-6">
                                            <div className="flex justify-between items-start mb-4">
                                                <div>
                                                    <span className="text-xs font-bold text-purple-300 uppercase tracking-widest">Estado Actual</span>
                                                    <h2 className="text-2xl font-bold text-white mt-1">{activeScenario.nodes[currentNodeId].label}</h2>
                                                </div>
                                                <div className="text-right">
                                                    <div className="text-xs text-slate-400">Target</div>
                                                    <div className="font-mono font-bold text-sm text-[#42B334]">FC: {activeScenario.nodes[currentNodeId].vitals.hr}</div>
                                                    <div className="font-mono font-bold text-sm text-yellow-400">SpO2: {activeScenario.nodes[currentNodeId].vitals.spo2}%</div>
                                                </div>
                                            </div>
                                            <p className="text-slate-300 text-lg leading-relaxed border-t border-slate-700 pt-4">
                                                "{activeScenario.nodes[currentNodeId].text}"
                                            </p>
                                        </div>

                                        <div className="space-y-3">
                                            <h4 className="text-xs font-bold text-slate-500 uppercase mb-2">Acciones del Alumno (Decisiones)</h4>
                                            {activeScenario.nodes[currentNodeId].options.length > 0 ? (
                                                activeScenario.nodes[currentNodeId].options.map((option, idx) => (
                                                    <button 
                                                        key={idx} 
                                                        onClick={() => handleScenarioDecision(option)}
                                                        className="w-full p-4 bg-slate-700 hover:bg-slate-600 border border-slate-600 rounded-xl text-left transition-all flex justify-between items-center group active:scale-95"
                                                    >
                                                        <span className="font-bold text-slate-200 group-hover:text-white">{option.label}</span>
                                                        <span className="text-xs font-mono bg-black/30 px-2 py-1 rounded text-slate-400">
                                                            {option.time}s
                                                        </span>
                                                    </button>
                                                ))
                                            ) : (
                                                <div className="text-center p-8 bg-slate-800/50 rounded-xl border border-slate-800 text-slate-500">
                                                    <Icons.Activity className="w-8 h-8 mx-auto mb-2 opacity-50"/>
                                                    <p>Fin del Escenario</p>
                                                    <button onClick={exitScenario} className="mt-4 text-sm text-purple-400 hover:underline">Volver al menú</button>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                    
                    {showDebrief && (
                        <div className="fixed inset-0 bg-black/90 z-50 p-4 flex flex-col">
                            <div className="bg-slate-800 rounded-xl flex-1 flex flex-col overflow-hidden max-w-md mx-auto w-full">
                                <div className="p-4 border-b border-slate-700 flex justify-between items-center"><h3 className="font-bold text-lg">Registro de Eventos</h3><button onClick={() => setShowDebrief(false)}><Icons.X className="w-6 h-6"/></button></div>
                                <div className="flex-1 overflow-y-auto p-4 space-y-2">
                                    {eventLog.length === 0 && <p className="text-slate-500 text-center mt-4">Sin eventos registrados.</p>}
                                    {eventLog.map((log, i) => (<div key={i} className="flex gap-3 text-sm border-b border-slate-700/50 pb-2"><span className="text-slate-400 font-mono">{log.time}</span><span className="text-slate-200">{log.msg}</span></div>))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const App = () => {
            const [user, setUser] = useState(null);
            const [mode, setMode] = useState('select');
            const [sessionId, setSessionId] = useState('');
            const [vitals, setVitals] = useState(DEFAULT_VITALS);
            const [isConnected, setIsConnected] = useState(true);
            const [isDemoMode, setIsDemoMode] = useState(false);
            const [demoTimeLeft, setDemoTimeLeft] = useState(300);
            const [licenseExpired, setLicenseExpired] = useState(false);

            useEffect(() => {
                let interval = null;
                if (isDemoMode && demoTimeLeft > 0) {
                    interval = setInterval(() => { 
                        const newTime = demoTimeLeft - 1;
                        setDemoTimeLeft(newTime);
                        localStorage.setItem('neosim_demo_timer', newTime);
                    }, 1000);
                } else if (demoTimeLeft === 0) { clearInterval(interval); }
                return () => clearInterval(interval);
            }, [isDemoMode, demoTimeLeft]);

            const handleDemoStart = () => {
                setIsDemoMode(true);
                const savedTime = localStorage.getItem('neosim_demo_timer');
                if (savedTime && parseInt(savedTime) > 0) {
                    setDemoTimeLeft(parseInt(savedTime));
                } else {
                    setDemoTimeLeft(300);
                    localStorage.setItem('neosim_demo_timer', 300);
                }
                if (auth) {
                    auth.signInAnonymously().then(u => { setUser(u.user); }).catch(err => {
                        console.warn("Auth anónima falló, usando usuario local.", err);
                        setUser({ uid: 'demo-user', email: 'demo@neomonitor.com' });
                    });
                } else { setUser({ uid: 'demo-user', email: 'demo@neomonitor.com' }); }
            };

            const handleLogout = () => {
                if (auth) {
                    auth.signOut().then(() => {
                        setUser(null);
                        setIsDemoMode(false);
                        localStorage.removeItem('neosim_demo_timer'); 
                        setMode('select');
                    });
                } else {
                    setUser(null);
                    setMode('select');
                }
            };

            useEffect(() => {
                if (!auth) return;
                const unsub = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        if (u.isAnonymous) {
                            setIsDemoMode(true);
                            const savedTime = localStorage.getItem('neosim_demo_timer');
                            if (savedTime) setDemoTimeLeft(parseInt(savedTime));
                            setUser(u);
                        } else {
                            try {
                                if (db) {
                                    const doc = await db.collection('usuarios').doc(u.uid).get();
                                    if (doc.exists) {
                                        const data = doc.data();
                                        if (data.fecha_vencimiento) {
                                            const vencimiento = data.fecha_vencimiento.toDate();
                                            const hoy = new Date();
                                            if (hoy > vencimiento) {
                                                setLicenseExpired(true);
                                            }
                                        }
                                    }
                                }
                            } catch (error) {
                                console.error("Error verificando licencia:", error);
                            }
                            setIsDemoMode(false);
                            setUser(u);
                        }
                    } else {
                        setUser(null);
                    }
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const urlMode = params.get('mode');
                const urlSession = params.get('session');
                if (urlMode && urlSession) { setMode(urlMode); setSessionId(urlSession); }
            }, []);

            useEffect(() => {
                if (!sessionId || !user || !db) return;
                let unsubscribe;
                const connect = () => {
                    try {
                        unsubscribe = db.collection("sessions").doc(sessionId).onSnapshot(
                            (doc) => { if (doc.exists) { setVitals({...doc.data(), connected: true}); setIsConnected(true); } }, 
                            (error) => { 
                                console.log("Reconectando...", error); 
                                if (isDemoMode) { setIsConnected(true); } else { setIsConnected(false); setTimeout(connect, 2000); }
                            }
                        );
                    } catch(e) { setIsConnected(false); }
                };
                connect();
                return () => unsubscribe && unsubscribe();
            }, [sessionId, user, isDemoMode]);

            const handleUpdate = async (newVitals) => { 
                if (sessionId && db) {
                    try { await db.collection("sessions").doc(sessionId).set(newVitals, { merge: true }); } 
                    catch (e) { if (isDemoMode) setVitals(prev => ({...prev, ...newVitals})); }
                } else if (isDemoMode) { setVitals(prev => ({...prev, ...newVitals})); }
            };
            const onSelect = (m, id) => { setMode(m); setSessionId(id); };

            if (!user) return <LoginScreen onDemoStart={handleDemoStart} />;

            if (licenseExpired || (isDemoMode && demoTimeLeft === 0)) {
                const title = licenseExpired ? "Licencia No Válida" : "Tiempo de Prueba Agotado";
                const message = licenseExpired 
                    ? "Tu licencia de NeoMonitor ha caducado o no es válida."
                    : "Has disfrutado de los 5 minutos de demostración gratuita.";

                return (
                    <div className="min-h-screen bg-black flex flex-col items-center justify-center p-8 text-center">
                        <div className="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-600 max-w-md w-full">
                            <div className="flex justify-center mb-6 text-red-500">
                                {licenseExpired ? <Icons.Lock className="w-20 h-20" /> : <Icons.Clock className="w-20 h-20 text-yellow-400" />}
                            </div>
                            
                            <h1 className="text-3xl font-bold text-white mb-4">{title}</h1>
                            <p className="text-slate-300 mb-8 text-lg">{message}</p>
                            
                            <div className="bg-slate-900 p-6 rounded-xl mb-6 border border-slate-700">
                                <p className="text-sm text-slate-400 mb-3">Para continuar utilizando el simulador profesionalmente:</p>
                                <button 
                                    onClick={() => window.location.href = "https://www.getneomonitor.pro"} 
                                    className="w-full py-4 bg-[#42B334] hover:bg-green-600 text-black font-bold text-lg rounded-lg transition-transform transform hover:scale-105 shadow-lg"
                                >
                                    {licenseExpired ? "Renovar Licencia Ahora" : "Comprar Licencia Pro"}
                                </button>
                            </div>

                            <button onClick={() => {
                                localStorage.removeItem('neosim_demo_timer'); 
                                setLicenseExpired(false);
                                if(auth) auth.signOut();
                                window.location.reload();
                            }} className="text-slate-500 hover:text-white text-sm underline mt-4">
                                Volver a la pantalla de inicio
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="font-sans antialiased relative">
                    {isDemoMode && (
                        <div className="fixed top-0 right-0 bg-yellow-500 text-black font-bold px-3 py-1 rounded-bl-lg z-50 text-xs shadow-lg">
                            Demo: {Math.floor(demoTimeLeft / 60)}:{(demoTimeLeft % 60).toString().padStart(2, '0')}
                        </div>
                    )}
                    {mode === 'select' && <RoleSelection onSelect={onSelect} onLogout={handleLogout} />}
                    {mode === 'monitor' && <MonitorScreen sessionId={sessionId} vitals={vitals} connectionStatus={isConnected} />}
                    {mode === 'control' && <ControllerScreen sessionId={sessionId} vitals={vitals} onUpdate={handleUpdate} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
