<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeoMonitor (Free Edition)</title>
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin="anonymous" src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin="anonymous" src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin="anonymous" src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script crossorigin="anonymous" src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script crossorigin="anonymous" src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script crossorigin="anonymous" src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <style>
        body { background-color: #000000; color: white; margin: 0; touch-action: manipulation; overflow: hidden; font-family: sans-serif; }
        
        .soft-key {
            background: linear-gradient(180deg, #334155 0%, #1e293b 100%);
            border: 1px solid #475569; color: #cbd5e1; font-family: monospace;
            font-size: 0.8rem; display: flex; align-items: center; justify-content: center;
            text-align: center; border-radius: 4px; cursor: pointer; user-select: none;
        }
        .soft-key:active { background: #0f172a; }

        input[type=range] { accent-color: #42B334; }
        
        /* Espacio para Sponsor */
        .sponsor-container {
            background: #111827;
            border: 1px dashed #374151;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #6b7280;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s;
        }
        .sponsor-container:hover { border-color: #4b5563; color: #9ca3af; }

        .force-landscape-container { width: 100vw; height: 100vh; overflow: hidden; position: relative; }

        @media screen and (max-width: 900px) and (orientation: portrait) {
            .force-landscape {
                position: absolute; top: 50%; left: 50%; width: 100vh; height: 100vw;
                transform: translate(-50%, -50%) rotate(90deg); transform-origin: center center;
            }
        }
        @media screen and (min-width: 901px), (orientation: landscape) {
            .force-landscape { width: 100%; height: 100%; }
        }

        .hardware-accelerated { transform: translateZ(0); will-change: transform, opacity; }
    </style>
</head>
<body>
    <div id="root">
        <!-- Loader inicial -->
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #42B334;">
            <svg style="animation: spin 1s linear infinite; width: 40px; height: 40px; margin-bottom: 20px;" viewBox="0 0 24 24">
                <circle style="opacity: 0.25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                <path style="opacity: 0.75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <h2 style="font-weight: bold;">Cargando NeoMonitor...</h2>
            <style>@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }</style>
        </div>
    </div>

    <script type="text/babel">
       // Configuración Firebase (Usando la tuya)
       const firebaseConfig = {
          apiKey: "AIzaSyA46SqiHL-U13mdaJnee-KhD372aWc5h2E",
          authDomain: "monitor-36c41.firebaseapp.com",
          projectId: "monitor-36c41",
          storageBucket: "monitor-36c41.firebasestorage.app",
          messagingSenderId: "830562769122",
          appId: "1:830562769122:web:1db7060de0c80556db66bb"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
        const auth = firebase.auth();

        const { useState, useEffect, useRef } = React;

        // --- ICONOS ---
        const Icons = {
            Activity: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>,
            Heart: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>,
            Monitor: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/></svg>,
            Smartphone: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="20" x="5" y="2" rx="2"/><path d="M12 18h.01"/></svg>,
            Wifi: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>,
            Volume2: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>,
            VolumeX: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" x2="17" y1="9" y2="15"/><line x1="17" x2="23" y1="9" y2="15"/></svg>,
            Play: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>,
            Battery: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="10" x="2" y="7" rx="2" ry="2"/><line x1="22" x2="22" y1="11" y2="13"/></svg>,
            QrCode: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h7v7h-7z"/><path d="M7 17h.01"/><path d="M17 7h.01"/><path d="M17 17h.01"/></svg>,
            X: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
            Clock: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
            AlertTriangle: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>,
            Info: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        };

        const DEFAULT_VITALS = { hr: 122, spo2: 91, resp: 45, alarmMuted: false, connected: true, transition: null, soundTimestamp: 0, soundType: null };

        // --- COMPONENTE SPONSOR ---
        const SponsorSpace = ({ className = "" }) => (
            <div className={`sponsor-container ${className}`} onClick={() => window.open('https://tu-sitio-o-del-sponsor.com', '_blank')}>
                <div className="flex flex-col items-center">
                    <Icons.Info className="w-4 h-4 mb-1 opacity-50" />
                    <span className="font-bold">Espacio para Sponsor</span>
                    <span className="text-[9px] opacity-40">Click para información</span>
                </div>
            </div>
        );

        // --- AUDIO ENGINE ---
        let audioCtx;
        const initAudio = () => {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        };

        const playBeep = (pitch = 800) => {
            if (!audioCtx || audioCtx.state !== 'running') return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine';
            oscillator.frequency.value = pitch;
            const now = audioCtx.currentTime;
            gainNode.gain.setValueAtTime(0.1, now); 
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
            oscillator.start(now);
            oscillator.stop(now + 0.15);
        };

        // --- WAVEFORMS ---
        const WaveformCanvas = ({ color, speed, type, flatline, onBeat }) => {
            const canvasRef = useRef(null);
            const dataRef = useRef([]);
            const phaseRef = useRef(0);
            const lastTimeRef = useRef(performance.now());

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let frameId;

                const draw = (time) => {
                    const deltaTime = (time - lastTimeRef.current) / 1000;
                    lastTimeRef.current = time;
                    if (deltaTime > 0.1) { frameId = requestAnimationFrame(draw); return; }

                    if (canvas.width !== canvas.offsetWidth) {
                        canvas.width = canvas.offsetWidth;
                        canvas.height = canvas.offsetHeight;
                        dataRef.current = new Array(canvas.width).fill(canvas.height / 2);
                    }

                    let newValue = canvas.height / 2;
                    const amplitude = canvas.height / 3;
                    
                    if (!flatline && speed > 0) {
                        const beatsPerSecond = speed / 60;
                        const prevPhase = phaseRef.current;
                        phaseRef.current += (beatsPerSecond * 2 * Math.PI) * deltaTime;
                        if (phaseRef.current >= 2 * Math.PI) phaseRef.current -= 2 * Math.PI;
                        const p = phaseRef.current;

                        if (type === 'ecg' && onBeat) {
                             const threshold = Math.PI;
                             if (prevPhase < threshold && p >= threshold) onBeat();
                        }

                        if (type === 'ecg') {
                            if (p > 3.0 && p < 3.28) newValue = (canvas.height / 2) - (amplitude * 2.5 * Math.exp(-Math.pow(p - Math.PI, 2) * 50));
                            else if (p > 3.5 && p < 4.5) newValue = (canvas.height / 2) - (amplitude * 0.3 * Math.sin(p - 3.5));
                            else newValue = (canvas.height / 2) + (Math.random() * 1.5 - 0.75);
                        } else {
                            newValue = (canvas.height / 2) - (Math.sin(p) * amplitude * 0.6);
                        }
                    } else {
                        newValue = (canvas.height / 2) + (Math.random() * 2 - 1);
                    }

                    dataRef.current.push(newValue);
                    dataRef.current.shift();
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.lineWidth = 2.5; ctx.strokeStyle = color; ctx.beginPath();
                    for (let i = 0; i < dataRef.current.length; i++) {
                        if (i === 0) ctx.moveTo(i, dataRef.current[i]); else ctx.lineTo(i, dataRef.current[i]);
                    }
                    ctx.stroke();
                    frameId = requestAnimationFrame(draw);
                };
                frameId = requestAnimationFrame(draw);
                return () => cancelAnimationFrame(frameId);
            }, [color, speed, type, flatline, onBeat]);

            return <canvas ref={canvasRef} className="w-full h-full block" />;
        };

        // --- HOOK DE INTERPOLACIÓN ---
        const useInterpolatedVitals = (target) => {
            const [vitals, setVitals] = useState(target);
            useEffect(() => {
                if (!target.transition) { setVitals(target); return; }
                let frame;
                const animate = () => {
                    const elapsed = Date.now() - target.transition.startTime;
                    const p = Math.min(1, elapsed / target.transition.duration);
                    if (p < 1) {
                        setVitals({
                            ...target,
                            hr: Math.round(target.transition.startHr + (target.transition.targetHr - target.transition.startHr) * p),
                            spo2: Math.round(target.transition.startSpo2 + (target.transition.targetSpo2 - target.transition.startSpo2) * p),
                        });
                        frame = requestAnimationFrame(animate);
                    } else { setVitals(target); }
                };
                frame = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(frame);
            }, [target]);
            return vitals;
        };

        // --- PANTALLA MONITOR ---
        const MonitorScreen = ({ sessionId, vitals: targetVitals }) => {
            const vitals = useInterpolatedVitals(targetVitals);
            const [audioEnabled, setAudioEnabled] = useState(false);
            const [time, setTime] = useState(new Date());

            useEffect(() => {
                const t = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(t);
            }, []);

            const handleBeat = () => {
                if (!audioEnabled || vitals.alarmMuted) return;
                playBeep(vitals.spo2 < 89 ? 400 : 800);
            };

            const start = () => { initAudio(); setAudioEnabled(true); };

            return (
                <div className="w-full h-screen bg-black flex flex-col border-[12px] border-slate-900 hardware-accelerated">
                    {!audioEnabled && (
                        <div className="absolute inset-0 bg-black/90 z-50 flex items-center justify-center">
                            <button onClick={start} className="bg-green-600 px-8 py-4 rounded-xl font-bold text-xl animate-pulse">
                                TOCAR PARA INICIAR MONITOR
                            </button>
                        </div>
                    )}

                    <div className="flex-none flex justify-between px-4 py-2 bg-slate-900/50 text-slate-400 text-sm font-mono border-b border-slate-800">
                        <div className="flex gap-4"><span>NEONATAL</span><span>CAMA: 01</span></div>
                        <div className="flex gap-4 items-center">
                            {vitals.alarmMuted && <Icons.VolumeX className="text-orange-500 w-4 h-4" />}
                            <span>ID: {sessionId}</span>
                        </div>
                    </div>

                    <div className="flex-1 grid grid-rows-[1.5fr_1.5fr_1fr] divide-y divide-slate-800">
                        {/* Fila FC */}
                        <div className="grid grid-cols-[1fr_200px] h-full">
                            <div className="relative border-r border-slate-800"><WaveformCanvas color="#42B334" speed={vitals.hr} type="ecg" flatline={vitals.hr === 0} onBeat={handleBeat}/></div>
                            <div className="flex flex-col items-end pr-4 justify-center">
                                <span className="text-[#42B334] font-bold">FC</span>
                                <span className="text-[#42B334] font-mono font-bold leading-none" style={{fontSize: '15vh'}}>{vitals.hr || '--'}</span>
                            </div>
                        </div>
                        {/* Fila SpO2 */}
                        <div className="grid grid-cols-[1fr_200px] h-full">
                            <div className="relative border-r border-slate-800"><WaveformCanvas color="#facc15" speed={vitals.hr} type="pleth" flatline={vitals.spo2 === 0}/></div>
                            <div className="flex flex-col items-end pr-4 justify-center">
                                <span className="text-yellow-400 font-bold">SpO2</span>
                                <span className="text-yellow-400 font-mono font-bold leading-none" style={{fontSize: '15vh'}}>{vitals.spo2 || '--'}</span>
                            </div>
                        </div>
                        {/* Fila Inferior + Sponsor */}
                        <div className="grid grid-cols-[1fr_1fr_200px] h-full divide-x divide-slate-800">
                            <div className="flex flex-col justify-center items-center text-slate-600"><span className="text-xs">RESP</span><span className="text-4xl font-bold">---</span></div>
                            <div className="flex flex-col justify-center items-center text-slate-600"><span className="text-xs">PNI</span><span className="text-2xl font-bold">--/--</span></div>
                            <SponsorSpace />
                        </div>
                    </div>

                    <div className="flex-none bg-slate-900 p-2 flex justify-between items-center text-xs text-slate-500">
                        <div className="flex gap-2"><div className="soft-key px-4 py-2">Silenciar</div><div className="soft-key px-4 py-2">Menú</div></div>
                        <div className="flex gap-4 items-center">
                            <span>{time.toLocaleTimeString()}</span>
                            <Icons.Wifi className="w-4 h-4 text-green-500" />
                            <Icons.Battery className="w-4 h-4 text-green-500" />
                        </div>
                    </div>
                </div>
            );
        };

        // --- PANTALLA CONTROL ---
        const ControllerScreen = ({ sessionId, vitals, onUpdate }) => {
            const [trans, setTrans] = useState(5);
            const updateVal = (field, val) => {
                const now = Date.now();
                onUpdate({
                    ...vitals,
                    [field]: val,
                    transition: {
                        startTime: now, duration: trans * 1000,
                        startHr: vitals.hr, targetHr: field === 'hr' ? val : vitals.hr,
                        startSpo2: vitals.spo2, targetSpo2: field === 'spo2' ? val : vitals.spo2
                    }
                });
            };

            const preset = (h, s) => {
                const now = Date.now();
                onUpdate({
                    hr: h, spo2: s,
                    transition: { startTime: now, duration: trans * 1000, startHr: vitals.hr, targetHr: h, startSpo2: vitals.spo2, targetSpo2: s }
                });
            };

            return (
                <div className="h-screen bg-slate-900 text-white flex flex-col">
                    <header className="p-4 bg-slate-800 border-b border-slate-700 flex justify-between items-center">
                        <h2 className="font-bold flex items-center gap-2"><Icons.Smartphone className="w-5 h-5 text-blue-400"/> Control Free</h2>
                        <span className="font-mono text-sm bg-black px-2 py-1 rounded">ID: {sessionId}</span>
                    </header>
                    
                    <div className="flex-1 overflow-y-auto p-4 space-y-6">
                        <div className="bg-slate-800 p-4 rounded-xl">
                            <div className="flex justify-between mb-2 text-xs uppercase text-slate-400 font-bold"><span>Transición</span><span>{trans}s</span></div>
                            <input type="range" min="0" max="60" step="5" value={trans} onChange={e => setTrans(e.target.value)} className="w-full h-8"/>
                        </div>

                        <div className="bg-slate-800 p-4 rounded-xl border-l-4 border-green-500">
                            <div className="flex justify-between font-bold mb-2 text-green-500"><span>FC</span><span>{vitals.hr}</span></div>
                            <input type="range" min="0" max="220" value={vitals.hr} onChange={e => updateVal('hr', parseInt(e.target.value))} className="w-full h-10 accent-green-500"/>
                        </div>

                        <div className="bg-slate-800 p-4 rounded-xl border-l-4 border-yellow-500">
                            <div className="flex justify-between font-bold mb-2 text-yellow-500"><span>SpO2</span><span>{vitals.spo2}%</span></div>
                            <input type="range" min="0" max="100" value={vitals.spo2} onChange={e => updateVal('spo2', parseInt(e.target.value))} className="w-full h-10 accent-yellow-500"/>
                        </div>

                        <div className="grid grid-cols-2 gap-3">
                            <button onClick={() => preset(145, 96)} className="p-4 bg-green-900/30 border border-green-800 rounded-lg text-green-400 font-bold">Normal</button>
                            <button onClick={() => preset(85, 82)} className="p-4 bg-yellow-900/30 border border-yellow-800 rounded-lg text-yellow-400 font-bold">Depresión</button>
                            <button onClick={() => preset(55, 60)} className="p-4 bg-red-900/30 border border-red-800 rounded-lg text-red-400 font-bold">Grave</button>
                            <button onClick={() => onUpdate({ ...vitals, alarmMuted: !vitals.alarmMuted })} className={`p-4 rounded-lg font-bold border ${vitals.alarmMuted ? 'bg-orange-600 border-orange-400' : 'bg-slate-700 border-slate-600'}`}>Silenciar</button>
                        </div>
                    </div>

                    <SponsorSpace className="h-24 flex-none border-t border-slate-700" />
                </div>
            );
        };

        // --- SELECCIÓN DE ROL ---
        const RoleSelection = ({ onSelect }) => {
            const [sid, setSid] = useState(Math.floor(1000 + Math.random() * 9000).toString());
            return (
                <div className="h-screen bg-slate-900 flex items-center justify-center p-6">
                    <div className="max-w-md w-full bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 text-center">
                        <Icons.Activity className="w-16 h-16 text-green-500 mx-auto mb-4"/>
                        <h1 className="text-3xl font-bold mb-2">NeoMonitor</h1>
                        <p className="text-slate-400 text-sm mb-8 italic">Versión gratuita para educación médica</p>
                        
                        <div className="mb-8">
                            <label className="block text-xs font-bold text-slate-500 uppercase mb-2">Código de Sesión</label>
                            <input type="number" value={sid} onChange={e => setSid(e.target.value)} className="w-full bg-black text-white text-3xl text-center p-3 rounded-lg border border-slate-600 focus:border-green-500 outline-none font-mono"/>
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                            <button onClick={() => onSelect('monitor', sid)} className="bg-slate-700 p-6 rounded-xl hover:bg-slate-600 transition-all flex flex-col items-center">
                                <Icons.Monitor className="w-8 h-8 mb-2 text-green-400"/> <span className="font-bold">Monitor</span>
                            </button>
                            <button onClick={() => onSelect('control', sid)} className="bg-slate-700 p-6 rounded-xl hover:bg-slate-600 transition-all flex flex-col items-center">
                                <Icons.Smartphone className="w-8 h-8 mb-2 text-blue-400"/> <span className="font-bold">Control</span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [mode, setMode] = useState('select');
            const [user, setUser] = useState(null);
            const [sessionId, setSessionId] = useState('');
            const [vitals, setVitals] = useState(DEFAULT_VITALS);

            useEffect(() => {
                // Autenticación anónima automática
                auth.signInAnonymously().then(cred => setUser(cred.user)).catch(e => {
                    console.error("Auth error:", e);
                    setUser({ uid: 'guest' }); // Fallback local
                });

                // Carga de sesión por URL
                const p = new URLSearchParams(window.location.search);
                if (p.get('mode') && p.get('session')) {
                    setMode(p.get('mode')); setSessionId(p.get('session'));
                }
            }, []);

            useEffect(() => {
                if (!sessionId || !db) return;
                const unsub = db.collection("sessions").doc(sessionId).onSnapshot(doc => {
                    if (doc.exists) setVitals(doc.data());
                });
                return () => unsub();
            }, [sessionId]);

            const handleUpdate = async (v) => {
                setVitals(v);
                if (db && sessionId) {
                    try { await db.collection("sessions").doc(sessionId).set(v, { merge: true }); } catch(e){}
                }
            };

            if (!user) return <div className="h-screen bg-black flex items-center justify-center text-green-500">Conectando...</div>;

            return (
                <div>
                    {mode === 'select' && <RoleSelection onSelect={(m, s) => { setMode(m); setSessionId(s); }} />}
                    {mode === 'monitor' && <MonitorScreen sessionId={sessionId} vitals={vitals} />}
                    {mode === 'control' && <ControllerScreen sessionId={sessionId} vitals={vitals} onUpdate={handleUpdate} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
