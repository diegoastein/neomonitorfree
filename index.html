<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeoMonitor | Simulador Multidisciplinario & Guion de Escenarios</title>
    
    <meta name="description" content="Simulador profesional con gestión de escenarios clínicos basada en plantillas SAP.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin="anonymous" src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin="anonymous" src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin="anonymous" src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script crossorigin="anonymous" src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script crossorigin="anonymous" src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script crossorigin="anonymous" src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        body { background-color: #000000; color: white; margin: 0; touch-action: manipulation; overflow: hidden; font-family: sans-serif; }
        .soft-key {
            background: linear-gradient(180deg, #334155 0%, #1e293b 100%);
            border: 1px solid #475569; color: #cbd5e1; font-family: monospace;
            font-size: 0.7rem; display: flex; align-items: center; justify-content: center;
            text-align: center; border-radius: 4px; cursor: pointer; user-select: none;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .soft-key:active { background: #0f172a; }
        .soft-key.active { background: #22c55e; color: black; border-color: #4ade80; }
        input[type=range] { accent-color: #42B334; }
        .hardware-accelerated { transform: translateZ(0); will-change: transform, opacity; }
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .animate-zoom { animation: zoomIn 0.3s ease-out forwards; }
        @keyframes heartbeat { 0%, 60%, 100% { transform: scale(1); } 15% { transform: scale(1.25); } 30% { transform: scale(1); } 45% { transform: scale(1.15); } }
        @media (max-width: 600px) and (orientation: portrait) {
            .waveform-col { display: none !important; }
            .monitor-screen .main-row { grid-template-columns: 1fr !important; }
            .heart-portrait { display: block !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- CONFIGURACIÓN Y CONSTANTES ---
        const firebaseConfig = {
            apiKey: "AIzaSyA46SqiHL-U13mdaJnee-KhD372aWc5h2E",
            authDomain: "monitor-36c41.firebaseapp.com",
            projectId: "monitor-36c41",
            storageBucket: "monitor-36c41.firebasestorage.app",
            messagingSenderId: "830562769122",
            appId: "1:830562769122:web:1db7060de0c80556db66bb"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const { useState, useEffect, useRef } = React;

        const PATIENT_PROFILES = {
            neonatal: { maxHr: 220, brady: 100, crit: 60, tachy: 180, normalHr: 140, tag: "NEONATAL" },
            pediatric: { maxHr: 180, brady: 60, crit: 40, tachy: 140, normalHr: 90, tag: "PEDIATRIC" },
            adult: { maxHr: 150, brady: 50, crit: 30, tachy: 120, normalHr: 75, tag: "ADULT CARE" }
        };

        // Escenario precargado basado en el PDF
        const CLINICAL_SCENARIO = {
            title: "Reanimación Inicial",
            objectives: ["Identificar apnea", "VPP efectiva", "Trabajo en equipo"],
            phases: [
                { id: 1, name: "Nacimiento", hr: 80, spo2: 65, color: "Cianótico/Apneico", expected: "Calor, Posición, Aspirar, Estimular" },
                { id: 2, name: "VPP Iniciada", hr: 110, spo2: 82, color: "Mejora tono", expected: "Auscultar, Verificar técnica MR SOPA" },
                { id: 3, name: "Recuperación", hr: 145, spo2: 92, color: "Rosado/Llora", expected: "Cuidados post-reanimación" }
            ],
            nonTechnicalSkills: [
                "Comunicación efectiva", "Llamar por ayuda", "Distribución de roles", "Liderazgo", "Uso de recursos"
            ]
        };

        const Icons = {
            Activity: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>,
            Monitor: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="20" height="14" x="2" y="3" rx="2"/><path d="M8 21h8M12 17v4"/></svg>,
            Smartphone: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="14" height="20" x="5" y="2" rx="2"/><path d="M12 18h.01"/></svg>,
            X: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6 6 18M6 6l12 12"/></svg>,
            Check: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="20 6 9 17 4 12"/></svg>,
            Clipboard: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>
        };

        // --- HOOKS ---
        function useVitals(target) {
            const [v, setV] = useState(target);
            useEffect(() => {
                if (!target?.transition) { setV(target); return; }
                let frame;
                const animate = () => {
                    const elapsed = Date.now() - target.transition.startTime;
                    const p = Math.min(1, elapsed / target.transition.duration);
                    if (p < 1) {
                        setV({ ...target, 
                            hr: Math.round(target.transition.startHr + (target.transition.targetHr - target.transition.startHr) * p),
                            spo2: Math.round(target.transition.startSpo2 + (target.transition.targetSpo2 - target.transition.startSpo2) * p)
                        });
                        frame = requestAnimationFrame(animate);
                    } else setV(target);
                };
                frame = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(frame);
            }, [target]);
            return v;
        }

        // --- COMPONENTES ---

        const Waveform = ({ color, speed, flatline }) => {
            const canvasRef = useRef(null);
            const phase = useRef(0);
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let frame;
                const draw = () => {
                    if (canvas.width !== canvas.offsetWidth) { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
                    ctx.clearRect(0,0, canvas.width, canvas.height);
                    ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 2;
                    if (!flatline) phase.current = (phase.current + (speed/60) * 0.1) % (Math.PI * 2);
                    for(let x=0; x<canvas.width; x++) {
                        const y = (canvas.height/2) + Math.sin(phase.current + x/20) * (canvas.height/4);
                        if (x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
                    }
                    ctx.stroke(); frame = requestAnimationFrame(draw);
                };
                draw(); return () => cancelAnimationFrame(frame);
            }, [color, speed, flatline]);
            return <canvas ref={canvasRef} className="w-full h-full" />;
        };

        const MonitorScreen = ({ sessionId, vitals: targetVitals }) => {
            const v = useVitals(targetVitals);
            const profile = PATIENT_PROFILES[v?.patientType || 'neonatal'];
            const [audio, setAudio] = useState(false);
            const alarm = (!v?.simRunning) ? 'none' : (v.hr < profile.crit ? 'critical' : (v.hr < profile.brady ? 'warning' : 'none'));

            return (
                <div className={`w-full h-screen bg-black flex flex-col border-[12px] transition-colors ${alarm==='critical' ? 'border-red-600' : (alarm==='warning' ? 'border-yellow-500' : 'border-slate-900')}`}>
                    {!audio && (
                        <div className="absolute inset-0 bg-black/90 z-50 flex items-center justify-center">
                            <button onClick={() => setAudio(true)} className="bg-green-600 px-8 py-4 rounded-xl font-bold animate-pulse">INICIAR MONITOR</button>
                        </div>
                    )}
                    <div className="p-2 flex justify-between bg-slate-900/50 font-mono text-xs text-slate-400">
                        <span>{profile.tag}</span><span>ID: {sessionId}</span>
                    </div>
                    <div className="flex-1 flex flex-col divide-y divide-slate-800">
                        <div className="flex-1 grid grid-cols-[1fr_200px]">
                            <div className="waveform-col"><Waveform color="#4ade80" speed={v?.hr} flatline={v?.hr===0}/></div>
                            <div className="flex flex-col items-center justify-center p-4">
                                <span className="text-[#4ade80] font-bold">FC</span>
                                <span className="text-6xl font-mono font-bold text-[#4ade80]">{v?.simRunning ? v.hr : '--'}</span>
                            </div>
                        </div>
                        <div className="flex-1 grid grid-cols-[1fr_200px]">
                            <div className="waveform-col"><Waveform color="#fbbf24" speed={v?.hr} flatline={v?.hr===0}/></div>
                            <div className="flex flex-col items-center justify-center p-4">
                                <span className="text-yellow-400 font-bold">SpO2</span>
                                <span className="text-6xl font-mono font-bold text-yellow-400">{v?.simRunning ? v.spo2 : '--'}</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ControllerScreen = ({ sessionId, vitals, onUpdate }) => {
            const [tab, setTab] = useState('vital');
            const [observedSkills, setObservedSkills] = useState([]);
            const [activePhase, setActivePhase] = useState(null);

            const toggleSkill = (skill) => {
                const isObserved = observedSkills.includes(skill);
                const newSkills = isObserved ? observedSkills.filter(s => s !== skill) : [...observedSkills, skill];
                setObservedSkills(newSkills);
                onUpdate({ ...vitals, log: { msg: `Habilidad: ${skill} (${isObserved ? 'Quitada' : 'Observada'})`, time: Date.now() }});
            };

            const runPhase = (phase) => {
                setActivePhase(phase.id);
                onUpdate({ 
                    ...vitals, hr: phase.hr, spo2: phase.spo2, simRunning: true,
                    transition: { startTime: Date.now(), duration: 5000, startHr: vitals.hr, targetHr: phase.hr, startSpo2: vitals.spo2, targetSpo2: phase.spo2 }
                });
            };

            return (
                <div className="h-screen flex flex-col bg-slate-950 text-white">
                    <header className="p-4 bg-slate-900 border-b border-slate-800 flex justify-between items-center">
                        <h2 className="font-bold text-blue-400 flex items-center gap-2"><Icons.Activity className="w-4 h-4"/> Mando</h2>
                        <div className="flex bg-black rounded-lg p-1">
                            <button onClick={() => setTab('vital')} className={`px-3 py-1 text-xs rounded ${tab==='vital' ? 'bg-slate-700' : ''}`}>Vitales</button>
                            <button onClick={() => setTab('guion')} className={`px-3 py-1 text-xs rounded ${tab==='guion' ? 'bg-slate-700' : ''}`}>Guion</button>
                        </div>
                    </header>

                    <div className="flex-1 overflow-y-auto p-4">
                        {tab === 'vital' ? (
                            <div className="space-y-6">
                                <button onClick={() => onUpdate({...vitals, simRunning: !vitals.simRunning})} className={`w-full py-4 rounded-xl font-bold border-2 ${vitals.simRunning ? 'bg-red-900/20 border-red-500 text-red-500' : 'bg-blue-900/20 border-blue-500 text-blue-500'}`}>
                                    {vitals.simRunning ? 'FINALIZAR SIMULACIÓN' : 'INICIAR SIMULACIÓN'}
                                </button>
                                <div className="bg-slate-900 p-4 rounded-xl space-y-4">
                                    <div className="flex justify-between font-bold text-green-400"><span>FC: {vitals.hr}</span></div>
                                    <input type="range" min="0" max="220" value={vitals.hr} onChange={(e) => onUpdate({...vitals, hr: parseInt(e.target.value)})} className="w-full h-8"/>
                                    <div className="flex justify-between font-bold text-yellow-400"><span>SpO2: {vitals.spo2}%</span></div>
                                    <input type="range" min="0" max="100" value={vitals.spo2} onChange={(e) => onUpdate({...vitals, spo2: parseInt(e.target.value)})} className="w-full h-8"/>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-6 animate-zoom">
                                <section>
                                    <h3 className="text-xs font-black text-slate-500 uppercase mb-3">Habilidades No Técnicas (SAP)</h3>
                                    <div className="grid grid-cols-2 gap-2">
                                        {CLINICAL_SCENARIO.nonTechnicalSkills.map(s => (
                                            <div key={s} onClick={() => toggleSkill(s)} className={`soft-key p-3 rounded-lg flex items-center justify-between ${observedSkills.includes(s) ? 'active' : ''}`}>
                                                <span className="text-[10px] text-left leading-tight">{s}</span>
                                                {observedSkills.includes(s) && <Icons.Check className="w-3 h-3"/>}
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                <section>
                                    <h3 className="text-xs font-black text-slate-500 uppercase mb-3">Desarrollo del Escenario</h3>
                                    <div className="space-y-3">
                                        {CLINICAL_SCENARIO.phases.map(p => (
                                            <div key={p.id} className={`p-4 rounded-xl border transition-all ${activePhase === p.id ? 'bg-blue-600/10 border-blue-500' : 'bg-slate-900 border-slate-800'}`}>
                                                <div className="flex justify-between items-center mb-2">
                                                    <span className="font-bold text-sm">Fase {p.id}: {p.name}</span>
                                                    <button onClick={() => runPhase(p)} className={`px-4 py-1 rounded-full text-xs font-bold ${activePhase === p.id ? 'bg-blue-500' : 'bg-slate-700'}`}>APLICAR</button>
                                                </div>
                                                <div className="text-[10px] text-slate-400 italic">
                                                    <b>Alumno debe:</b> {p.expected}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [mode, setMode] = useState('select');
            const [sessionId, setSessionId] = useState('');
            const [vitals, setVitals] = useState(DEFAULT_VITALS);
            const [user, setUser] = useState(null);

            useEffect(() => {
                auth.signInAnonymously().then(c => setUser(c.user));
                const p = new URLSearchParams(window.location.search);
                if(p.get('session')) { setMode('control'); setSessionId(p.get('session')); }
            }, []);

            useEffect(() => {
                if(!sessionId) return;
                return db.collection("sessions").doc(sessionId).onSnapshot(doc => { if(doc.exists) setVitals(doc.data()); });
            }, [sessionId]);

            const update = (v) => { setVitals(v); db.collection("sessions").doc(sessionId).set(v, {merge:true}); };

            if(!user) return <div className="h-screen bg-black flex items-center justify-center font-mono">NEOMONITOR PRO...</div>;

            if (mode === 'select') {
                const sid = Math.floor(1000 + Math.random()*9000).toString();
                return (
                    <div className="h-screen flex flex-col items-center justify-center p-6 space-y-6">
                        <Icons.Activity className="w-16 h-16 text-green-500 animate-pulse"/>
                        <h1 className="text-3xl font-black italic">NeoMonitor <span className="text-green-500 text-sm not-italic">SAP Edition</span></h1>
                        <div className="grid grid-cols-1 gap-4 w-full max-w-sm">
                            <button onClick={() => { setMode('monitor'); setSessionId(sid); update({...DEFAULT_VITALS}); }} className="p-8 bg-slate-900 rounded-3xl border border-slate-800 flex flex-col items-center gap-4">
                                <Icons.Monitor className="w-10 h-10 text-green-400"/>
                                <span className="font-bold">MODO MONITOR</span>
                            </button>
                            <button onClick={() => { const s = prompt("ID Sesión:"); if(s) { setMode('control'); setSessionId(s); }}} className="p-8 bg-slate-900 rounded-3xl border border-slate-800 flex flex-col items-center gap-4">
                                <Icons.Smartphone className="w-10 h-10 text-blue-400"/>
                                <span className="font-bold">MODO CONTROL</span>
                            </button>
                        </div>
                    </div>
                );
            }

            return mode === 'monitor' ? <MonitorScreen sessionId={sessionId} vitals={vitals} /> : <ControllerScreen sessionId={sessionId} vitals={vitals} onUpdate={update} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
