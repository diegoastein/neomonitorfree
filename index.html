        .scan-line { position: absolute; width: 100%; height: 2px; background: #3b82f6; animation: scanLine 2s linear infinite; }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.25); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
            100% { transform: scale(1); }

        .heart-portrait { display: none; }

            .monitor-screen { border-width: 4px !important; }
            .waveform-col { display: none !important; }
            .monitor-screen .main-row { grid-template-columns: 1fr !important; }

            .monitor-screen .qr-button span { display: inline !important; font-size: 0.7rem !important; }

        }

            <div className={`sponsor-container ${className}`} onClick={() => {

        let audioCtx;
        const initAudio = () => {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        };

        const playBeep = (pitch = 800) => {
            if (!audioCtx || audioCtx.state !== 'running') return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine';
            oscillator.frequency.value = pitch;
            const now = audioCtx.currentTime;
            gainNode.gain.setValueAtTime(0.1, now); 
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
            oscillator.start(now);
            oscillator.stop(now + 0.15);
        };

        const playAlarmSequence = (type) => {
             if (!audioCtx || audioCtx.state !== 'running') return;
             const now = audioCtx.currentTime;
             const createTone = (freq, start, duration) => {
                 const osc = audioCtx.createOscillator();
                 const gain = audioCtx.createGain();
                 osc.connect(gain);
                 gain.connect(audioCtx.destination);
                 osc.type = 'square'; 
                 osc.frequency.value = freq;
                 gain.gain.setValueAtTime(0.08, start);
                 gain.gain.setValueAtTime(0, start + duration);
                 osc.start(start);
                 osc.stop(start + duration);
             };
             if (type === 'critical') {
                 createTone(880, now, 0.1); createTone(880, now + 0.2, 0.1); createTone(880, now + 0.4, 0.1);
             } else if (type === 'warning') {
                 createTone(600, now, 0.2); createTone(600, now + 0.4, 0.2);
             }
        };

        const WaveformCanvas = ({ color, speed, type, flatline, onBeat }) => {
            const canvasRef = useRef(null);
            const dataRef = useRef([]);
            const phaseRef = useRef(0);
            const lastTimeRef = useRef(performance.now());

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let frameId;
                const draw = (time) => {
                    const deltaTime = (time - lastTimeRef.current) / 1000;
                    lastTimeRef.current = time;
                    if (deltaTime > 0.1) { frameId = requestAnimationFrame(draw); return; }
                    if (canvas.width !== canvas.offsetWidth) {
                        canvas.width = canvas.offsetWidth;
                        canvas.height = canvas.offsetHeight;
                        dataRef.current = new Array(canvas.width).fill(canvas.height / 2);
                    }
                    let newValue = canvas.height / 2;
                    const amplitude = canvas.height / 3;
                    if (!flatline && speed > 0) {
                        const beatsPerSecond = speed / 60;
                        const prevPhase = phaseRef.current;
                        phaseRef.current += (beatsPerSecond * 2 * Math.PI) * deltaTime;
                        if (phaseRef.current >= 2 * Math.PI) phaseRef.current -= 2 * Math.PI;
                        const p = phaseRef.current;
                        if (type === 'ecg' && onBeat) {
                             const threshold = Math.PI;
                             if (prevPhase < threshold && p >= threshold) onBeat();
                        }
                        if (type === 'ecg') {
                            if (p > 3.0 && p < 3.28) newValue = (canvas.height / 2) - (amplitude * 2.5 * Math.exp(-Math.pow(p - Math.PI, 2) * 50));
                            else if (p > 3.5 && p < 4.5) newValue = (canvas.height / 2) - (amplitude * 0.3 * Math.sin(p - 3.5));
                            else newValue = (canvas.height / 2) + (Math.random() * 1.5 - 0.75);
                        } else {
                            newValue = (canvas.height / 2) - (Math.sin(p) * amplitude * 0.6);
                        }
                    } else { newValue = (canvas.height / 2) + (Math.random() * 2 - 1); }
                    dataRef.current.push(newValue);
                    dataRef.current.shift();
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.lineWidth = 2.5; ctx.strokeStyle = color; ctx.beginPath();
                    for (let i = 0; i < dataRef.current.length; i++) {
                        if (i === 0) ctx.moveTo(i, dataRef.current[i]); else ctx.lineTo(i, dataRef.current[i]);
                    }
                    ctx.stroke();
                    frameId = requestAnimationFrame(draw);
                };
                frameId = requestAnimationFrame(draw);
                return () => cancelAnimationFrame(frameId);
            }, [color, speed, type, flatline, onBeat]);

            return <canvas ref={canvasRef} className="w-full h-full block" />;
        };

        const useInterpolatedVitals = (target) => {
            const [vitals, setVitals] = useState(target);
            const lastBeatRef = useRef(0);
            useEffect(() => {
                if (!target.transition) { setVitals(target); return; }
                lastBeatRef.current = 0;
                let frame;
                const animate = () => {
                    const elapsed = Date.now() - target.transition.startTime;
                    const p = Math.min(1, elapsed / target.transition.duration);
                    const trueHr = Math.round(target.transition.startHr + (target.transition.targetHr - target.transition.startHr) * p);

                    const now = Date.now();
                    // El monitor real actualiza el número una vez por latido, no por frame
                    const beatInterval = trueHr > 0 ? Math.max(400, 60000 / trueHr) : 2000;
                    if (now - lastBeatRef.current >= beatInterval) {
                        lastBeatRef.current = now;
                        const jitter = trueHr > 0 ? Math.floor(Math.random() * 5) - 2 : 0;
                        setVitals({ ...target, hr: Math.max(0, trueHr + jitter), spo2: trueSpo2 });
                    }
                    if (p < 1) { frame = requestAnimationFrame(animate); }
                    else { setVitals(target); }
                };
                frame = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(frame);
            }, [target]);
            return vitals;
        };

        const MonitorScreen = ({ sessionId, vitals: targetVitals, t, patientType = 'neonatal', onPatientTypeChange }) => {

                    <div className="flex-none flex justify-between px-4 py-2 bg-slate-900/50 text-slate-400 text-sm font-mono border-b border-slate-800 top-bar">

                            <div className="flex flex-col items-center px-4 justify-center number-container">

        const ControllerScreen = ({ sessionId, vitals: currentVitals, onUpdate, t, lang, db, userId, patientType = 'neonatal', onPatientTypeChange, onLangChange }) => {
            const vitals = useInterpolatedVitals(currentVitals);
            const [transitionDuration, setTransitionDuration] = useState(5);

            const [eventLog, setEventLog] = useState([]);
            const [localTargets, setLocalTargets] = useState({ hr: currentVitals.hr, spo2: currentVitals.spo2 });
            const [simStartTime, setSimStartTime] = useState(null);
            const [displayTime, setDisplayTime] = useState("00:00");
            const [activeCase, setActiveCase] = useState(null);
            const [stageIndex, setStageIndex] = useState(-1);
            const [showCaseSelector, setShowCaseSelector] = useState(false);
            const [userCases, setUserCases] = useState([]);
            const [showCaseEditor, setShowCaseEditor] = useState(false);
            const [editingCase, setEditingCase] = useState(null);
            const [debriefTab, setDebriefTab] = useState('eventos');
            const [gasNotes, setGasNotes] = useState({ gather: '', analyze: '', summarize: '' });
            const [showPresentation, setShowPresentation] = useState(false);
            const [selectedNTSkills, setSelectedNTSkills] = useState([]);
            const [technicalSkills, setTechnicalSkills] = useState(['', '', '']);

            useEffect(() => { setLocalTargets({ hr: currentVitals.hr, spo2: currentVitals.spo2 }); }, [currentVitals.hr, currentVitals.spo2]);

            useEffect(() => {
                let interval;
                if (currentVitals.simRunning) {

            }, [currentVitals.simRunning, simStartTime]);

            useEffect(() => {
                if (!db || !userId || userId === 'guest') return;
                const unsub = db.collection('userCases').where('userId', '==', userId).onSnapshot(snap => {
                    setUserCases(snap.docs.map(d => ({ ...d.data(), id: d.id, _firestore: true })));

                return () => unsub();
            }, [db, userId]);

            const getCaseName = (c) => typeof c.title === 'string' ? c.title : (c.title[lang] || c.title.es);
            const getStageName = (stage) => typeof stage.name === 'string' ? stage.name : (stage.name[lang] || stage.name.es);
            const getPresentation = (c) => { if (!c.presentation) return null; return typeof c.presentation === 'string' ? c.presentation : (c.presentation[lang] || c.presentation.es); };
            const patientCfg = PATIENT_CONFIG[patientType] || PATIENT_CONFIG.neonatal;

            const saveCase = (caseData) => {
                if (!db || !userId || userId === 'guest') return;
                const { _firestore, ...clean } = caseData;
                const payload = { ...clean, userId, updatedAt: Date.now() };
                if (caseData.id && _firestore) {
                    db.collection('userCases').doc(caseData.id).set(payload);

                    db.collection('userCases').add(payload);

                setShowCaseEditor(false);
                setEditingCase(null);

            const deleteUserCase = (caseId) => {
                if (!db) return;
                db.collection('userCases').doc(caseId).delete();
                if (activeCase && activeCase.id === caseId) { setActiveCase(null); setStageIndex(-1); }

            const logAction = (message, force = false) => {
                if (!currentVitals.simRunning && !force) return;
                const baseTime = (force && !currentVitals.simRunning) ? Date.now() : simStartTime;
                const elapsedTotalSeconds = baseTime ? Math.floor((Date.now() - baseTime) / 1000) : 0;
                const timestamp = `${Math.floor(elapsedTotalSeconds / 60).toString().padStart(2, '0')}:${(elapsedTotalSeconds % 60).toString().padStart(2, '0')}`;
                setEventLog(prev => [...prev, {time: timestamp, msg: message}]);
            };

            const toggleSimulation = () => {

                if (isNowRunning) { logAction("Simulation Started", true); onUpdate({ ...currentVitals, simRunning: true, transition: null }); trackNeoEvent('sim_start', 'Manual simulation start', { session_id: sessionId }); }
                else { logAction("Simulation Stopped", true); onUpdate({ ...currentVitals, simRunning: false }); trackNeoEvent('sim_stop', 'Manual simulation stop', { session_id: sessionId }); }

            const handleCommitChange = (field, value) => {
                const now = Date.now();
                const durationMs = transitionDuration * 1000;
                logAction(`Changed ${field.toUpperCase()}: ${value}`);
                trackNeoEvent('vital_change', `Manual ${field} update`, { field, value, transition: transitionDuration });
                onUpdate({ ...currentVitals, [field]: value, transition: (durationMs > 0 && currentVitals.simRunning) ? { startTime: now, duration: durationMs, startHr: vitals.hr, targetHr: field === 'hr' ? value : currentVitals.hr, startSpo2: vitals.spo2, targetSpo2: field === 'spo2' ? value : currentVitals.spo2 } : null });

            const advanceStage = () => {

                onUpdate({

                    transition: durationMs > 0 && currentVitals.simRunning ? {
                        startTime: now,

                                            className="w-full py-3 bg-blue-600 hover:bg-blue-500 rounded-lg font-bold text-white flex items-center justify-center gap-2 active:scale-95 transition-all">
                                            <Icons.ArrowRight className="w-5 h-5"/>
                                            {stageIndex === -1 ? 'Iniciar Caso' : `Sig: ${getStageName(activeCase.stages[stageIndex + 1])}`}
                                        </button>
                                    ) : (
                                        <div className="w-full py-3 bg-green-900/40 border border-green-500/30 rounded-lg font-bold text-green-400 text-center text-sm">
                                            ✓ Caso completado
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                    <div className="flex-none bg-slate-900 p-2 flex flex-col items-center">
                        <div className="w-full opacity-30 font-mono text-[10px] tracking-widest border border-slate-700 rounded py-1 bg-black/20 text-center mb-1">SPONSOR AREA</div>
                        <SponsorSpace compact className="h-10 w-full" source="Control" t={t} />
                    </div>
                </div>
            );
        };

        const QRScannerView = ({ onScan, onCancel, t }) => {
            const [sid, setSid] = useState('');
            useEffect(() => {
                const html5QrCode = new Html5Qrcode("reader");
                html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
                    try {
                        const url = new URL(decodedText);
                        const session = url.searchParams.get('session');
                        if (session) { html5QrCode.stop().then(() => onScan(session)); }
                    } catch(e) { html5QrCode.stop().then(() => onScan(decodedText)); }
                }).catch(() => {});
                return () => { if (html5QrCode.isScanning) { html5QrCode.stop().catch(() => {}); } };
            }, []);
            return (
                <div className="fixed inset-0 bg-slate-900 z-[60] flex flex-col p-6 animate-zoom">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="font-bold text-xl flex items-center gap-2"><Icons.Camera className="text-blue-400"/> {t.scanCamera}</h2>
                        <button onClick={onCancel} className="bg-slate-800 p-2 rounded-full"><Icons.X/></button>
                    </div>
                    <div className="bg-black rounded-2xl overflow-hidden shadow-2xl mb-8 relative"><div id="reader"></div></div>
                    <div className="mt-auto text-center space-y-4">
                        <p className="text-slate-500 text-sm mb-4">{t.scanManual}</p>
                        <div className="flex gap-2">
                            <input type="number" placeholder={t.placeholderId} value={sid} onChange={e => setSid(e.target.value)} className="flex-1 bg-slate-800 border border-slate-700 p-4 rounded-xl text-center font-mono text-xl outline-none focus:border-blue-500"/>
                            <button onClick={() => sid && onScan(sid)} className="bg-blue-600 p-4 rounded-xl px-6 font-bold"><Icons.ArrowRight/></button>
                        </div>
                    </div>
                </div>
            );
        };

        const AnimatedGuide = ({ onClose, t }) => (
            <div className="fixed inset-0 bg-slate-950/95 z-[70] flex flex-col p-6 animate-zoom overflow-y-auto">
                <div className="flex justify-between items-center mb-8"><h2 className="text-2xl font-black text-white">{t.guideTitle}</h2><button onClick={onClose} className="p-2 bg-slate-800 rounded-full"><Icons.X /></button></div>
                <div className="flex-1 flex flex-col items-center justify-center space-y-12 max-w-lg mx-auto w-full">
                    <div className="relative w-full flex flex-col items-center">
                        <div className="w-48 h-32 bg-slate-800 border-4 border-slate-700 rounded-lg flex items-center justify-center relative float-anim shadow-2xl"><Icons.Monitor className="w-10 h-10 text-green-500/50" /><div className="absolute inset-4 bg-white/10 rounded flex items-center justify-center"><Icons.QrCode className="w-8 h-8 text-white opacity-80" /></div><div className="absolute -top-4 -right-4 bg-green-600 text-[10px] font-bold px-2 py-1 rounded-full text-white shadow-lg">DEVICE A</div></div>
                        <p className="mt-4 text-center text-sm"><span className="text-green-400 font-bold uppercase block text-xs mb-1">{t.step1}</span>{t.guideStep1}</p>
                    </div>
                    <div className="flex flex-col items-center text-slate-700"><Icons.ArrowRight className="w-8 h-8 rotate-90" /></div>
                    <div className="relative w-full flex flex-col items-center pb-8">
                        <div className="w-20 h-40 bg-slate-800 border-4 border-slate-700 rounded-2xl flex items-center justify-center relative float-anim shadow-2xl" style={{animationDelay: '1.5s'}}><div className="absolute inset-2 bg-black rounded-lg overflow-hidden flex flex-col items-center justify-center"><div className="w-full h-1/2 bg-blue-500/10 flex items-center justify-center relative overflow-hidden"><div className="scan-line"></div><Icons.Camera className="w-6 h-6 text-blue-400 opacity-50" /></div><div className="p-1 space-y-1 w-full"><div className="w-full h-1 bg-slate-700 rounded"></div><div className="w-3/4 h-1 bg-slate-700 rounded"></div></div></div><div className="absolute -top-4 -right-4 bg-blue-600 text-[10px] font-bold px-2 py-1 rounded-full text-white shadow-lg">DEVICE B</div></div>
                        <p className="mt-4 text-center text-sm"><span className="text-blue-400 font-bold uppercase block text-xs mb-1">{t.step2}</span>{t.guideStep2}</p>
                    </div>
                </div>
                <button onClick={onClose} className="mt-8 bg-white text-black font-black py-4 rounded-2xl uppercase tracking-widest text-sm shadow-xl hover:bg-slate-200 transition-colors">{t.guideBtn}</button>
            </div>
        );

        const PatientTypeSelector = ({ current, onSelect, t, disabled = false }) => {
            const types = ['neonatal', 'pediatrico', 'adulto'];
            const labels = { neonatal: 'Neo', pediatrico: 'Ped', adulto: 'Adult' };
            return (
                <div className={`absolute top-6 left-6 z-[80] flex rounded-xl overflow-hidden border shadow-lg ${disabled ? 'border-slate-700/40 opacity-50' : 'border-slate-700'}`}>
                    {types.map(type => (
                        <button key={type}
                            onClick={() => { if (!disabled) onSelect(type); }}
                            disabled={disabled}
                            title={disabled ? 'Detener la simulación para cambiar tipo de paciente' : ''}
                            className={`px-3 py-2 text-xs font-bold transition-colors ${disabled ? 'cursor-not-allowed' : 'cursor-pointer'} ${current === type ? 'bg-blue-700 text-white' : 'bg-slate-900 text-slate-400 hover:bg-slate-800'}`}>
                            {labels[type]}
                        </button>
                    ))}
                </div>
            );
        };

        const LanguageSelector = ({ currentLang, onSelect }) => {
            const [isOpen, setIsOpen] = useState(false);
            const menuRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (menuRef.current && !menuRef.current.contains(event.target)) setIsOpen(false);
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            const langs = [
                { id: 'es', label: 'Español' },
                { id: 'en', label: 'English' },
                { id: 'pt', label: 'Português' }
            ];

            return (
                <div className="absolute top-6 right-6 z-[80]" ref={menuRef}>
                    <button 
                        onClick={() => setIsOpen(!isOpen)}
                        className="bg-slate-900 border border-slate-700 px-4 py-2 rounded-xl flex items-center gap-2 hover:bg-slate-800 transition-all shadow-lg min-w-[80px] justify-between"
                    >
                        <span className="text-xs font-bold text-white uppercase">{currentLang}</span>
                        <Icons.ChevronDown className={`w-3 h-3 text-slate-500 transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`} />
                    </button>
                    
                    {isOpen && (
                        <div className="absolute top-full right-0 mt-2 bg-slate-900 border border-slate-700 rounded-xl overflow-hidden shadow-2xl animate-zoom origin-top-right min-w-[120px]">
                            {langs.map(l => (
                                <button
                                    key={l.id}
                                    onClick={() => { onSelect(l.id); setIsOpen(false); }}
                                    className={`w-full text-left px-4 py-3 text-xs font-medium border-b border-slate-800 last:border-0 hover:bg-slate-800 transition-colors ${currentLang === l.id ? 'bg-slate-800 text-blue-400' : 'text-slate-400'}`}
                                >
                                    {l.label}
                                </button>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [mode, setMode] = useState('select');
            const [user, setUser] = useState(null);
            const [sessionId, setSessionId] = useState('');
            const [vitals, setVitals] = useState({ ...DEFAULT_VITALS, ...PATIENT_DEFAULTS.neonatal });
            // Estados pre-sesión: solo usados en pantalla select, antes de crear/unirse a sesión
            const browserLang = navigator.language.startsWith('es') ? 'es' : (navigator.language.startsWith('pt') ? 'pt' : 'en');
            const [preSessionLang, setPreSessionLang] = useState(browserLang);
            const [preSessionPatientType, setPreSessionPatientType] = useState('neonatal');
            const [showScanner, setShowScanner] = useState(false);
            const [showGuide, setShowGuide] = useState(false);
            const [sid] = useState(Math.floor(1000 + Math.random() * 9000).toString());

            // FUENTE ÚNICA DE VERDAD: cuando hay sesión, lang y patientType vienen de Firestore.
            // Sin stale-closures, sin estado duplicado, sin race conditions.
            const lang = sessionId ? (vitals.lang || preSessionLang) : preSessionLang;
            const patientType = sessionId ? (vitals.patientType || 'neonatal') : preSessionPatientType;
            const t = TRANSLATIONS[lang];

            useEffect(() => {
                auth.signInAnonymously().then(cred => setUser(cred.user)).catch(() => setUser({ uid: 'guest' }));
                const p = new URLSearchParams(window.location.search);
                if (p.get('mode') && p.get('session')) { setMode(p.get('mode')); setSessionId(p.get('session')); }
            }, []);

            // Listener limpio: solo setVitals. lang y patientType se derivan automáticamente.
            useEffect(() => {
                if (!sessionId || !db) return;
                const unsub = db.collection("sessions").doc(sessionId).onSnapshot(doc => {
                    if (doc.exists) setVitals(doc.data());
                });
                return () => unsub();
            }, [sessionId]);

            useEffect(() => {
                const defaults = PATIENT_DEFAULTS[patientType] || PATIENT_DEFAULTS.neonatal;
                setVitals(prev => ({ ...prev, hr: defaults.hr, spo2: defaults.spo2, simRunning: false, transition: null }));
            }, [patientType]);

            // Handlers: actualización optimista + escritura a Firestore.
            // La otra pantalla recibe el cambio vía su listener onSnapshot → setVitals → re-render.
            const handlePatientTypeChange = (type) => {
                if (vitals.simRunning) return;
                setVitals(prev => ({ ...prev, patientType: type }));
                if (db && sessionId) db.collection("sessions").doc(sessionId).set({ patientType: type }, { merge: true });
            };

            const handleLangChange = (newLang) => {
                setVitals(prev => ({ ...prev, lang: newLang }));
                if (db && sessionId) db.collection("sessions").doc(sessionId).set({ lang: newLang }, { merge: true });
            };

            const handleUpdate = (v) => {
                if (db && sessionId) db.collection("sessions").doc(sessionId).set(v, { merge: true });
            };

            if (!user) return <div className="h-screen bg-black flex flex-col items-center justify-center text-green-500"><div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-green-500 mb-4"></div><span className="font-mono text-sm tracking-widest uppercase">{t.connecting}</span></div>;

            if (mode === 'select') {
                return (
                    <div className="h-screen bg-slate-950 flex flex-col items-center justify-center p-6 text-center overflow-y-auto">
                        {showGuide && <AnimatedGuide onClose={() => setShowGuide(false)} t={t} />}
                        {showScanner && <QRScannerView onScan={(s) => { setMode('control'); setSessionId(s); }} onCancel={() => setShowScanner(false)} t={t} />}

                        <PatientTypeSelector current={preSessionPatientType} onSelect={setPreSessionPatientType} t={t} />
                        <LanguageSelector currentLang={preSessionLang} onSelect={setPreSessionLang} />

                        <header className="mb-10">
                            <Icons.Activity className="w-16 h-16 text-green-500 mx-auto mb-4 animate-pulse"/>
                            <h1 className="text-4xl font-black mb-2 tracking-tight text-white">NeoMonitor</h1>
                            <p className="text-slate-400 text-lg font-medium">{t.mainPrompt}</p>
                            <button onClick={() => setShowGuide(true)} className="mt-4 text-blue-400 flex items-center gap-2 mx-auto text-sm font-bold border border-blue-400/30 px-4 py-2 rounded-full hover:bg-blue-400/10 transition-colors"><Icons.Help className="w-4 h-4"/>{t.howToConnect}</button>
                        </header>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl">
                            <button onClick={() => {
                                const initDoc = { ...DEFAULT_VITALS, patientType: preSessionPatientType, lang: preSessionLang };
                                setVitals(initDoc);
                                setSessionId(sid);
                                setMode('monitor');
                                if (db) db.collection("sessions").doc(sid).set(initDoc);
                            }} className="bg-slate-900 border border-slate-800 hover:border-green-500/50 p-8 rounded-3xl flex flex-col items-center gap-6 group transition-all active:scale-95 shadow-2xl"><div className="bg-green-500/10 p-5 rounded-2xl group-hover:bg-green-500/20 transition-colors"><Icons.Monitor className="w-12 h-12 text-green-400"/></div><span className="text-xl font-bold text-white leading-tight">{t.useAsMonitor}</span></button>
                            <button onClick={() => setShowScanner(true)} className="bg-slate-900 border border-slate-800 hover:border-blue-500/50 p-8 rounded-3xl flex flex-col items-center gap-6 group transition-all active:scale-95 shadow-2xl"><div className="bg-blue-500/10 p-5 rounded-2xl group-hover:bg-blue-500/20 transition-colors"><Icons.Smartphone className="w-12 h-12 text-blue-400"/></div><span className="text-xl font-bold text-white leading-tight">{t.useAsControl}</span></button>
                        </div>

                        <div className="mt-12 w-full max-w-md"><SponsorSpace className="h-20 rounded-2xl bg-slate-900/50" source="Menu_Initial" t={t} /><p className="text-[10px] text-slate-600 mt-6 uppercase tracking-widest font-bold">NeoMonitor Simulator</p></div>
                    </div>
                );
            }

            return (
                <div className="font-sans antialiased">
                    {mode === 'monitor' && <MonitorScreen sessionId={sessionId} vitals={vitals} t={t} patientType={patientType} onPatientTypeChange={handlePatientTypeChange} />}
                    {mode === 'control' && <ControllerScreen sessionId={sessionId} vitals={vitals} onUpdate={handleUpdate} t={t} lang={lang} db={db} userId={user.uid} patientType={patientType} onPatientTypeChange={handlePatientTypeChange} onLangChange={handleLangChange} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
