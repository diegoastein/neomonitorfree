<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeoMonitor (Free Edition)</title>
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DK9H6YBTY9"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-DK9H6YBTY9');

      function trackNeoEvent(action, label) {
        console.log(`[GA Event] Acción: ${action} | Etiqueta: ${label}`);
        if (typeof gtag === 'function') {
          gtag('event', action, {
            'event_category': 'NeoMonitor_Interactions',
            'event_label': label
          });
        }
      }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin="anonymous" src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin="anonymous" src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin="anonymous" src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script crossorigin="anonymous" src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script crossorigin="anonymous" src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script crossorigin="anonymous" src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <!-- Librería para Escaneo QR -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        body { background-color: #000000; color: white; margin: 0; touch-action: manipulation; overflow: hidden; font-family: sans-serif; }
        
        .soft-key {
            background: linear-gradient(180deg, #334155 0%, #1e293b 100%);
            border: 1px solid #475569; color: #cbd5e1; font-family: monospace;
            font-size: 0.8rem; display: flex; align-items: center; justify-content: center;
            text-align: center; border-radius: 4px; cursor: pointer; user-select: none;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .soft-key:active { background: #0f172a; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }

        input[type=range] { accent-color: #42B334; }
        input[type=range].time-slider { accent-color: #f59e0b; }
        
        .sponsor-container {
            background: transparent;
            border: 1px solid rgba(71, 85, 105, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
            border-radius: 4px;
        }
        .sponsor-container:hover { background: rgba(255,255,255,0.05); border-color: #475569; }

        .hardware-accelerated { transform: translateZ(0); will-change: transform, opacity; }
        
        @keyframes zoomIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .animate-zoom { animation: zoomIn 0.3s ease-out forwards; }

        @media (max-width: 600px) and (orientation: portrait) {
            .monitor-screen { border-width: 4px !important; }
            .waveform-col { display: none !important; }
            .monitor-screen .main-row { grid-template-columns: 1fr !important; }
            .monitor-screen .number-container { align-items: center !important; padding-right: 0 !important; justify-content: center !important; }
            .monitor-screen .number-label { font-size: 1.2rem !important; margin-bottom: 0px !important; }
            .monitor-screen .number-display { font-size: 22vw !important; }
            .monitor-screen .extra-info-row { grid-template-columns: 1fr 1fr !important; }
            .monitor-screen .sponsor-col { display: none !important; }
            .monitor-screen .qr-button span { display: inline !important; font-size: 0.7rem !important; }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .monitor-screen { border-width: 4px !important; }
            .monitor-screen .top-bar, .monitor-screen .bottom-bar { padding: 0.2rem 0.5rem !important; font-size: 0.7rem !important; height: 32px !important; }
            .monitor-screen .main-row { grid-template-columns: 1fr 160px !important; }
            .monitor-screen .number-display { font-size: 15vh !important; }
        }

        .qr-button { background: linear-gradient(180deg, #166534 0%, #14532d 100%); border-color: #22c55e; color: #bbf7d0; }
        
        #reader { width: 100% !important; border: none !important; }
        #reader video { border-radius: 12px !important; object-fit: cover !important; }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #42B334;">
            <svg style="animation: spin 1s linear infinite; width: 40px; height: 40px; margin-bottom: 20px;" viewBox="0 0 24 24">
                <circle style="opacity: 0.25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                <path style="opacity: 0.75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <h2 style="font-weight: bold;">Cargando NeoMonitor...</h2>
            <style>@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }</style>
        </div>
    </div>

    <script type="text/babel">
       const firebaseConfig = {
          apiKey: "AIzaSyA46SqiHL-U13mdaJnee-KhD372aWc5h2E",
          authDomain: "monitor-36c41.firebaseapp.com",
          projectId: "monitor-36c41",
          storageBucket: "monitor-36c41.firebasestorage.app",
          messagingSenderId: "830562769122",
          appId: "1:830562769122:web:1db7060de0c80556db66bb"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
        const auth = firebase.auth();

        const { useState, useEffect, useRef } = React;

        const Icons = {
            Activity: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>,
            Monitor: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/></svg>,
            Smartphone: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="20" x="5" y="2" rx="2"/><path d="M12 18h.01"/></svg>,
            Wifi: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>,
            VolumeX: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" x2="17" y1="9" y2="15"/><line x1="17" x2="23" y1="9" y2="15"/></svg>,
            Play: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>,
            Battery: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="10" x="2" y="7" rx="2" ry="2"/><line x1="22" x2="22" y1="11" y2="13"/></svg>,
            QrCode: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h7v7h-7z"/><path d="M7 17h.01"/><path d="M17 7h.01"/><path d="M17 17h.01"/></svg>,
            X: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" x2="18" y1="6" y2="18"></line></svg>,
            Clock: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
            List: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" x2="21" y1="6" y2="6"></line><line x1="8" x2="21" y1="12" y2="12"></line><line x1="8" x2="21" y1="18" y2="18"></line><line x1="3" x2="3.01" y1="6" y2="6"></line><line x1="3" x2="3.01" y1="12" y2="12"></line><line x1="3" x2="3.01" y1="18" y2="18"></line></svg>,
            Camera: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>,
            ArrowRight: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        };

        const DEFAULT_VITALS = { hr: 122, spo2: 91, resp: 45, alarmMuted: false, connected: true, transition: null, soundTimestamp: 0, soundType: null, simRunning: false };

        const SponsorSpace = ({ className = "", compact = false, source = "Monitor" }) => (
            <div className={`sponsor-container ${className}`} onClick={() => {
                trackNeoEvent('sponsor_click', source);
                window.open('https://tu-sitio-o-del-sponsor.com', '_blank');
            }}>
                <div className="flex flex-col items-center">
                    <span className="text-[10px] text-slate-500 font-bold mb-0.5">SPONSOR</span>
                    <div className="bg-slate-700/50 w-full px-4 py-1 rounded flex items-center justify-center">
                        <span className="text-[9px] text-slate-400 font-mono italic">LOGO AQUÍ</span>
                    </div>
                </div>
            </div>
        );

        let audioCtx;
        const initAudio = () => {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        };

        const playBeep = (pitch = 800) => {
            if (!audioCtx || audioCtx.state !== 'running') return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine';
            oscillator.frequency.value = pitch;
            const now = audioCtx.currentTime;
            gainNode.gain.setValueAtTime(0.1, now); 
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
            oscillator.start(now);
            oscillator.stop(now + 0.15);
        };

        const playAlarmSequence = (type) => {
             if (!audioCtx || audioCtx.state !== 'running') return;
             const now = audioCtx.currentTime;
             const createTone = (freq, start, duration) => {
                 const osc = audioCtx.createOscillator();
                 const gain = audioCtx.createGain();
                 osc.connect(gain);
                 gain.connect(audioCtx.destination);
                 osc.type = 'square'; 
                 osc.frequency.value = freq;
                 gain.gain.setValueAtTime(0.08, start);
                 gain.gain.setValueAtTime(0, start + duration);
                 osc.start(start);
                 osc.stop(start + duration);
             };
             if (type === 'critical') {
                 createTone(880, now, 0.1); createTone(880, now + 0.2, 0.1); createTone(880, now + 0.4, 0.1);
             } else if (type === 'warning') {
                 createTone(600, now, 0.2); createTone(600, now + 0.4, 0.2);
             }
        };

        const playClinicalSound = (type) => {
            if (!audioCtx || audioCtx.state !== 'running') return;
            const now = audioCtx.currentTime;
            if (type === 'grunt') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sawtooth'; 
                osc.frequency.setValueAtTime(180, now);
                osc.frequency.linearRampToValueAtTime(120, now + 0.3);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.7, now + 0.05); 
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
                osc.start(now);
                osc.stop(now + 0.4);
            }
        };

        const WaveformCanvas = ({ color, speed, type, flatline, onBeat }) => {
            const canvasRef = useRef(null);
            const dataRef = useRef([]);
            const phaseRef = useRef(0);
            const lastTimeRef = useRef(performance.now());

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let frameId;

                const draw = (time) => {
                    const deltaTime = (time - lastTimeRef.current) / 1000;
                    lastTimeRef.current = time;
                    if (deltaTime > 0.1) { frameId = requestAnimationFrame(draw); return; }

                    if (canvas.width !== canvas.offsetWidth) {
                        canvas.width = canvas.offsetWidth;
                        canvas.height = canvas.offsetHeight;
                        dataRef.current = new Array(canvas.width).fill(canvas.height / 2);
                    }

                    let newValue = canvas.height / 2;
                    const amplitude = canvas.height / 3;
                    
                    if (!flatline && speed > 0) {
                        const beatsPerSecond = speed / 60;
                        const prevPhase = phaseRef.current;
                        phaseRef.current += (beatsPerSecond * 2 * Math.PI) * deltaTime;
                        if (phaseRef.current >= 2 * Math.PI) phaseRef.current -= 2 * Math.PI;
                        const p = phaseRef.current;

                        if (type === 'ecg' && onBeat) {
                             const threshold = Math.PI;
                             if (prevPhase < threshold && p >= threshold) onBeat();
                        }

                        if (type === 'ecg') {
                            if (p > 3.0 && p < 3.28) newValue = (canvas.height / 2) - (amplitude * 2.5 * Math.exp(-Math.pow(p - Math.PI, 2) * 50));
                            else if (p > 3.5 && p < 4.5) newValue = (canvas.height / 2) - (amplitude * 0.3 * Math.sin(p - 3.5));
                            else newValue = (canvas.height / 2) + (Math.random() * 1.5 - 0.75);
                        } else {
                            newValue = (canvas.height / 2) - (Math.sin(p) * amplitude * 0.6);
                        }
                    } else {
                        newValue = (canvas.height / 2) + (Math.random() * 2 - 1);
                    }

                    dataRef.current.push(newValue);
                    dataRef.current.shift();
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.lineWidth = 2.5; ctx.strokeStyle = color; ctx.beginPath();
                    for (let i = 0; i < dataRef.current.length; i++) {
                        if (i === 0) ctx.moveTo(i, dataRef.current[i]); else ctx.lineTo(i, dataRef.current[i]);
                    }
                    ctx.stroke();
                    frameId = requestAnimationFrame(draw);
                };
                frameId = requestAnimationFrame(draw);
                return () => cancelAnimationFrame(frameId);
            }, [color, speed, type, flatline, onBeat]);

            return <canvas ref={canvasRef} className="w-full h-full block" />;
        };

        const useInterpolatedVitals = (target) => {
            const [vitals, setVitals] = useState(target);
            useEffect(() => {
                if (!target.transition) { setVitals(target); return; }
                let frame;
                const animate = () => {
                    const elapsed = Date.now() - target.transition.startTime;
                    const p = Math.min(1, elapsed / target.transition.duration);
                    if (p < 1) {
                        setVitals({
                            ...target,
                            hr: Math.round(target.transition.startHr + (target.transition.targetHr - target.transition.startHr) * p),
                            spo2: Math.round(target.transition.startSpo2 + (target.transition.targetSpo2 - target.transition.startSpo2) * p),
                        });
                        frame = requestAnimationFrame(animate);
                    } else { setVitals(target); }
                };
                frame = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(frame);
            }, [target]);
            return vitals;
        };

        const MonitorScreen = ({ sessionId, vitals: targetVitals }) => {
            const vitals = useInterpolatedVitals(targetVitals);
            const [audioEnabled, setAudioEnabled] = useState(false);
            const [time, setTime] = useState(new Date());
            const [alarmState, setAlarmState] = useState('none');
            const [flash, setFlash] = useState(false);
            const [qrExpanded, setQrExpanded] = useState(false);

            useEffect(() => {
                const t = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(t);
            }, []);

            useEffect(() => {
                if (!vitals.simRunning) { setAlarmState('none'); return; }
                let level = 'none';
                if (vitals.hr < 60 || vitals.hr === 0 || vitals.spo2 < 80) level = 'critical';
                else if (vitals.hr < 100 || vitals.hr > 180 || vitals.spo2 < 89) level = 'warning';
                setAlarmState(level);
                const interval = setInterval(() => setFlash(p => !p), level === 'critical' ? 300 : 800);
                return () => clearInterval(interval);
            }, [vitals.hr, vitals.spo2, vitals.simRunning]);

            useEffect(() => {
                let interval;
                if (audioEnabled && !vitals.alarmMuted && alarmState !== 'none' && vitals.simRunning) {
                    playAlarmSequence(alarmState);
                    interval = setInterval(() => playAlarmSequence(alarmState), alarmState === 'critical' ? 2500 : 4000);
                }
                return () => clearInterval(interval);
            }, [alarmState, audioEnabled, vitals.alarmMuted, vitals.simRunning]);

            useEffect(() => {
                if (vitals.simRunning && vitals.soundTimestamp > 0 && vitals.soundType) playClinicalSound(vitals.soundType);
            }, [vitals.soundTimestamp, vitals.soundType, vitals.simRunning]);

            const handleBeat = () => {
                if (!audioEnabled || vitals.alarmMuted || !vitals.simRunning) return;
                playBeep(vitals.spo2 < 89 ? 400 : 800);
            };

            const start = () => { 
                if (document.documentElement.requestFullscreen) { document.documentElement.requestFullscreen().catch(() => {}); }
                initAudio(); setAudioEnabled(true); 
            };

            const getBorderColor = () => {
                if (alarmState === 'none' || vitals.alarmMuted || !vitals.simRunning) return 'border-slate-900';
                if (alarmState === 'critical') return flash ? 'border-red-600 bg-red-900/10' : 'border-red-900';
                return flash ? 'border-yellow-500 bg-yellow-900/10' : 'border-yellow-900';
            };

            const getTextColor = (base) => (alarmState !== 'none' && !vitals.alarmMuted && flash) ? 'text-white' : base;

            const getControlUrl = () => {
                const origin = window.location.origin;
                const isPreview = origin.includes('googleusercontent') || origin.includes('webcontainer') || origin === 'null';
                const base = isPreview ? 'https://neomonitor.pro/' : (origin + window.location.pathname);
                return `${base}?mode=control&session=${sessionId}`;
            };
            const controlUrl = getControlUrl();

            return (
                <div className={`w-full h-screen bg-black flex flex-col border-[12px] transition-colors duration-100 ${getBorderColor()} hardware-accelerated monitor-screen`}>
                    {!audioEnabled && (
                        <div className="absolute inset-0 bg-black/90 z-50 flex items-center justify-center text-center px-4">
                            <button onClick={start} className="bg-green-600 px-8 py-4 rounded-xl font-bold text-xl animate-pulse">TOCAR PARA INICIAR MONITOR</button>
                        </div>
                    )}

                    {audioEnabled && !vitals.simRunning && (
                        <div className="absolute inset-0 bg-black z-40 flex flex-col items-center justify-center text-center p-6 border-4 border-slate-800 m-2 rounded-xl">
                            <Icons.Monitor className="w-12 h-12 text-slate-700 mb-4" />
                            <h2 className="text-xl font-bold text-slate-500 uppercase tracking-widest mb-4">Simulación sin iniciar</h2>
                            <div className="bg-white p-3 rounded-lg shadow-lg mb-4">
                                <img src={`https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(controlUrl)}`} alt="Sincronizar Control" className="w-[180px] h-[180px]" />
                            </div>
                            <p className="text-xs text-slate-400 font-mono mb-2">ID SESIÓN: {sessionId}</p>
                            <p className="text-slate-400 text-sm italic">Escanea para conectar el control o espera comando...</p>
                        </div>
                    )}

                    {qrExpanded && (
                        <div className="fixed inset-0 bg-black/90 z-[100] flex flex-col items-center justify-center p-6" onClick={() => setQrExpanded(false)}>
                            <div className="bg-white p-4 rounded-2xl shadow-2xl max-w-xs w-full aspect-square flex items-center justify-center relative animate-zoom" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setQrExpanded(false)} className="absolute -top-12 right-0 text-white"><Icons.X className="w-8 h-8" /></button>
                                <img src={`https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(controlUrl)}`} alt="Control QR" className="w-full h-full" />
                            </div>
                            <p className="mt-6 text-white font-bold text-center px-4">Escanea con tu celular para usarlo como control remoto</p>
                        </div>
                    )}

                    <div className="flex-none flex justify-between px-4 py-2 bg-slate-900/50 text-slate-400 text-sm font-mono border-b border-slate-800 top-bar">
                        <div className="flex gap-4"><span>NEONATAL</span><span>CAMA: 01</span></div>
                        <div className="flex gap-4 items-center">{vitals.alarmMuted && <Icons.VolumeX className="text-orange-500 w-4 h-4" />}<span>ID: {sessionId}</span></div>
                    </div>

                    <div className="flex-1 flex flex-col divide-y divide-slate-800 min-h-0">
                        <div className="flex-[1.5] grid grid-cols-[1fr_280px] h-full main-row">
                            <div className="relative border-r border-slate-800 bg-black waveform-col">{vitals.simRunning && <WaveformCanvas color="#42B334" speed={vitals.hr} type="ecg" flatline={vitals.hr === 0} onBeat={handleBeat}/>}</div>
                            <div className="flex flex-col items-center px-4 justify-center number-container">
                                <span className="text-[#42B334] font-bold text-lg number-label">FC</span>
                                <span className={`font-mono font-bold leading-none ${getTextColor('text-[#42B334]')} number-display`} style={{fontSize: '18vh'}}>{vitals.simRunning ? (vitals.hr || '--') : '--'}</span>
                            </div>
                        </div>
                        <div className="flex-[1.5] grid grid-cols-[1fr_280px] h-full main-row">
                            <div className="relative border-r border-slate-800 bg-black waveform-col">{vitals.simRunning && <WaveformCanvas color="#facc15" speed={vitals.hr} type="pleth" flatline={vitals.spo2 === 0}/>}</div>
                            <div className="flex flex-col items-center px-4 justify-center number-container">
                                <span className="text-yellow-400 font-bold text-lg number-label">SpO2</span>
                                <span className={`font-mono font-bold leading-none ${getTextColor('text-yellow-400')} number-display`} style={{fontSize: '18vh'}}>{vitals.simRunning ? (vitals.spo2 || '--') : '--'}</span>
                            </div>
                        </div>
                        <div className="flex-1 grid grid-cols-[1fr_1fr_280px] h-full divide-x divide-slate-800 extra-info-row">
                            <div className="flex flex-col justify-center items-center text-slate-600"><span className="text-xs">RESP</span><span className="text-4xl font-bold extra-info-val">---</span></div>
                            <div className="flex flex-col justify-center items-center text-slate-600"><span className="text-xs">PNI</span><span className="text-2xl font-bold extra-info-val">--/--</span></div>
                            <div className="p-2 flex items-center justify-center sponsor-col"><SponsorSpace className="w-full h-full" source="Monitor" /></div>
                        </div>
                    </div>

                    <div className="flex-none bg-slate-900 p-2 flex justify-between items-center text-xs text-slate-500 bottom-bar">
                        <div className="flex gap-2">
                            <div className="soft-key px-4 py-2">Silenciar</div>
                            <div className="soft-key px-4 py-2">Menú</div>
                            <div className="soft-key qr-button px-3 py-2 flex items-center gap-1 font-bold" onClick={() => setQrExpanded(true)}><Icons.QrCode className="w-4 h-4" /><span>VINCULAR</span></div>
                        </div>
                        
                        <div className="flex-1 flex justify-center opacity-30 font-mono text-[10px] tracking-widest border border-slate-800 mx-4 rounded py-1 bg-black/20">
                            ESPACIO PARA SPONSOR
                        </div>

                        <div className="flex gap-4 items-center font-mono"><span>{time.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span><Icons.Wifi className="w-4 h-4 text-green-500" /><Icons.Battery className="w-4 h-4 text-green-500" /></div>
                    </div>
                </div>
            );
        };

        const ControllerScreen = ({ sessionId, vitals: currentVitals, onUpdate }) => {
            const vitals = useInterpolatedVitals(currentVitals);
            const [transitionDuration, setTransitionDuration] = useState(5);
            const [showDebrief, setShowDebrief] = useState(false);
            const [eventLog, setEventLog] = useState([]);
            const [localTargets, setLocalTargets] = useState({ hr: currentVitals.hr, spo2: currentVitals.spo2 });
            const [simStartTime, setSimStartTime] = useState(null);
            const [displayTime, setDisplayTime] = useState("00:00");

            useEffect(() => { setLocalTargets({ hr: currentVitals.hr, spo2: currentVitals.spo2 }); }, [currentVitals.hr, currentVitals.spo2]);

            useEffect(() => {
                let interval;
                if (currentVitals.simRunning) {
                    if (!simStartTime) setSimStartTime(Date.now());
                    interval = setInterval(() => {
                        const start = simStartTime || Date.now();
                        const elapsed = Math.floor((Date.now() - start) / 1000);
                        const mins = Math.floor(elapsed / 60);
                        const secs = elapsed % 60;
                        setDisplayTime(`${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`);
                    }, 1000);
                } else { setSimStartTime(null); setDisplayTime("00:00"); }
                return () => clearInterval(interval);
            }, [currentVitals.simRunning, simStartTime]);

            const logAction = (message, force = false) => { 
              if (!currentVitals.simRunning && !force) return;
              const baseTime = (force && !currentVitals.simRunning) ? Date.now() : simStartTime;
              const elapsedTotalSeconds = baseTime ? Math.floor((Date.now() - baseTime) / 1000) : 0;
              const mins = Math.floor(elapsedTotalSeconds / 60);
              const secs = elapsedTotalSeconds % 60;
              const timestamp = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
              setEventLog(prev => [...prev, {time: timestamp, msg: message}]);
            };

            const toggleSimulation = () => {
                const isNowRunning = !currentVitals.simRunning;
                if (isNowRunning) { logAction("Simulación Iniciada", true); onUpdate({ ...currentVitals, simRunning: true, transition: null }); }
                else { logAction("Simulación Finalizada", true); onUpdate({ ...currentVitals, simRunning: false }); }
            };

            const handleCommitChange = (field, value) => {
                const now = Date.now();
                const durationMs = transitionDuration * 1000;
                if (field === 'hr') logAction(`Cambio FC: ${value} lpm`);
                if (field === 'spo2') logAction(`Cambio SpO2: ${value}%`);
                const shouldInterpolate = durationMs > 0 && currentVitals.simRunning;
                onUpdate({ ...currentVitals, [field]: value, transition: shouldInterpolate ? { startTime: now, duration: durationMs, startHr: vitals.hr, targetHr: field === 'hr' ? value : currentVitals.hr, startSpo2: vitals.spo2, targetSpo2: field === 'spo2' ? value : currentVitals.spo2, startResp: vitals.resp, targetResp: 45 } : null });
            };

            const triggerSound = (type, name) => { onUpdate({ ...currentVitals, soundType: type, soundTimestamp: Date.now() }); logAction(`Sonido: ${name}`); };

            const applyPreset = (type, name) => {
                let p = {};
                switch(type) {
                    case 'normal': p = { hr: 142, spo2: 94, resp: 45 }; break;
                    case 'brady': p = { hr: 68, spo2: 75, resp: 20 }; break;
                    case 'desat': p = { hr: 110, spo2: 84, resp: 60 }; break;
                    case 'vpp': p = { hr: 88, spo2: 84, resp: 40 }; break;
                    case 'vpp_ct': p = { hr: 56, spo2: 65, resp: 0 }; break;
                }
                const now = Date.now();
                onUpdate({ ...currentVitals, ...p, transition: currentVitals.simRunning ? { startTime: now, duration: transitionDuration * 1000, startHr: vitals.hr, targetHr: p.hr, startSpo2: vitals.spo2, targetSpo2: p.spo2, startResp: vitals.resp, targetResp: p.resp } : null });
                logAction(`Escenario: ${name}`);
            };

            return (
                <div className="h-screen overflow-y-auto bg-slate-900 text-white flex flex-col">
                    <header className="flex-none flex justify-between items-center p-4 bg-slate-800">
                        <div className="flex items-center gap-2">
                            <h2 className="font-bold text-blue-400 flex items-center gap-2"><Icons.Smartphone className="w-4 h-4"/> Control</h2>
                            {currentVitals.simRunning && <span className="ml-2 px-2 py-0.5 bg-red-900/50 text-red-400 text-xs rounded border border-red-500 font-mono animate-pulse">{displayTime}</span>}
                            <button onClick={() => setShowDebrief(true)} className="ml-4 bg-slate-700 text-xs px-2 py-1 rounded flex items-center gap-1"><Icons.List className="w-3 h-3"/> Debriefing</button>
                        </div>
                        <span className="text-sm font-mono border border-slate-600 px-2 py-0.5 rounded">ID: {sessionId}</span>
                    </header>

                    {showDebrief && (
                        <div className="fixed inset-0 bg-black/90 z-50 p-4 flex flex-col" onClick={() => setShowDebrief(false)}>
                            <div className="bg-slate-800 rounded-xl flex-1 flex flex-col overflow-hidden max-w-md mx-auto w-full" onClick={e => e.stopPropagation()}>
                                <div className="p-4 border-b border-slate-700 flex justify-between items-center"><h3 className="font-bold">Debriefing (Min:Seg)</h3><button onClick={() => setShowDebrief(false)}><Icons.X className="w-6 h-6"/></button></div>
                                <div className="flex-1 overflow-y-auto p-4 space-y-2 bg-black/20">
                                    {eventLog.length === 0 ? <p className="text-slate-500 italic text-center mt-10">Sin eventos registrados</p> : null}
                                    {eventLog.map((l, i) => (
                                        <div key={i} className="flex gap-3 text-sm border-b border-slate-700/30 pb-2"><span className="text-slate-400 font-mono w-14 flex-none">[{l.time}]</span><span>{l.msg}</span></div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="flex-1 p-4 space-y-6">
                        <button onClick={toggleSimulation} className={`w-full p-6 rounded-xl font-bold text-xl flex items-center justify-center gap-4 shadow-lg border-2 transition-all active:scale-95 ${currentVitals.simRunning ? "bg-red-600 hover:bg-red-500 border-red-400" : "bg-blue-600 hover:bg-blue-500 border-blue-400"}`}>
                            {currentVitals.simRunning ? <Icons.X className="w-8 h-8"/> : <Icons.Play className="w-8 h-8 fill-white"/>}
                            {currentVitals.simRunning ? "FINALIZAR SIMULACIÓN" : "COMENZAR SIMULACIÓN"}
                        </button>
                        <div className="bg-slate-800 p-4 rounded-xl">
                            <div className="flex justify-between mb-2 text-amber-400 font-bold"><label className="flex gap-2 text-sm"><Icons.Clock className="w-4 h-4"/> Transición</label><span>{transitionDuration}s</span></div>
                            <input type="range" min="0" max="60" step="5" value={transitionDuration} onChange={e => setTransitionDuration(parseInt(e.target.value))} className="w-full h-8 time-slider"/>
                        </div>
                        
                        <div className="bg-slate-800 p-6 rounded-xl">
                            <div className="flex justify-between mb-2 font-bold text-[#42B334]"><span>FC: {localTargets.hr}</span><span className="text-xs opacity-50">Act: {vitals.hr}</span></div>
                            <input type="range" min="0" max="220" value={localTargets.hr} onChange={e => setLocalTargets({ ...localTargets, hr: parseInt(e.target.value) })} onTouchEnd={() => handleCommitChange('hr', localTargets.hr)} onMouseUp={() => handleCommitChange('hr', localTargets.hr)} className="w-full h-12"/>
                        </div>
                        <div className="bg-slate-800 p-6 rounded-xl">
                            <div className="flex justify-between mb-2 font-bold text-yellow-400"><span>SpO2: {localTargets.spo2}%</span><span className="text-xs opacity-50">Act: {vitals.spo2}%</span></div>
                            <input type="range" min="0" max="100" value={localTargets.spo2} onChange={e => setLocalTargets({ ...localTargets, spo2: parseInt(e.target.value) })} onTouchEnd={() => handleCommitChange('spo2', localTargets.spo2)} onMouseUp={() => handleCommitChange('spo2', localTargets.spo2)} className="w-full h-12 accent-yellow-400"/>
                        </div>

                        <div className="grid grid-cols-2 gap-3">
                            <button onClick={() => applyPreset('normal', 'Normalidad')} className="p-4 bg-emerald-900/40 border border-emerald-500/50 rounded-lg text-emerald-400 font-bold">Normal</button>
                            <button onClick={() => applyPreset('brady', 'Bradicardia')} className="p-4 bg-yellow-900/40 border border-yellow-500/50 rounded-lg text-yellow-400 font-bold">Bradicardia</button>
                            <button onClick={() => applyPreset('desat', 'Desaturación')} className="p-4 bg-blue-900/40 border border-blue-500/50 rounded-lg text-blue-400 font-bold text-sm">Desaturación</button>
                            <button onClick={() => triggerSound('grunt', 'Quejido')} className="p-4 bg-orange-900/40 border border-orange-500/50 rounded-lg text-orange-400 font-bold">Quejido</button>
                            <button onClick={() => applyPreset('vpp', 'VPP')} className="p-4 bg-indigo-900/40 border border-indigo-500/50 rounded-lg text-indigo-400 font-bold">VPP</button>
                            <button onClick={() => applyPreset('vpp_ct', 'VPP + Masaje')} className="p-4 bg-red-900/40 border border-red-500/50 rounded-lg text-red-500 font-bold">VPP + CT</button>
                        </div>
                    </div>
                    
                    <div className="flex-none bg-slate-900 p-2 flex flex-col items-center">
                        <div className="w-full opacity-30 font-mono text-[10px] tracking-widest border border-slate-700 rounded py-1 bg-black/20 text-center mb-1">
                            ESPACIO PARA SPONSOR
                        </div>
                        <SponsorSpace compact className="h-10 w-full" source="Control" />
                    </div>
                </div>
            );
        };

        const QRScannerView = ({ onScan, onCancel }) => {
            const [sid, setSid] = useState('');
            
            useEffect(() => {
                const html5QrCode = new Html5Qrcode("reader");
                const config = { fps: 10, qrbox: { width: 250, height: 250 } };
                
                html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                    try {
                        const url = new URL(decodedText);
                        const session = url.searchParams.get('session');
                        if (session) { html5QrCode.stop().then(() => onScan(session)); }
                    } catch(e) { html5QrCode.stop().then(() => onScan(decodedText)); }
                }).catch(() => {});

                return () => { if (html5QrCode.isScanning) { html5QrCode.stop().catch(() => {}); } };
            }, []);

            return (
                <div className="fixed inset-0 bg-slate-900 z-[60] flex flex-col p-6 animate-zoom">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="font-bold text-xl flex items-center gap-2"><Icons.Camera className="text-blue-400"/> Escanear Monitor</h2>
                        <button onClick={onCancel} className="bg-slate-800 p-2 rounded-full"><Icons.X/></button>
                    </div>
                    
                    <div className="bg-black rounded-2xl overflow-hidden shadow-2xl mb-8 relative">
                        <div id="reader"></div>
                        <div className="absolute inset-0 pointer-events-none border-2 border-blue-500/30 rounded-2xl"></div>
                    </div>

                    <div className="mt-auto space-y-4">
                        <div className="text-center">
                            <p className="text-slate-500 text-sm mb-4">Si el scaner no funciona ingrese el ID que figura junto al código QR</p>
                            <div className="flex gap-2">
                                <input type="number" placeholder="Ingrese ID" value={sid} onChange={e => setSid(e.target.value)} className="flex-1 bg-slate-800 border border-slate-700 p-4 rounded-xl text-center font-mono text-xl outline-none focus:border-blue-500"/>
                                <button onClick={() => sid && onScan(sid)} className="bg-blue-600 p-4 rounded-xl px-6 font-bold"><Icons.ArrowRight/></button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const RoleSelection = ({ onSelect }) => {
            const [showScanner, setShowScanner] = useState(false);
            const [sid] = useState(Math.floor(1000 + Math.random() * 9000).toString());

            if (showScanner) {
                return <QRScannerView onScan={(s) => onSelect('control', s)} onCancel={() => setShowScanner(false)} />;
            }

            return (
                <div className="h-screen bg-slate-950 flex flex-col items-center justify-center p-6 text-center">
                    <header className="mb-12">
                        <Icons.Activity className="w-16 h-16 text-green-500 mx-auto mb-4 animate-pulse"/>
                        <h1 className="text-4xl font-black mb-2 tracking-tight text-white">NeoMonitor</h1>
                        <p className="text-slate-400 text-lg font-medium">Abrir esta app en los dos dispositivos</p>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl">
                        <button 
                            onClick={() => onSelect('monitor', sid)}
                            className="bg-slate-900 border border-slate-800 hover:border-green-500/50 p-8 rounded-3xl flex flex-col items-center gap-6 group transition-all active:scale-95 shadow-2xl"
                        >
                            <div className="bg-green-500/10 p-5 rounded-2xl group-hover:bg-green-500/20 transition-colors">
                                <Icons.Monitor className="w-12 h-12 text-green-400"/>
                            </div>
                            <span className="text-xl font-bold text-white">Usar este dispositivo como Monitor</span>
                        </button>

                        <button 
                            onClick={() => setShowScanner(true)}
                            className="bg-slate-900 border border-slate-800 hover:border-blue-500/50 p-8 rounded-3xl flex flex-col items-center gap-6 group transition-all active:scale-95 shadow-2xl"
                        >
                            <div className="bg-blue-500/10 p-5 rounded-2xl group-hover:bg-blue-500/20 transition-colors">
                                <Icons.Smartphone className="w-12 h-12 text-blue-400"/>
                            </div>
                            <span className="text-xl font-bold text-white">Usar este dispositivo como Control</span>
                        </button>
                    </div>

                    <div className="mt-16 w-full max-w-md">
                        <SponsorSpace className="h-24 rounded-2xl bg-slate-900/50" source="Menu_Inicial" />
                        <p className="text-[10px] text-slate-600 mt-6 uppercase tracking-widest font-bold">Free Education Edition</p>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [mode, setMode] = useState('select');
            const [user, setUser] = useState(null);
            const [sessionId, setSessionId] = useState('');
            const [vitals, setVitals] = useState(DEFAULT_VITALS);

            useEffect(() => {
                auth.signInAnonymously().then(cred => setUser(cred.user)).catch(() => setUser({ uid: 'guest' }));
                const p = new URLSearchParams(window.location.search);
                if (p.get('mode') && p.get('session')) { setMode(p.get('mode')); setSessionId(p.get('session')); }
            }, []);

            useEffect(() => {
                if (!sessionId || !db) return;
                const unsub = db.collection("sessions").doc(sessionId).onSnapshot(doc => { if (doc.exists) setVitals(doc.data()); });
                return () => unsub();
            }, [sessionId]);

            const handleUpdate = async (v) => {
                setVitals(v);
                if (db && sessionId) { try { await db.collection("sessions").doc(sessionId).set(v, { merge: true }); } catch(e){} }
            };

            if (!user) return (
                <div className="h-screen bg-black flex flex-col items-center justify-center text-green-500">
                    <div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-green-500 mb-4"></div>
                    <span className="font-mono text-sm tracking-widest uppercase">Conectando...</span>
                </div>
            );

            return (
                <div className="font-sans antialiased">
                    {mode === 'select' && <RoleSelection onSelect={(m, s) => { setMode(m); setSessionId(s); }} />}
                    {mode === 'monitor' && <MonitorScreen sessionId={sessionId} vitals={vitals} />}
                    {mode === 'control' && <ControllerScreen sessionId={sessionId} vitals={vitals} onUpdate={handleUpdate} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
