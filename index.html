    <script>
        (function() {
            var host = window.location.hostname;
            var protocol = window.location.protocol;
            
            // Ignorar entorno local (pruebas)
            if (host.includes('localhost') || host.includes('127.0.0.1') || host.includes('.local')) {
                return;
            }

            var newHost = host;
            var newProtocol = protocol;
            var needsRedirect = false;

            // 1. Forzar HTTPS
            if (protocol !== 'https:') {
                newProtocol = 'https:';
                needsRedirect = true;
            }

            // 2. Quitar 'www.' si existe
            if (host.startsWith('www.')) {
                newHost = host.substring(4);
                needsRedirect = true;
            }

            if (needsRedirect) {
                window.location.replace(newProtocol + '//' + newHost + window.location.pathname + window.location.search + window.location.hash);
            }
        })();
    </script>

        /* --- CLASE PARA ROTACIÓN FORZADA EN MÓVIL --- */
        .force-landscape-container {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Si es pantalla pequeña y está en vertical, rotamos */
        @media screen and (max-width: 900px) and (orientation: portrait) {
            .force-landscape {
                position: absolute;
                top: 50%;
                left: 50%;
                width: 100vh; /* Intercambiamos dimensiones */
                height: 100vw;
                transform: translate(-50%, -50%) rotate(90deg);
                transform-origin: center center;
                overflow: hidden;
            }
        }

            }

    <script>
        function showError(title, details) {
            if (details.includes('network') || details.includes('fetch') || details.includes('offline')) return;
            const log = document.getElementById('debug-log');
            log.style.display = 'block';
            log.innerHTML = `<strong>${title}</strong><br/>${details}`;
            setTimeout(() => { log.style.display = 'none'; }, 5000);
        }
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            if (msg.includes('ResizeObserver')) return false;
            if (msg === 'Script error.') return false; 
            showError('Aviso:', msg);
            return false;
        };
        window.onunhandledrejection = function(event) {
            let message = event.reason ? (event.reason.message || event.reason) : 'Error desconocido';
            if (message.toString().toLowerCase().includes('client is offline') || message.toString().includes('network')) return; 
            if(message.toString().includes('auth/unauthorized-domain')) {
                message = "BLOQUEADO: Dominio no autorizado en Firebase.";
                showError('Configuración:', message);
            }
        };
    </script>

        const playBeep = (pitch = 800) => {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            try {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.type = 'sine';
                oscillator.frequency.value = pitch;
                const now = audioCtx.currentTime;
                gainNode.gain.setValueAtTime(0.2, now); 
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                oscillator.start(now);
                oscillator.stop(now + 0.15);
            } catch (e) {}
        };

        const playAlarmSequence = (type) => {
             if (!audioCtx || audioCtx.state === 'suspended') return;
             const now = audioCtx.currentTime;
             const createTone = (freq, start, duration) => {
                 const osc = audioCtx.createOscillator();
                 const gain = audioCtx.createGain();
                 osc.connect(gain);
                 gain.connect(audioCtx.destination);
                 osc.type = 'square'; 
                 osc.frequency.value = freq;
                 gain.gain.setValueAtTime(0.1, start);
                 gain.gain.setValueAtTime(0, start + duration);
                 osc.start(start);
                 osc.stop(start + duration);
             };
             if (type === 'critical') {
                 createTone(880, now, 0.1);
                 createTone(880, now + 0.2, 0.1);
                 createTone(880, now + 0.4, 0.1);
             } else if (type === 'warning') {
                 createTone(600, now, 0.2);
                 createTone(600, now + 0.4, 0.2);
             }
        };

        const playClinicalSound = (type) => {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            const now = audioCtx.currentTime;

                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.frequency.setValueAtTime(180, now);
                osc.frequency.linearRampToValueAtTime(120, now + 0.3);

                gain.gain.linearRampToValueAtTime(0.75, now + 0.05);

                            <button onClick={onDemoStart} className="w-full py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium text-slate-300 transition-colors">Probar Demo (5 min)</button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- HOOKS ---
        const useInterpolatedVitals = (targetVitals) => {
            const [currentVitals, setCurrentVitals] = useState(targetVitals);
            const requestRef = useRef();
            const syncRef = useRef({ originalStart: 0, localStart: 0 }); // Para sincronización de reloj

            useEffect(() => {
                const animate = () => {
                    const now = Date.now();
                    const t = targetVitals.transition;

                    if (t && t.duration > 0) {
                        // Lógica de Sincronización de Relojes (Clock Skew Fix)
                        // Si detectamos una nueva transición (cambio de startTime), recalculamos el punto de partida local
                        if (syncRef.current.originalStart !== t.startTime) {
                            const timeDiff = now - t.startTime;
                            // Si la diferencia de hora es mayor a 2 segundos (por relojes desajustados),
                            // forzamos que la animación empiece AHORA en este dispositivo.
                            // Esto arregla el delay de 30s en tablets viejas.
                            const useLocalTime = Math.abs(timeDiff) > 2000;
                            syncRef.current = {
                                originalStart: t.startTime,
                                localStart: useLocalTime ? now : t.startTime
                            };
                        }

                        const startTime = syncRef.current.localStart;
                        const elapsed = now - startTime;
                        const progress = elapsed / t.duration;
                        const safeProgress = Math.max(0, Math.min(1, progress));

                        if (safeProgress < 1) {
                            setCurrentVitals({
                                ...targetVitals,
                                hr: Math.round(t.startHr + (t.targetHr - t.startHr) * safeProgress),
                                spo2: Math.round(t.startSpo2 + (t.targetSpo2 - t.startSpo2) * safeProgress),
                                resp: Math.round(t.startResp + (t.targetResp - t.startResp) * safeProgress),
                            });
                            requestRef.current = requestAnimationFrame(animate);
                        } else { 
                            setCurrentVitals(targetVitals); 
                        }
                    } else { 
                        setCurrentVitals(targetVitals); 
                    }
                };
                requestRef.current = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(requestRef.current);
            }, [targetVitals]);
            return currentVitals;
        };

        // --- COMPONENTES ---
        const getECGPoint = (phase) => {
            const p = (phase % (2 * Math.PI)) / (2 * Math.PI);
            let y = 0.65; // Baseline adjusted lower
            if (p > 0.1 && p < 0.2) {
                y -= 0.08 * Math.sin((p - 0.1) * 10 * Math.PI);
            }
            else if (p > 0.35 && p < 0.45) {
                if (p < 0.37) y += 0.05 * Math.sin((p - 0.35) * 50 * Math.PI);
                else if (p < 0.41) y -= 0.6 * Math.sin((p - 0.37) * 25 * Math.PI);
                else y += 0.1 * Math.sin((p - 0.41) * 25 * Math.PI);
            }
            else if (p > 0.6 && p < 0.8) {
                y -= 0.15 * Math.sin((p - 0.6) * 5 * Math.PI);
            }
            return y;
        };

        const getPlethPoint = (phase) => {
            const p = (phase % (2 * Math.PI)) / (2 * Math.PI);
            let y = 0.5;
            if (p < 0.2) {
                y = 0.8 - 0.6 * Math.sin(p * 2.5 * Math.PI);
            } 
            else {
                const decay = Math.exp(-(p - 0.2) * 3);
                y = 0.2 + 0.6 * decay;
                if (p > 0.4 && p < 0.6) {
                    y -= 0.05 * Math.sin((p - 0.4) * 5 * Math.PI);
                }
            }
            return y; 
        };

        const WaveformCanvas = ({ color, speed, type, flatline, onBeat }) => {
            const canvasRef = useRef(null);
            const dataRef = useRef([]);
            const phaseRef = useRef(0);
            const frameRef = useRef(0);
            const lastTimeRef = useRef(performance.now());

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                if (dataRef.current.length === 0) dataRef.current = new Array(canvas.width).fill(canvas.height / 2);

                const draw = (time) => {
                    const deltaTime = (time - lastTimeRef.current) / 1000;
                    lastTimeRef.current = time;
                    if (deltaTime > 0.1) { frameRef.current = requestAnimationFrame(draw); return; }

                    if (canvas.width !== canvas.offsetWidth) {
                        canvas.width = canvas.offsetWidth;
                        canvas.height = canvas.offsetHeight;
                        dataRef.current = new Array(canvas.width).fill(canvas.height / 2);
                    }

                    let newValue = canvas.height / 2;
                    const amplitude = canvas.height / 3;
                    
                    if (!flatline) {
                        const beatsPerSecond = speed / 60;
                        const angularSpeed = beatsPerSecond * 2 * Math.PI;
                        const prevPhase = phaseRef.current;
                        phaseRef.current += angularSpeed * deltaTime;
                        if (phaseRef.current >= 2 * Math.PI) phaseRef.current -= 2 * Math.PI;
                        const p = phaseRef.current;

                        if (type === 'ecg' && onBeat) {
                             const threshold = Math.PI;
                             if ((prevPhase < threshold && p >= threshold) || (prevPhase > p && prevPhase < threshold)) onBeat();
                        }

                        if (type === 'ecg') {
                            if (p > 3.0 && p < 3.28) newValue = (canvas.height / 2) - (amplitude * 2.5 * Math.exp(-Math.pow(p - Math.PI, 2) * 50));
                            else if (p > 3.5 && p < 4.5) newValue = (canvas.height / 2) - (amplitude * 0.3 * Math.sin(p - 3.5));
                            else if (p > 2.5 && p < 2.9) newValue = (canvas.height / 2) - (amplitude * 0.15 * Math.sin((p - 2.5) * 5));
                            else newValue = (canvas.height / 2) + (Math.random() * 1.5 - 0.75);
                        } else {
                            const wave = Math.sin(p) + 0.5 * Math.sin(2 * p + 0.5);
                            newValue = (canvas.height / 2) - (wave * amplitude * 0.6);
                        }
                    } else {
                        newValue = (canvas.height / 2) + (Math.random() * 2 - 1);
                    }

                    if (newValue < 5) newValue = 5;
                    if (newValue > canvas.height - 5) newValue = canvas.height - 5;

                    dataRef.current.push(newValue);
                    dataRef.current.shift();

                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.lineWidth = 2.4; ctx.strokeStyle = color; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                    ctx.beginPath();
                    for (let i = 0; i < dataRef.current.length; i++) {
                        if (i === 0) ctx.moveTo(i, dataRef.current[i]); else ctx.lineTo(i, dataRef.current[i]);
                    }
                    ctx.stroke();
                    frameRef.current = requestAnimationFrame(draw);
                };
                frameRef.current = requestAnimationFrame(draw);
                return () => cancelAnimationFrame(frameRef.current);
            }, [color, speed, type, flatline, onBeat]);

            return <canvas ref={canvasRef} className="w-full h-full block"></canvas>;
        };

        const RoleSelection = ({ onSelect, onLogout }) => {

                                <WaveformCanvas color="#facc15" speed={vitals.hr} type="pleth" flatline={vitals.spo2 === 0} />
                            </div>
                            <div className="flex flex-col justify-center items-end pr-4 relative min-w-0">
                                <span className="absolute top-2 right-2 text-yellow-400 font-bold text-lg">SpO2</span>
                                <div className="absolute top-10 right-2 text-yellow-600 font-mono text-xl flex flex-col items-end leading-tight opacity-80"><span style={{fontSize: '2.5vh'}}>95</span><span style={{fontSize: '2.5vh'}}>89</span></div>
                                <div className="flex items-baseline">
                                    <span className={`leading-none font-mono font-bold ${getTextColor('text-yellow-400')}`} style={{fontSize: '22vh'}}>{vitals.spo2 || '--'}</span><span className={`ml-2 ${getTextColor('text-yellow-400')}`} style={{fontSize: '8vh'}}>%</span>
                                </div>
                            </div>
                        </div>
                        <div className="grid grid-cols-2 h-full divide-x divide-slate-800 min-h-0">
                             <div className="flex flex-col justify-center items-end pr-4 relative min-w-0">
                                <span className="absolute top-2 left-4 text-slate-500 font-bold text-lg">RESP</span>
                                <div className="flex items-center gap-4"><span className="leading-none font-mono font-bold text-slate-600" style={{fontSize: '10vh'}}>---</span></div>
                             </div>
                             <div className="flex flex-col justify-center pl-8 relative min-w-0">
                                <span className="absolute top-2 left-4 text-slate-500 font-bold text-lg">PNI</span>
                                <span className="font-mono font-bold text-slate-600 leading-none" style={{fontSize: '7vh'}}>---/---</span>
                                <span className="text-slate-700 text-xl mt-2">(--)</span>
                             </div>
                        </div>
                    </div>
                    <div className="flex-none bg-slate-900 border-t border-slate-700 p-2 flex justify-between items-center h-16">
                        <div className="flex gap-2 h-full">
                            <div className="soft-key w-24">Menú<br/>Principal</div><div className="soft-key w-24">Silenciar<br/>Alarmas</div><div className="soft-key w-24">Tendencias</div>
                            <div onClick={() => setShowQR(true)} className="soft-key w-24 bg-blue-900/30 text-blue-200 border-blue-800 hover:bg-blue-800/50">C. Remoto<br/><Icons.QrCode className="inline w-3 h-3 ml-1"/></div>
                        </div>
                        <div className="flex gap-2 h-full"><div className="soft-key w-24 text-slate-500 border-slate-800 cursor-not-allowed">PNI<br/>Inicio/Parada</div><div className="soft-key w-24 text-slate-500 border-slate-800 cursor-not-allowed">Cero<br/>PNI</div></div>
                        <div className="flex items-center gap-4 px-4 text-slate-400 font-mono text-sm border-l border-slate-700 ml-4">
                            <div className="flex flex-col items-end"><span>{time.toLocaleTimeString()}</span><span className="text-xs">{time.toLocaleDateString()}</span></div>
                            <div className="flex gap-3">{connectionStatus ? <Icons.Wifi className="w-5 h-5 text-green-500" /> : <Icons.WifiOff className="w-5 h-5 text-red-500 animate-pulse" />}<Icons.Battery className="w-5 h-5 text-green-500" /></div>
                        </div>
                    </div>
                </div>
            );
        };

        const ControllerScreen = ({ sessionId, vitals: currentVitals, onUpdate }) => {
            const vitals = useInterpolatedVitals(currentVitals);
            const [transitionDuration, setTransitionDuration] = useState(5); // DEFAULT 5 SEGUNDOS
            const [showDebrief, setShowDebrief] = useState(false);
            const [eventLog, setEventLog] = useState([]);
            
            // --- CORRECCIÓN DE SINCRONIZACIÓN ---
            // Usamos una referencia para mantener el valor más reciente de los sliders
            // Esto evita que al soltar el slider (onMouseUp) se use un valor desactualizado del closure anterior
            const [targets, setTargets] = useState(currentVitals);
            const targetsRef = useRef(currentVitals);
            const isDraggingRef = useRef(false); // EVITAR CONFLICTOS DE SYNC

            useEffect(() => {
                // Solo sincronizamos si NO estamos arrastrando para evitar que el slider "salte"
                if (!isDraggingRef.current) {
                    const newTargets = {
                        ...targets, // Mantenemos estado local
                        hr: currentVitals.hr, 
                        spo2: currentVitals.spo2, 
                        resp: currentVitals.resp
                    };
                    setTargets(newTargets);
                    targetsRef.current = newTargets;
                }
            }, [currentVitals.hr, currentVitals.spo2, currentVitals.resp]);

            const logAction = (message) => { const timestamp = new Date().toLocaleTimeString(); setEventLog(prev => [{time: timestamp, msg: message}, ...prev]); };

            // OPTIMIZADO: Actualiza tanto el estado (para render) como la referencia (para lógica inmediata)
            const handleSliderChange = (field, value) => {
                const newTargets = { ...targets, [field]: value };
                setTargets(newTargets);
                targetsRef.current = newTargets;
            };

            const handleSliderStart = () => {
                isDraggingRef.current = true;
            };

            // OPTIMIZADO: Lee desde la REFERENCIA para garantizar que se envía el último valor
            const handleCommitChange = (field) => {
                isDraggingRef.current = false;
                const now = Date.now();
                const durationMs = transitionDuration * 1000;
                
                // Usamos targetsRef.current en lugar de targets
                const currentTargets = targetsRef.current;

                // Logging
                if (field === 'hr') logAction(`Cambio manual FC: ${currentTargets.hr} lpm`);
                if (field === 'spo2') logAction(`Cambio manual SpO2: ${currentTargets.spo2}%`);

                onUpdate({ 
                    ...currentTargets, 
                    transition: (durationMs > 0) ? { 
                        startTime: now, 
                        duration: durationMs, 
                        startHr: vitals.hr, 
                        targetHr: currentTargets.hr, 
                        startSpo2: vitals.spo2, 
                        targetSpo2: currentTargets.spo2, 
                        startResp: vitals.resp, 
                        targetResp: currentTargets.resp || 45 
                    } : null 
                });
            };

            const triggerSound = (type, name) => { onUpdate({ ...targets, soundType: type, soundTimestamp: Date.now() }); logAction(`Sonido: ${name}`); };

            const applyPreset = (type, name) => {
                let presetValues = {};
                switch(type) {
                    case 'normal': presetValues = { hr: 142, spo2: 94, resp: 45 }; break;
                    case 'brady': presetValues = { hr: 68, spo2: 75, resp: 20 }; break;
                    case 'desat': presetValues = { hr: 110, spo2: 84, resp: 60 }; break;
                    case 'vpp': presetValues = { hr: 88, spo2: 84, resp: 40 }; break;
                    case 'vpp_ct': presetValues = { hr: 56, spo2: 65, resp: 0 }; break;
                }
                const newTargets = { ...targets, ...presetValues };
                setTargets(newTargets);
                targetsRef.current = newTargets;

                const now = Date.now(); const durationMs = transitionDuration * 1000;
                onUpdate({ ...presetValues, transition: (durationMs > 0) ? { startTime: now, duration: durationMs, startHr: vitals.hr, targetHr: presetValues.hr, startSpo2: vitals.spo2, targetSpo2: presetValues.spo2, startResp: vitals.resp, targetResp: presetValues.resp } : null });
                logAction(`Escenario: ${name}`);
            };

            return (
                <div className="h-screen overflow-y-auto bg-slate-900 text-white p-4 pb-20">
                    <header className="flex justify-between items-center mb-6 bg-slate-800 p-4 rounded-lg">
                        <div className="flex items-center gap-2"><h2 className="font-bold text-blue-400 flex items-center gap-2"><Icons.Wifi className="w-4 h-4"/> Control Remoto</h2><button onClick={() => setShowDebrief(true)} className="ml-4 bg-slate-700 hover:bg-slate-600 text-xs px-2 py-1 rounded flex items-center gap-1"><Icons.List className="w-3 h-3"/> Debriefing</button></div>
                        <div className="flex items-center gap-3">
                            <span className="text-sm text-slate-400 font-mono border border-slate-600 px-2 py-0.5 rounded">ID: {sessionId}</span>
                            <div className={`w-3 h-3 rounded-full ${vitals.connected ? 'bg-green-500' : 'bg-red-500'}`}></div>
                        </div>
                    </header>
                    {showDebrief && (
                        <div className="fixed inset-0 bg-black/90 z-50 p-4 flex flex-col">
                            <div className="bg-slate-800 rounded-xl flex-1 flex flex-col overflow-hidden max-w-md mx-auto w-full">
                                <div className="p-4 border-b border-slate-700 flex justify-between items-center"><h3 className="font-bold text-lg">Registro de Eventos</h3><button onClick={() => setShowDebrief(false)}><Icons.X className="w-6 h-6"/></button></div>
                                <div className="flex-1 overflow-y-auto p-4 space-y-2">
                                    {eventLog.length === 0 && <p className="text-slate-500 text-center mt-4">Sin eventos registrados.</p>}
                                    {eventLog.map((log, i) => (<div key={i} className="flex gap-3 text-sm border-b border-slate-700/50 pb-2"><span className="text-slate-400 font-mono">{log.time}</span><span className="text-slate-200">{log.msg}</span></div>))}
                                </div>
                            </div>
                        </div>
                    )}
                    <div className="space-y-6 max-w-lg mx-auto">
                        <div className="bg-slate-800 p-4 rounded-xl border border-slate-700">
                            <div className="flex justify-between mb-2"><label className="text-amber-400 font-bold flex gap-2"><Icons.Clock className="w-5 h-5"/> Tiempo Transición</label><span className="text-white font-mono font-bold text-xl">{transitionDuration}s</span></div>
                            <input 
                                type="range" min="0" max="90" step="10" 
                                value={transitionDuration} 
                                onChange={(e) => setTransitionDuration(parseInt(e.target.value))}
                                onMouseUp={() => logAction(`Ajuste Tiempo Transición: ${transitionDuration}s`)}
                                onTouchEnd={() => logAction(`Ajuste Tiempo Transición: ${transitionDuration}s`)}
                                className="w-full h-8 time-slider cursor-pointer touch-none" 
                            />
                            <div className="flex justify-between text-xs text-slate-500 mt-1"><span>Inmediato</span><span>90 seg</span></div>
                        </div>
                        <div className="w-full"><button onClick={() => triggerSound('grunt', 'Quejido')} className="w-full p-4 bg-orange-900/40 border border-orange-500/50 rounded-lg text-orange-400 font-bold flex items-center justify-center gap-2 hover:bg-orange-900/60 transition-all"><Icons.Activity className="w-5 h-5"/> Reproducir Quejido</button></div>
                        <div className="bg-slate-800 p-6 rounded-xl border border-slate-700">
                            <div className="flex justify-between mb-2"><label className="text-[#42B334] font-bold flex gap-2"><Icons.Heart className="w-5 h-5"/> FC: {targets.hr}</label><span className="text-slate-400 text-xs mt-1">Actual: {vitals.hr}</span></div>
                            <input 
                                type="range" min="0" max="200" 
                                value={targets.hr} 
                                onChange={(e) => handleSliderChange('hr', parseInt(e.target.value))}
                                onMouseDown={handleSliderStart}
                                onTouchStart={handleSliderStart}
                                onMouseUp={() => handleCommitChange('hr')}
                                onTouchEnd={() => handleCommitChange('hr')}
                                onClick={() => handleCommitChange('hr')}
                                className="w-full h-12 accent-[#42B334] cursor-pointer touch-none" 
                            />
                        </div>
                        <div className="bg-slate-800 p-6 rounded-xl border border-slate-700">
                            <div className="flex justify-between mb-2"><label className="text-yellow-400 font-bold flex gap-2"><Icons.Activity className="w-5 h-5"/> SpO2: {targets.spo2}%</label><span className="text-slate-400 text-xs mt-1">Actual: {vitals.spo2}%</span></div>
                            <input 
                                type="range" min="0" max="100" 
                                value={targets.spo2} 
                                onChange={(e) => handleSliderChange('spo2', parseInt(e.target.value))} 
                                onMouseDown={handleSliderStart}
                                onTouchStart={handleSliderStart}
                                onMouseUp={() => handleCommitChange('spo2')}
                                onTouchEnd={() => handleCommitChange('spo2')}
                                onClick={() => handleCommitChange('spo2')}
                                className="w-full h-12 accent-yellow-400 cursor-pointer touch-none" 
                            />
                        </div>
                        <div className="grid grid-cols-2 gap-3">
                            <button onClick={() => applyPreset('normal', 'Normalidad')} className="p-4 bg-emerald-900/40 border border-emerald-500/50 rounded-lg text-emerald-400 font-bold">Normal</button>
                            <button onClick={() => applyPreset('brady', 'Bradicardia')} className="p-4 bg-yellow-900/40 border border-yellow-500/50 rounded-lg text-yellow-400 font-bold">Bradicardia</button>
                            <button onClick={() => applyPreset('desat', 'Desaturación')} className="p-4 bg-blue-900/40 border border-blue-500/50 rounded-lg text-blue-400 font-bold">Desaturación</button>
                            <button onClick={() => applyPreset('vpp', 'VPP')} className="p-4 bg-indigo-900/40 border border-indigo-500/50 rounded-lg text-indigo-400 font-bold">VPP</button>
                            <button onClick={() => applyPreset('vpp_ct', 'VPP + Masaje')} className="col-span-2 p-4 bg-red-900/40 border border-red-500/50 rounded-lg text-red-500 font-bold flex items-center justify-center gap-2"><Icons.AlertTriangle className="w-4 h-4"/> VPP + CT (Masaje)</button>
                        </div>
                        <button onClick={() => { onUpdate({ alarmMuted: !vitals.alarmMuted }); logAction('Silenciar/Activar Alarmas'); }} className={`w-full py-4 rounded-lg font-bold flex justify-center gap-2 ${vitals.alarmMuted ? 'bg-orange-600' : 'bg-slate-700'}`}>{vitals.alarmMuted ? 'Alarmas Silenciadas' : 'Silenciar Alarmas'}</button>
                    </div>
                </div>
            );
        };
        const App = () => {
            const [user, setUser] = useState(null);
            const [mode, setMode] = useState('select');
            const [sessionId, setSessionId] = useState('');
            const [vitals, setVitals] = useState(DEFAULT_VITALS);
            const [isConnected, setIsConnected] = useState(true);
            const [isDemoMode, setIsDemoMode] = useState(false);
            const [demoTimeLeft, setDemoTimeLeft] = useState(300);
            const [licenseExpired, setLicenseExpired] = useState(false); // NUEVO ESTADO

            useEffect(() => {
                let interval = null;
                if (isDemoMode && demoTimeLeft > 0) {
                    interval = setInterval(() => { 
                        const newTime = demoTimeLeft - 1;
                        setDemoTimeLeft(newTime);
                        localStorage.setItem('neosim_demo_timer', newTime);
                    }, 1000);
                } else if (demoTimeLeft === 0) { clearInterval(interval); }
                return () => clearInterval(interval);
            }, [isDemoMode, demoTimeLeft]);

            const handleDemoStart = () => {
                setIsDemoMode(true);
                const savedTime = localStorage.getItem('neosim_demo_timer');
                if (savedTime && parseInt(savedTime) > 0) {
                    setDemoTimeLeft(parseInt(savedTime));
                } else {
                    setDemoTimeLeft(300);
                    localStorage.setItem('neosim_demo_timer', 300);
                }
                if (auth) {
                    auth.signInAnonymously().then(u => { setUser(u.user); }).catch(err => {
                        console.warn("Auth anónima falló, usando usuario local.", err);
                        setUser({ uid: 'demo-user', email: 'demo@neomonitor.com' });
                    });
                } else { setUser({ uid: 'demo-user', email: 'demo@neomonitor.com' }); }
            };

            const handleLogout = () => {
                if (auth) {
                    auth.signOut().then(() => {
                        setUser(null);
                        setIsDemoMode(false);
                        localStorage.removeItem('neosim_demo_timer'); 
                        setMode('select');
                    });
                } else {
                    setUser(null);
                    setMode('select');
                }
            };

            useEffect(() => {
                if (!auth) return;
                const unsub = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        if (u.isAnonymous) {
                            setIsDemoMode(true);
                            const savedTime = localStorage.getItem('neosim_demo_timer');
                            if (savedTime) setDemoTimeLeft(parseInt(savedTime));
                            setUser(u);
                        } else {
                            // ----------------------------------------------------------------
                            // === VERIFICACIÓN DE LICENCIA ===
                            // ----------------------------------------------------------------
                            try {
                                if (db) {
                                    const doc = await db.collection('usuarios').doc(u.uid).get();
                                    if (doc.exists) {
                                        const data = doc.data();
                                        if (data.fecha_vencimiento) {
                                            const vencimiento = data.fecha_vencimiento.toDate();
                                            const hoy = new Date();
                                            // Si venció, activamos el bloqueo pero dejamos setUser(u) 
                                            // para que el renderizado muestre la pantalla de bloqueo en lugar del Login
                                            if (hoy > vencimiento) {
                                                setLicenseExpired(true);
                                            }
                                        }
                                    }
                                }
                            } catch (error) {
                                console.error("Error verificando licencia:", error);
                            }
                            setIsDemoMode(false);
                            setUser(u);
                        }
                    } else {
                        setUser(null);
                    }
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const urlMode = params.get('mode');
                const urlSession = params.get('session');
                if (urlMode && urlSession) { setMode(urlMode); setSessionId(urlSession); }
            }, []);

            useEffect(() => {
                if (!sessionId || !user || !db) return;
                let unsubscribe;
                const connect = () => {
                    try {
                        unsubscribe = db.collection("sessions").doc(sessionId).onSnapshot(
                            (doc) => { if (doc.exists) { setVitals({...doc.data(), connected: true}); setIsConnected(true); } }, 
                            (error) => { 
                                console.log("Reconectando...", error); 
                                if (isDemoMode) { setIsConnected(true); } else { setIsConnected(false); setTimeout(connect, 2000); }
                            }
                        );
                    } catch(e) { setIsConnected(false); }
                };
                connect();
                return () => unsubscribe && unsubscribe();
            }, [sessionId, user, isDemoMode]);

            const handleUpdate = async (newVitals) => { 
                if (sessionId && db) {
                    try { await db.collection("sessions").doc(sessionId).set(newVitals, { merge: true }); } 
                    catch (e) { if (isDemoMode) setVitals(prev => ({...prev, ...newVitals})); }
                } else if (isDemoMode) { setVitals(prev => ({...prev, ...newVitals})); }
            };
            const onSelect = (m, id) => { setMode(m); setSessionId(id); };

            if (!user) return <LoginScreen onDemoStart={handleDemoStart} />;

            // --- PANTALLA DE BLOQUEO UNIFICADA (DEMO / LICENCIA) ---
            if (licenseExpired || (isDemoMode && demoTimeLeft === 0)) {
                const title = licenseExpired ? "Licencia No Válida" : "Tiempo de Prueba Agotado";
                const message = licenseExpired 
                    ? "Tu licencia de NeoMonitor ha caducado o no es válida."
                    : "Has disfrutado de los 5 minutos de demostración gratuita.";

                return (
                    <div className="min-h-screen bg-black flex flex-col items-center justify-center p-8 text-center">
                        <div className="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-600 max-w-md w-full">
                            <div className="flex justify-center mb-6 text-red-500">
                                {licenseExpired ? <Icons.Lock className="w-20 h-20" /> : <Icons.Clock className="w-20 h-20 text-yellow-400" />}
                            </div>
                            
                            <h1 className="text-3xl font-bold text-white mb-4">{title}</h1>
                            <p className="text-slate-300 mb-8 text-lg">{message}</p>
                            
                            <div className="bg-slate-900 p-6 rounded-xl mb-6 border border-slate-700">
                                <p className="text-sm text-slate-400 mb-3">Para continuar utilizando el simulador profesionalmente:</p>
                                <button 
                                    onClick={() => window.location.href = "https://www.getneomonitor.pro"} 
                                    className="w-full py-4 bg-[#42B334] hover:bg-green-600 text-black font-bold text-lg rounded-lg transition-transform transform hover:scale-105 shadow-lg"
                                >
                                    {licenseExpired ? "Renovar Licencia Ahora" : "Comprar Licencia Pro"}
                                </button>
                            </div>

                            <button onClick={() => {
                                localStorage.removeItem('neosim_demo_timer'); 
                                setLicenseExpired(false);
                                if(auth) auth.signOut();
                                window.location.reload();
                            }} className="text-slate-500 hover:text-white text-sm underline mt-4">
                                Volver a la pantalla de inicio
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="font-sans antialiased relative">
                    {isDemoMode && (
                        <div className="fixed top-0 right-0 bg-yellow-500 text-black font-bold px-3 py-1 rounded-bl-lg z-50 text-xs shadow-lg">
                            Demo: {Math.floor(demoTimeLeft / 60)}:{(demoTimeLeft % 60).toString().padStart(2, '0')}
                        </div>
                    )}
                    {mode === 'select' && <RoleSelection onSelect={onSelect} onLogout={handleLogout} />}
                    {mode === 'monitor' && <MonitorScreen sessionId={sessionId} vitals={vitals} connectionStatus={isConnected} />}
                    {mode === 'control' && <ControllerScreen sessionId={sessionId} vitals={vitals} onUpdate={handleUpdate} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
