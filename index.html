        let audioCtx;
        const initAudio = () => {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        };

        const playBeep = (pitch = 800) => {
            if (!audioCtx || audioCtx.state !== 'running') return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine';
            oscillator.frequency.value = pitch;
            const now = audioCtx.currentTime;
            gainNode.gain.setValueAtTime(0.1, now); 
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
            oscillator.start(now);
            oscillator.stop(now + 0.15);
        };

        const playAlarmSequence = (type) => {
             if (!audioCtx || audioCtx.state !== 'running') return;
             const now = audioCtx.currentTime;
             const createTone = (freq, start, duration) => {
                 const osc = audioCtx.createOscillator();
                 const gain = audioCtx.createGain();
                 osc.connect(gain);
                 gain.connect(audioCtx.destination);
                 osc.type = 'square'; 
                 osc.frequency.value = freq;
                 gain.gain.setValueAtTime(0.08, start);
                 gain.gain.setValueAtTime(0, start + duration);
                 osc.start(start);
                 osc.stop(start + duration);
             };
             if (type === 'critical') {
                 createTone(880, now, 0.1); createTone(880, now + 0.2, 0.1); createTone(880, now + 0.4, 0.1);
             } else if (type === 'warning') {
                 createTone(600, now, 0.2); createTone(600, now + 0.4, 0.2);
             }
        };

                let frameId;
                const draw = (time) => {
                    const deltaTime = (time - lastTimeRef.current) / 1000;
                    lastTimeRef.current = time;
                    if (deltaTime > 0.1) { frameId = requestAnimationFrame(draw); return; }
                    if (canvas.width !== canvas.offsetWidth) {
                        canvas.width = canvas.offsetWidth;
                        canvas.height = canvas.offsetHeight;
                        dataRef.current = new Array(canvas.width).fill(canvas.height / 2);
                    }
                    let newValue = canvas.height / 2;
                    const amplitude = canvas.height / 3;
                    if (!flatline && speed > 0) {
                        const beatsPerSecond = speed / 60;
                        const prevPhase = phaseRef.current;
                        phaseRef.current += (beatsPerSecond * 2 * Math.PI) * deltaTime;
                        if (phaseRef.current >= 2 * Math.PI) phaseRef.current -= 2 * Math.PI;
                        const p = phaseRef.current;
                        if (type === 'ecg' && onBeat) {
                             const threshold = Math.PI;
                             if (prevPhase < threshold && p >= threshold) onBeat();
                        }
                        if (type === 'ecg') {
                            if (p > 3.0 && p < 3.28) newValue = (canvas.height / 2) - (amplitude * 2.5 * Math.exp(-Math.pow(p - Math.PI, 2) * 50));
                            else if (p > 3.5 && p < 4.5) newValue = (canvas.height / 2) - (amplitude * 0.3 * Math.sin(p - 3.5));
                            else newValue = (canvas.height / 2) + (Math.random() * 1.5 - 0.75);
                        } else {
                            newValue = (canvas.height / 2) - (Math.sin(p) * amplitude * 0.6);
                        }
                    } else { newValue = (canvas.height / 2) + (Math.random() * 2 - 1); }
                    dataRef.current.push(newValue);
                    dataRef.current.shift();
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.lineWidth = 2.5; ctx.strokeStyle = color; ctx.beginPath();
                    for (let i = 0; i < dataRef.current.length; i++) {
                        if (i === 0) ctx.moveTo(i, dataRef.current[i]); else ctx.lineTo(i, dataRef.current[i]);
                    }
                    ctx.stroke();
                    frameId = requestAnimationFrame(draw);
                };
                frameId = requestAnimationFrame(draw);
                return () => cancelAnimationFrame(frameId);
            }, [color, speed, type, flatline, onBeat]);

            return <canvas ref={canvasRef} className="w-full h-full block" />;

                        frame = requestAnimationFrame(animate);
                    } else { setVitals(target); }
                };
                frame = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(frame);
            }, [target]);

                    <div className="flex-1 p-4 space-y-6">

                        <div className="bg-slate-800 p-4 rounded-xl">

                            <div className="flex justify-between mb-2 font-bold text-[#42B334]"><span>{t.hr}: {localTargets.hr}</span><span className="text-xs opacity-50">{t.act}: {vitals.hr}</span></div>
                            <input type="range" min="0" max="220" value={localTargets.hr} onChange={e => setLocalTargets({ ...localTargets, hr: parseInt(e.target.value) })} onTouchEnd={() => handleCommitChange('hr', localTargets.hr)} onMouseUp={() => handleCommitChange('hr', localTargets.hr)} className="w-full h-12"/>

                                Caso Clínico

                        </div>

                            <div className="grid grid-cols-2 gap-3">
                                <button onClick={() => applyPreset('normal', t.presets.normal)} className="p-4 bg-emerald-900/40 border border-emerald-500/50 rounded-lg text-emerald-400 font-bold">{t.presets.normal}</button>
                                <button onClick={() => applyPreset('brady', t.presets.brady)} className="p-4 bg-yellow-900/40 border border-yellow-500/50 rounded-lg text-yellow-400 font-bold">{t.presets.brady}</button>
                                <button onClick={() => applyPreset('desat', t.presets.desat)} className="p-4 bg-blue-900/40 border border-blue-500/50 rounded-lg text-blue-400 font-bold text-sm">{t.presets.desat}</button>

                                <button onClick={() => applyPreset('vpp', t.presets.vpp)} className="p-4 bg-indigo-900/40 border border-indigo-500/50 rounded-lg text-indigo-400 font-bold">{t.presets.vpp}</button>

                                    <span className="font-bold text-blue-300 text-sm">{getCaseName(activeCase)}</span>
                                    <button onClick={() => { setActiveCase(null); setStageIndex(-1); }} className="text-slate-400 hover:text-white text-xs border border-slate-600 px-2 py-0.5 rounded">Salir</button>

                                                <div className="font-medium text-white truncate">{getStageName(stage)}</div>
                                                <div className="text-xs text-slate-400">FC: {stage.hr || '--'} · SpO2: {stage.spo2}% · {stage.transition}s</div>

                        <SponsorSpace compact className="h-10 w-full" source="Control" t={t} />
                    </div>
                </div>
            );
        };

        const QRScannerView = ({ onScan, onCancel, t }) => {
            const [sid, setSid] = useState('');
            useEffect(() => {
                const html5QrCode = new Html5Qrcode("reader");
                html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
                    try {
                        const url = new URL(decodedText);
                        const session = url.searchParams.get('session');
                        if (session) { html5QrCode.stop().then(() => onScan(session)); }
                    } catch(e) { html5QrCode.stop().then(() => onScan(decodedText)); }
                }).catch(() => {});
                return () => { if (html5QrCode.isScanning) { html5QrCode.stop().catch(() => {}); } };
            }, []);
            return (
                <div className="fixed inset-0 bg-slate-900 z-[60] flex flex-col p-6 animate-zoom">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="font-bold text-xl flex items-center gap-2"><Icons.Camera className="text-blue-400"/> {t.scanCamera}</h2>
                        <button onClick={onCancel} className="bg-slate-800 p-2 rounded-full"><Icons.X/></button>
                    </div>
                    <div className="bg-black rounded-2xl overflow-hidden shadow-2xl mb-8 relative"><div id="reader"></div></div>
                    <div className="mt-auto text-center space-y-4">
                        <p className="text-slate-500 text-sm mb-4">{t.scanManual}</p>
                        <div className="flex gap-2">
                            <input type="number" placeholder={t.placeholderId} value={sid} onChange={e => setSid(e.target.value)} className="flex-1 bg-slate-800 border border-slate-700 p-4 rounded-xl text-center font-mono text-xl outline-none focus:border-blue-500"/>
                            <button onClick={() => sid && onScan(sid)} className="bg-blue-600 p-4 rounded-xl px-6 font-bold"><Icons.ArrowRight/></button>
                        </div>
                    </div>
                </div>
            );
        };

        const AnimatedGuide = ({ onClose, t }) => (
            <div className="fixed inset-0 bg-slate-950/95 z-[70] flex flex-col p-6 animate-zoom overflow-y-auto">
                <div className="flex justify-between items-center mb-8"><h2 className="text-2xl font-black text-white">{t.guideTitle}</h2><button onClick={onClose} className="p-2 bg-slate-800 rounded-full"><Icons.X /></button></div>
                <div className="flex-1 flex flex-col items-center justify-center space-y-12 max-w-lg mx-auto w-full">
                    <div className="relative w-full flex flex-col items-center">
                        <div className="w-48 h-32 bg-slate-800 border-4 border-slate-700 rounded-lg flex items-center justify-center relative float-anim shadow-2xl"><Icons.Monitor className="w-10 h-10 text-green-500/50" /><div className="absolute inset-4 bg-white/10 rounded flex items-center justify-center"><Icons.QrCode className="w-8 h-8 text-white opacity-80" /></div><div className="absolute -top-4 -right-4 bg-green-600 text-[10px] font-bold px-2 py-1 rounded-full text-white shadow-lg">DEVICE A</div></div>
                        <p className="mt-4 text-center text-sm"><span className="text-green-400 font-bold uppercase block text-xs mb-1">{t.step1}</span>{t.guideStep1}</p>
                    </div>
                    <div className="flex flex-col items-center text-slate-700"><Icons.ArrowRight className="w-8 h-8 rotate-90" /></div>
                    <div className="relative w-full flex flex-col items-center pb-8">
                        <div className="w-20 h-40 bg-slate-800 border-4 border-slate-700 rounded-2xl flex items-center justify-center relative float-anim shadow-2xl" style={{animationDelay: '1.5s'}}><div className="absolute inset-2 bg-black rounded-lg overflow-hidden flex flex-col items-center justify-center"><div className="w-full h-1/2 bg-blue-500/10 flex items-center justify-center relative overflow-hidden"><div className="scan-line"></div><Icons.Camera className="w-6 h-6 text-blue-400 opacity-50" /></div><div className="p-1 space-y-1 w-full"><div className="w-full h-1 bg-slate-700 rounded"></div><div className="w-3/4 h-1 bg-slate-700 rounded"></div></div></div><div className="absolute -top-4 -right-4 bg-blue-600 text-[10px] font-bold px-2 py-1 rounded-full text-white shadow-lg">DEVICE B</div></div>
                        <p className="mt-4 text-center text-sm"><span className="text-blue-400 font-bold uppercase block text-xs mb-1">{t.step2}</span>{t.guideStep2}</p>
                    </div>
                </div>
                <button onClick={onClose} className="mt-8 bg-white text-black font-black py-4 rounded-2xl uppercase tracking-widest text-sm shadow-xl hover:bg-slate-200 transition-colors">{t.guideBtn}</button>
            </div>
        );

        const LanguageSelector = ({ currentLang, onSelect }) => {
            const [isOpen, setIsOpen] = useState(false);
            const menuRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (menuRef.current && !menuRef.current.contains(event.target)) setIsOpen(false);
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            const langs = [
                { id: 'es', label: 'Español' },
                { id: 'en', label: 'English' },
                { id: 'pt', label: 'Português' }
            ];

            return (
                <div className="absolute top-6 right-6 z-[80]" ref={menuRef}>
                    <button 
                        onClick={() => setIsOpen(!isOpen)}
                        className="bg-slate-900 border border-slate-700 px-4 py-2 rounded-xl flex items-center gap-2 hover:bg-slate-800 transition-all shadow-lg min-w-[80px] justify-between"
                    >
                        <span className="text-xs font-bold text-white uppercase">{currentLang}</span>
                        <Icons.ChevronDown className={`w-3 h-3 text-slate-500 transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`} />
                    </button>
                    
                    {isOpen && (
                        <div className="absolute top-full right-0 mt-2 bg-slate-900 border border-slate-700 rounded-xl overflow-hidden shadow-2xl animate-zoom origin-top-right min-w-[120px]">
                            {langs.map(l => (
                                <button
                                    key={l.id}
                                    onClick={() => { onSelect(l.id); setIsOpen(false); }}
                                    className={`w-full text-left px-4 py-3 text-xs font-medium border-b border-slate-800 last:border-0 hover:bg-slate-800 transition-colors ${currentLang === l.id ? 'bg-slate-800 text-blue-400' : 'text-slate-400'}`}
                                >
                                    {l.label}
                                </button>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [mode, setMode] = useState('select');
            const [lang, setLang] = useState(
                navigator.language.startsWith('es') ? 'es' : 
                (navigator.language.startsWith('pt') ? 'pt' : 'en')
            );
            const [user, setUser] = useState(null);
            const [sessionId, setSessionId] = useState('');
            const [vitals, setVitals] = useState(DEFAULT_VITALS);
            const [showScanner, setShowScanner] = useState(false);
            const [showGuide, setShowGuide] = useState(false);
            const [sid] = useState(Math.floor(1000 + Math.random() * 9000).toString());

            const t = TRANSLATIONS[lang];

            useEffect(() => {
                auth.signInAnonymously().then(cred => setUser(cred.user)).catch(() => setUser({ uid: 'guest' }));
                const p = new URLSearchParams(window.location.search);
                if (p.get('mode') && p.get('session')) { setMode(p.get('mode')); setSessionId(p.get('session')); }
            }, []);

            useEffect(() => {
                if (!sessionId || !db) return;
                const unsub = db.collection("sessions").doc(sessionId).onSnapshot(doc => { if (doc.exists) setVitals(doc.data()); });
                return () => unsub();
            }, [sessionId]);

            if (!user) return <div className="h-screen bg-black flex flex-col items-center justify-center text-green-500"><div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-green-500 mb-4"></div><span className="font-mono text-sm tracking-widest uppercase">{t.connecting}</span></div>;

            if (mode === 'select') {
                return (
                    <div className="h-screen bg-slate-950 flex flex-col items-center justify-center p-6 text-center overflow-y-auto">

                        <LanguageSelector currentLang={lang} onSelect={setLang} />

                            <Icons.Activity className="w-16 h-16 text-green-500 mx-auto mb-4 animate-pulse"/>

                            <p className="text-slate-400 text-lg font-medium">{t.mainPrompt}</p>
                            <button onClick={() => setShowGuide(true)} className="mt-4 text-blue-400 flex items-center gap-2 mx-auto text-sm font-bold border border-blue-400/30 px-4 py-2 rounded-full hover:bg-blue-400/10 transition-colors"><Icons.Help className="w-4 h-4"/>{t.howToConnect}</button>
                        </header>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl">
                            <button onClick={() => { setMode('monitor'); setSessionId(sid); }} className="bg-slate-900 border border-slate-800 hover:border-green-500/50 p-8 rounded-3xl flex flex-col items-center gap-6 group transition-all active:scale-95 shadow-2xl"><div className="bg-green-500/10 p-5 rounded-2xl group-hover:bg-green-500/20 transition-colors"><Icons.Monitor className="w-12 h-12 text-green-400"/></div><span className="text-xl font-bold text-white leading-tight">{t.useAsMonitor}</span></button>
                            <button onClick={() => setShowScanner(true)} className="bg-slate-900 border border-slate-800 hover:border-blue-500/50 p-8 rounded-3xl flex flex-col items-center gap-6 group transition-all active:scale-95 shadow-2xl"><div className="bg-blue-500/10 p-5 rounded-2xl group-hover:bg-blue-500/20 transition-colors"><Icons.Smartphone className="w-12 h-12 text-blue-400"/></div><span className="text-xl font-bold text-white leading-tight">{t.useAsControl}</span></button>
                        </div>

                        <div className="mt-12 w-full max-w-md"><SponsorSpace className="h-20 rounded-2xl bg-slate-900/50" source="Menu_Initial" t={t} /><p className="text-[10px] text-slate-600 mt-6 uppercase tracking-widest font-bold">NeoMonitor Simulator</p></div>
                    </div>
                );
            }

            return (
                <div className="font-sans antialiased">
                    {mode === 'monitor' && <MonitorScreen sessionId={sessionId} vitals={vitals} t={t} />}
                    {mode === 'control' && <ControllerScreen sessionId={sessionId} vitals={vitals} onUpdate={(v) => { if (db && sessionId) db.collection("sessions").doc(sessionId).set(v, { merge: true }); }} t={t} lang={lang} db={db} userId={user.uid} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
